                                    <span className="font-bold text-white">{addon.name}</span>
                                    <div className="flex items-center gap-3">
                                      <div className="flex items-center gap-2">
                                        <span className="text-gray-400 text-sm">السعر:</span>
                                        <input type="number" min="0" value={addon.price} onChange={(e) => handleVideoAddonPriceChange(addon.id, e.target.value)} className="w-32 bg-black border border-[#444] text-white rounded px-3 py-2 text-sm focus:border-[#D4AF37] outline-none"/>
                                      </div>
                                      <button type="button" onClick={() => removeVideoAddon(addon.id)} className="text-red-500 hover:bg-red-500/10 p-2 rounded"><Icons.X size={20} /></button>
                                    </div>
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        </div>
                        )}

                        {/* الملاحظات الإضافية تم نقلها للأسفل */}
                        <div className="bg-[#111] p-6 rounded-2xl border border-[#333]">
                            <h3 className="text-xl text-white mb-4 flex items-center gap-2"><Icons.FileText size={20} className="text-[#D4AF37]"/> ملاحظات إضافية</h3>
                            <textarea value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} rows="3" className="w-full bg-black border border-[#333] text-white rounded-xl p-4 focus:outline-none focus:border-[#D4AF37] transition-all" placeholder="اكتب هنا أي تفاصيل أو اتفاقات خاصة مع العميل..."></textarea>
                        </div>

                        {/* الملخص المالي */}
                        <div className="bg-gradient-to-br from-[#1a1500] to-[#0a0a0a] p-6 rounded-2xl border border-[#D4AF37]/50">
                          <h3 className="text-xl text-[#D4AF37] font-bold mb-4">الملخص المالي</h3>
                          <div className="flex flex-col md:flex-row gap-6 items-center justify-between">
                            <div className="text-center md:text-right w-full">
                              <p className="text-gray-400">الإجمالي</p>
                              <p className="text-3xl font-bold text-white">{totalPrice} ج.م</p>
                            </div>
                            <div className="w-full">
                              <InputField label="المدفوع (عربون)" type="number" value={formData.paid} onChange={e => setFormData({...formData, paid: e.target.value})} placeholder="أدخل المبلغ..." />
                            </div>
                            <div className="text-center md:text-right w-full">
                              <p className="text-gray-400">المتبقي</p>
                              <p className={`text-3xl font-bold ${remaining > 0 ? 'text-red-400' : 'text-green-400'}`}>{remaining} ج.م</p>
                            </div>
                          </div>
                        </div>
                        
                        <button type="submit" disabled={isSubmitting} className={`w-full text-black font-bold text-xl py-4 rounded-xl transition-all shadow-[0_0_20px_rgba(212,175,55,0.3)] ${isSubmitting ? 'bg-yellow-700 cursor-not-allowed opacity-70' : 'bg-[#D4AF37] hover:bg-yellow-500'}`}>
                          {isSubmitting ? 'جاري الحفظ...' : (bookingToEdit ? 'تحديث وحفظ الحجز' : 'تأكيد وحفظ الحجز')}
                        </button>
                    </form>
                </div>
            );
        }

        function ClientsList({ bookings, settings, onPrint, onEdit, showToast, user, isFirebaseActive, onLocalDelete }) {
            const [search, setSearch] = useState('');
            const [bookingToDelete, setBookingToDelete] = useState(null);
            const [msgModalBooking, setMsgModalBooking] = useState(null);

            const filtered = bookings.filter(b => b.phone?.includes(search) || b.groomName?.includes(search));
            
            const remove = async (id) => {
                if (isFirebaseActive && user && window.firebase) { try { await firebase.firestore().collection('users').doc(user.uid).collection('bookings').doc(id).delete(); showToast("تم الحذف من السحابة"); } catch(e) { showToast("خطأ", "error"); } }
                else { onLocalDelete(id); showToast("تم الحذف"); }
                setBookingToDelete(null);
            };

            return (
                <div className="space-y-6 animate-fadeIn pb-10">
                    {msgModalBooking && <QuickMessageModal booking={msgModalBooking} settings={settings} onClose={() => setMsgModalBooking(null)} showToast={showToast} />}
                    
                    {bookingToDelete && (
                       <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 animate-fadeIn p-4">
                         <div className="bg-[#111] border border-red-900/50 shadow-2xl p-6 rounded-2xl max-w-sm w-full text-center">
                            <Icons.AlertTriangle className="mx-auto text-red-500 mb-4" size={48} />
                            <h3 className="text-xl text-white font-bold mb-2">تأكيد الحذف</h3>
                            <p className="text-gray-400 mb-8 text-sm leading-relaxed">هل أنت متأكد من حذف هذا الحجز نهائياً؟ لا يمكن التراجع عن هذا الإجراء.</p>
                            <div className="flex justify-center gap-4">
                               <button onClick={() => setBookingToDelete(null)} className="flex-1 py-3 bg-[#222] hover:bg-[#333] text-white rounded-xl transition-colors font-bold">إلغاء</button>
                               <button onClick={() => remove(bookingToDelete)} className="flex-1 py-3 bg-red-600 hover:bg-red-700 text-white rounded-xl transition-colors font-bold">نعم، احذف</button>
                            </div>
                         </div>
                       </div>
                    )}

                    <div className="flex flex-col md:flex-row justify-between items-center gap-4"><h2 className="text-3xl font-bold text-[#D4AF37]">قاعدة العملاء</h2><div className="relative w-full md:w-96"><Icons.Search className="absolute right-4 top-3.5 text-gray-500" size={20}/><input type="text" placeholder="ابحث بالاسم أو رقم الهاتف..." value={search} onChange={e => setSearch(e.target.value)} className="w-full bg-[#111] border border-[#333] p-3 pr-12 rounded-2xl outline-none focus:border-[#D4AF37] text-white"/></div></div>
                    <div className="bg-[#111] rounded-3xl border border-[#333] overflow-x-auto shadow-xl"><table className="w-full text-right"><thead className="bg-black/40 border-b border-[#222]"><tr><th className="p-4 text-gray-400 font-medium">العروسين</th><th className="p-4 text-gray-400 font-medium">التفاصيل</th><th className="p-4 text-gray-400 font-medium">التاريخ</th><th className="p-4 text-gray-400 font-medium">الحساب</th><th className="p-4 text-center text-gray-400 font-medium">إجراءات</th></tr></thead><tbody className="divide-y divide-[#222]">
                        {filtered.map(b => (
                            <tr key={b.id} className="hover:bg-[#1a1a1a] transition-colors">
                                <td className="p-4"><p className="font-bold text-white text-lg">{b.groomName}</p><p className="text-sm text-gray-500">& {b.brideName}</p></td>
                                <td className="p-4"><p className="text-white">{b.sessionType === 'آخر' ? b.otherSessionType : b.sessionType}</p><p className="text-xs text-[#D4AF37] mt-1 border border-[#D4AF37]/30 rounded px-2 py-0.5 inline-block">{b.location === 'آخر' ? b.otherLocation : b.location}</p></td>
                                <td className="p-4 text-sm font-mono text-gray-300">{b.date}</td>
                                <td className="p-4"><p className="text-white font-bold">{b.totalPrice} ج.م</p><p className="text-xs text-red-500 mt-1 font-bold">باقي {b.remaining}</p></td>
                                <td className="p-4 flex justify-center gap-2">
                                    <button onClick={() => setMsgModalBooking(b)} className="p-2.5 bg-green-500/10 text-green-500 hover:bg-green-500 hover:text-white rounded-xl transition-colors" title="إرسال رسالة سريعة للعميل"><Icons.MessageSquare size={20}/></button>
                                    <button onClick={() => window.open(generateGoogleCalendarLink(b, settings.studioName), '_blank')} className="p-2.5 bg-blue-500/10 text-blue-500 hover:bg-blue-500 hover:text-white rounded-xl transition-colors" title="إضافة للتقويم"><Icons.CalendarPlus size={20}/></button>
                                    <button onClick={() => onEdit(b)} className="p-2.5 bg-blue-500/10 text-blue-500 hover:bg-blue-500 hover:text-white rounded-xl transition-colors" title="تعديل الحجز"><Icons.Edit size={20}/></button>
                                    <button onClick={() => onPrint(b)} className="p-2.5 bg-[#D4AF37]/10 text-[#D4AF37] hover:bg-[#D4AF37] hover:text-black rounded-xl transition-colors" title="طباعة العقد"><Icons.Printer size={20}/></button>
                                    <button onClick={() => setBookingToDelete(b.id)} className="p-2.5 bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white rounded-xl transition-colors" title="حذف العميل"><Icons.Trash2 size={20}/></button>
                                </td>
                            </tr>
                        ))}
                        {filtered.length === 0 && <tr><td colSpan="5" className="text-center p-10 text-gray-500">لا توجد نتائج مطابقة.</td></tr>}
                    </tbody></table></div>
                </div>
            );
        }

        // Quick Message Modal (WhatsApp Templates)
        function QuickMessageModal({ booking, settings, onClose, showToast }) {
            const messages = settings.quickMessages || DEFAULT_SETTINGS.quickMessages;
            const [selectedTemplate, setSelectedTemplate] = useState(messages[0]?.id || '');
            const [customText, setCustomText] = useState('');

            useEffect(() => {
                const tmpl = messages.find(m => m.id === selectedTemplate);
                if (tmpl) {
                    let txt = tmpl.text
                        .replace(/\[الاسم\]/g, booking.groomName)
                        .replace(/\[العروسة\]/g, booking.brideName)
                        .replace(/\[التاريخ\]/g, booking.date)
                        .replace(/\[المتبقي\]/g, booking.remaining)
                        .replace(/\[اللوكيشن\]/g, booking.location === 'آخر' ? booking.otherLocation : booking.location);
                    setCustomText(txt);
                }
            }, [selectedTemplate, booking, messages]);

            const sendWhatsApp = () => {
                if(!customText) return;
                window.open(`https://wa.me/2${booking.phone}?text=${encodeURIComponent(customText)}`, '_blank');
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[70] p-4 animate-fadeIn">
                    <div className="bg-[#111] border border-[#D4AF37]/30 p-6 rounded-3xl w-full max-w-lg shadow-2xl">
                        <div className="flex justify-between items-center mb-6 border-b border-[#222] pb-4">
                            <h3 className="text-xl font-bold text-[#D4AF37] flex items-center gap-2"><Icons.MessageSquare size={20}/> إرسال رسالة سريعة</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-white"><Icons.X size={24} /></button>
                        </div>
                        <div className="space-y-4">
                            <SelectField label="اختر نوع الرسالة" value={selectedTemplate} onChange={e => setSelectedTemplate(e.target.value)} options={messages.map(m => m.id)} />
                            <div className="flex flex-col w-full -mt-4">
                                <select value={selectedTemplate} onChange={e => setSelectedTemplate(e.target.value)} className="bg-black border border-[#333] text-white rounded-xl p-3 outline-none focus:border-[#D4AF37]">
                                    {messages.map((m) => <option key={m.id} value={m.id}>{m.title}</option>)}
                                </select>
                            </div>
                            
                            <div>
                                <label className="text-xs text-gray-500 mb-1 block">نص الرسالة (يمكنك تعديله قبل الإرسال)</label>
                                <textarea value={customText} onChange={e => setCustomText(e.target.value)} rows="6" className="w-full bg-black border border-[#333] text-white rounded-xl p-3 focus:outline-none focus:border-[#D4AF37] transition-all" />
                            </div>

                            <button onClick={sendWhatsApp} className="w-full bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-500 transition-colors flex items-center justify-center gap-2">
                                <Icons.MessageCircle size={20} /> إرسال عبر واتساب
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function SettingsView({ settings, user, isFirebaseActive, onLocalSave, showToast }) {
            const [localSettings, setLocalSettings] = useState(() => ({ ...DEFAULT_SETTINGS, ...settings }));
            const [isSaving, setIsSaving] = useState(false);
            
            useEffect(() => { setLocalSettings({ ...DEFAULT_SETTINGS, ...settings }); }, [settings]);
            
            const handleSave = async () => {
                setIsSaving(true);
                if (isFirebaseActive && user && window.firebase) {
                    try { await firebase.firestore().collection('users').doc(user.uid).collection('settings').doc('config').set(localSettings); showToast("تم الحفظ في السحابة بنجاح ☁️"); } 
                    catch(e) { showToast("حدث خطأ", "error"); }
                } else { onLocalSave(localSettings); setTimeout(() => showToast("تم الحفظ محلياً بنجاح"), 500); }
                setIsSaving(false);
            };

            const updateArray = (key, newArray) => { setLocalSettings(prev => ({ ...prev, [key]: newArray })); };
            const updateField = (key, value) => { setLocalSettings(prev => ({ ...prev, [key]: value })); };

            // هنا تم إضافة كود ضغط وتصغير الصورة قبل حفظها لمنع الخطأ
            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 500;
                            const MAX_HEIGHT = 500;
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                              if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                              }
                            } else {
                              if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                              }
                            }
                            
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            const dataUrl = canvas.toDataURL('image/png');
                            updateField('studioLogo', dataUrl);
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            return (
                <div className="space-y-6 pb-20 animate-fadeIn max-w-5xl mx-auto">
                    <div className="flex flex-col md:flex-row justify-between items-center border-b border-[#D4AF37]/20 pb-4 gap-4">
                        <div><h2 className="text-3xl font-bold text-[#D4AF37]">إعدادات النظام</h2><p className="text-gray-400 mt-1">تخصيص الواجهة، الباقات، الرسائل، والأسعار.</p></div>
                        <button onClick={handleSave} disabled={isSaving} className="w-full md:w-auto bg-[#D4AF37] text-black px-8 py-3 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-yellow-500 shadow-xl"><Icons.Save size={20} /> {isSaving ? "جاري الحفظ..." : "حفظ التعديلات"}</button>
                    </div>

                    <div className="bg-[#111] p-6 rounded-3xl border border-[#222] shadow-xl relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-32 h-32 bg-[#D4AF37]/5 rounded-full blur-3xl -ml-10 -mt-10 pointer-events-none"></div>
                        <h3 className="text-xl font-bold text-white mb-6 flex items-center gap-2"><Icons.Camera size={20} className="text-[#D4AF37]"/> تخصيص هوية الاستوديو</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-10">
                            <div className="flex flex-col">
                                <label className="text-sm text-gray-400 mb-2">اسم الاستوديو</label>
                                <input type="text" value={localSettings.studioName || ''} onChange={e => updateField('studioName', e.target.value)} className="bg-black border border-[#333] text-white rounded-xl p-3 focus:outline-none focus:border-[#D4AF37] transition-all" />
                            </div>
                            <div className="flex flex-col">
                                <label className="text-sm text-gray-400 mb-2">شعار الاستوديو (اللوجو)</label>
                                <input type="file" accept="image/*" onChange={handleLogoUpload} className="bg-black border border-[#333] text-gray-400 rounded-xl p-2 focus:outline-none transition-all file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-[#D4AF37]/20 file:text-[#D4AF37] hover:file:bg-[#D4AF37]/30 cursor-pointer" />
                            </div>
                        </div>
                    </div>

                    {/* Messages Settings */}
                    <div className="bg-[#111] p-6 rounded-3xl border border-[#222] shadow-xl">
                        <h3 className="text-xl font-bold text-white mb-6 flex items-center gap-2"><Icons.MessageSquare size={20} className="text-[#D4AF37]"/> الردود السريعة (واتساب)</h3>
                        <p className="text-sm text-gray-400 mb-6">الكلمات التي سيتم استبدالها تلقائياً: [الاسم] - [العروسة] - [التاريخ] - [المتبقي] - [اللوكيشن]</p>
                        
                        <div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                {(localSettings.quickMessages || []).map((msg, idx) => (
                                    <div key={msg.id} className="bg-black p-4 rounded-2xl border border-white/5 relative group flex flex-col">
                                        <button onClick={() => updateArray('quickMessages', localSettings.quickMessages.filter(m => m.id !== msg.id))} className="absolute top-4 left-4 text-red-500 bg-red-500/10 p-1.5 rounded opacity-0 group-hover:opacity-100 transition-opacity"><Icons.Trash2 size={16}/></button>
                                        <input type="text" value={msg.title} onChange={e => updateArray('quickMessages', localSettings.quickMessages.map(m => m.id === msg.id ? {...m, title: e.target.value} : m))} className="bg-transparent text-[#D4AF37] font-bold outline-none mb-2 w-10/12" placeholder="عنوان الرسالة..." />
                                        <textarea value={msg.text} onChange={e => updateArray('quickMessages', localSettings.quickMessages.map(m => m.id === msg.id ? {...m, text: e.target.value} : m))} rows="4" className="flex-1 w-full bg-[#111] border border-[#333] text-white rounded-xl p-3 focus:outline-none focus:border-[#D4AF37] text-sm resize-none" placeholder="نص الرسالة..." />
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => updateArray('quickMessages', [...(localSettings.quickMessages || []), { id: 'qm_' + Date.now(), title: 'رسالة جديدة', text: 'نص الرسالة...' }])} className="flex items-center justify-center w-full gap-2 bg-[#D4AF37]/10 text-[#D4AF37] py-3 rounded-2xl border border-[#D4AF37]/30 hover:bg-[#D4AF37] hover:text-black transition-colors font-bold"><Icons.Plus size={20}/> إضافة رسالة جديدة</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <SettingObjectList title="الباكيدجات الأساسية" items={localSettings.packages} onChange={(arr) => updateArray('packages', arr)} />
                        <SettingObjectList title="إضافات الفوتوغرافيا" items={localSettings.addons} onChange={(arr) => updateArray('addons', arr)} />
                        <SettingObjectList title="خدمات الفيديو الأساسية" items={localSettings.videoServices} hasSubtext={true} onChange={(arr) => updateArray('videoServices', arr)} />
                        <SettingObjectList title="إضافات الفيديو" items={localSettings.videoAddons} onChange={(arr) => updateArray('videoAddons', arr)} />
                        <SettingStringList title="أماكن التصوير الأساسية" items={localSettings.locations} onChange={(arr) => updateArray('locations', arr)} />
                        <SettingStringList title="أماكن تصوير الكاجوال" items={localSettings.casualLocations} onChange={(arr) => updateArray('casualLocations', arr)} />
                        <SettingStringList title="أنواع السيشن" items={localSettings.sessionTypes} onChange={(arr) => updateArray('sessionTypes', arr)} />
                    </div>
                </div>
            );
        }

        function SettingObjectList({ title, items = [], hasSubtext, onChange }) {
          const [newItem, setNewItem] = useState({ name: '', price: '', subtext: '' });
          const handleAdd = () => {
            if(!newItem.name) return;
            onChange([...items, { id: 'id_' + Date.now(), name: newItem.name, price: Number(newItem.price) || 0, subtext: newItem.subtext || '' }]);
            setNewItem({ name: '', price: '', subtext: '' });
          };
          const handleRemove = (id) => { onChange(items.filter(i => i.id !== id)); };
          return (
            <div className="bg-[#111] p-6 rounded-3xl border border-[#222]">
              <h3 className="text-lg font-bold text-white mb-4 border-b border-[#222] pb-3">{title}</h3>
              <div className="space-y-3 mb-6 max-h-48 overflow-y-auto pr-2 no-scrollbar">
                {items.map(item => (
                  <div key={item.id} className="flex justify-between items-center bg-black p-3 rounded-2xl border border-white/5">
                    <div><p className="font-bold text-white text-sm">{item.name} <span className="text-[#D4AF37] ml-2">({item.price} ج.م)</span></p>{hasSubtext && item.subtext && <p className="text-xs text-gray-500 mt-1">{item.subtext}</p>}</div>
                    <button onClick={() => handleRemove(item.id)} className="text-red-500 hover:text-red-400 bg-red-500/10 p-2 rounded-xl"><Icons.Trash2 size={16}/></button>
                  </div>
                ))}
              </div>
              <div className="bg-black/40 p-4 rounded-2xl border border-[#222] flex flex-col gap-3">
                <input placeholder="الاسم..." value={newItem.name} onChange={e => setNewItem({...newItem, name: e.target.value})} className="bg-black border border-[#333] rounded-xl p-2.5 text-sm text-white focus:border-[#D4AF37] outline-none" />
                <input placeholder="السعر..." type="number" min="0" value={newItem.price} onChange={e => setNewItem({...newItem, price: e.target.value})} className="bg-black border border-[#333] rounded-xl p-2.5 text-sm text-white focus:border-[#D4AF37] outline-none" />
                {hasSubtext && <input placeholder="ملاحظة صغيرة..." value={newItem.subtext} onChange={e => setNewItem({...newItem, subtext: e.target.value})} className="bg-black border border-[#333] rounded-xl p-2.5 text-sm text-white focus:border-[#D4AF37] outline-none" />}
                <button onClick={handleAdd} className="mt-1 flex items-center justify-center gap-1 bg-[#D4AF37]/10 text-[#D4AF37] border border-[#D4AF37]/30 rounded-xl py-2.5 font-bold hover:bg-[#D4AF37] hover:text-black transition-colors"><Icons.Plus size={18}/> إضافة عنصر</button>
              </div>
            </div>
          );
        }

        function SettingStringList({ title, items = [], onChange }) {
          const [newVal, setNewVal] = useState('');
          const handleAdd = () => { if(!newVal.trim() || items.includes(newVal.trim())) return; onChange([...items, newVal.trim()]); setNewVal(''); };
          const handleRemove = (valToRemove) => { onChange(items.filter(i => i !== valToRemove)); };
          return (
            <div className="bg-[#111] p-6 rounded-3xl border border-[#222]">
              <h3 className="text-lg font-bold text-white mb-4 border-b border-[#222] pb-3">{title}</h3>
              <div className="flex flex-wrap gap-2 mb-6 max-h-48 overflow-y-auto no-scrollbar">
                {items.map((item, idx) => (<div key={idx} className="flex items-center gap-2 bg-black px-3 py-2 rounded-xl border border-white/5"><span className="text-sm text-gray-300">{item}</span><button onClick={() => handleRemove(item)} className="text-red-500 hover:text-red-400 bg-red-500/10 rounded p-1"><Icons.X size={12}/></button></div>))}
              </div>
              <div className="flex gap-2"><input placeholder="إضافة جديد..." value={newVal} onChange={e => setNewVal(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAdd()} className="flex-1 bg-black border border-[#333] rounded-xl p-3 text-sm text-white focus:border-[#D4AF37] outline-none" /><button onClick={handleAdd} className="bg-[#D4AF37]/10 text-[#D4AF37] border border-[#D4AF37]/30 rounded-xl px-5 font-bold hover:bg-[#D4AF37] hover:text-black transition-colors">إضافة</button></div>
            </div>
          );
        }

        function ContractPrintView({ booking, settings, onClose }) {
          const isPhotoBooking = ['تصوير فوتوغرافي', 'فوتوغرافي وفيديو'].includes(booking.bookingMainType || 'فوتوغرافي وفيديو');
          const isVideoBooking = ['تصوير فيديو', 'فوتوغرافي وفيديو'].includes(booking.bookingMainType || 'فوتوغرافي وفيديو');

          const pkg = settings.packages.find(p => p.id === booking.packageId);
          const displayPkgName = booking.snapshotPackage?.name || pkg?.name || 'غير محدد';
          const displayPkgPrice = booking.snapshotPackage?.price || pkg?.price || 0;
          const addonsList = booking.snapshotAddons && booking.snapshotAddons.length > 0 ? booking.snapshotAddons : (booking.addons || []).map(aId => settings.addons.find(a => a.id === aId)).filter(Boolean);
          
          const videoName = booking.snapshotVideoService?.name || settings.videoServices.find(v => v.id === booking.videoServiceId)?.name;
          const videoPrice = booking.snapshotVideoService?.price || booking.videoServicePrice;
          
          const handleDownloadImage = async () => {
              const element = document.getElementById('contract-content');
              if (!element) return;
              try {
                  const canvas = await window.html2canvas(element, { 
                      scale: 2, 
                      useCORS: true,
                      backgroundColor: "#ffffff"
                  });
                  const dataUrl = canvas.toDataURL('image/png');
                  const link = document.createElement('a');
                  link.download = `عقد_${booking.groomName}_${booking.date}.png`;
                  link.href = dataUrl;
                  link.click();
              } catch (err) {
                  console.error("Error saving image", err);
                  alert("حدث خطأ أثناء محاولة حفظ الصورة.");
              }
          };

          const handleShareImage = async () => {
              const element = document.getElementById('contract-content');
              if (!element) return;
              try {
                  const canvas = await window.html2canvas(element, { 
                      scale: 2, 
                      useCORS: true,
                      backgroundColor: "#ffffff"
                  });
                  
                  canvas.toBlob(async (blob) => {
                      const file = new File([blob], `عقد_${booking.groomName}.png`, { type: 'image/png' });
                      
                      if (navigator.canShare && navigator.canShare({ files: [file] })) {
                          try {
                              await navigator.share({
                                  files: [file],
                                  title: 'عقد تصوير',
                                  text: `مرحباً، مرفق لكم تفاصيل عقد التصوير الخاص بـ ${booking.groomName} و ${booking.brideName}`
                              });
                          } catch (error) {
                              console.log('Share was aborted or failed', error);
                          }
                      } else {
                          alert("عذراً، متصفحك لا يدعم المشاركة المباشرة للصور. يمكنك حفظ الصورة ومشاركتها يدوياً.");
                          handleDownloadImage();
                      }
                  }, 'image/png');
              } catch (err) {
                  console.error("Error generating image for sharing", err);
                  alert("حدث خطأ أثناء تحضير العقد للمشاركة.");
              }
          };

          return (
            <div className="min-h-screen bg-white text-black font-sans print-container" dir="rtl">
              <div className="print:hidden flex flex-col md:flex-row justify-between items-center gap-4 mb-4 bg-gray-100 p-4 rounded-xl shadow-sm border max-w-3xl mx-auto mt-4">
                  <p className="text-red-600 font-bold">جاهز للطباعة والمشاركة</p>
                  <div className="flex flex-wrap gap-2 md:gap-4 justify-center">
                      <button onClick={handleShareImage} className="bg-green-600 text-white px-4 md:px-6 py-2 rounded-xl font-bold flex items-center gap-2 hover:bg-green-700 transition-colors">
                          <Icons.Share size={18} /> مشاركة
                      </button>
                      <button onClick={handleDownloadImage} className="bg-blue-600 text-white px-4 md:px-6 py-2 rounded-xl font-bold flex items-center gap-2 hover:bg-blue-700 transition-colors">
                          <Icons.ImageIcon size={18} /> حفظ كصورة
                      </button>
                      <button onClick={() => window.print()} className="bg-black text-white px-4 md:px-6 py-2 rounded-xl font-bold flex items-center gap-2 hover:bg-gray-800 transition-colors">
                          <Icons.Printer size={18} /> طباعة
                      </button>
                      <button onClick={onClose} className="bg-gray-300 text-black px-4 md:px-6 py-2 rounded-xl font-bold hover:bg-gray-400 transition-colors">إلغاء</button>
                  </div>
              </div>
              
              <div id="contract-content" className="max-w-3xl mx-auto border-[2px] border-black p-6 relative bg-white contract-print-container">
                
                <header className="flex items-center justify-between mb-4 border-b-[3px] border-black pb-4">
                  <div className="flex items-center gap-3">
                    <div>
                        <h1 className="text-2xl font-black uppercase tracking-tighter" style={{ color: '#000' }}>{settings.studioName || 'اسم الاستوديو'}</h1>
                        <p className="text-[10px] font-bold text-gray-500 tracking-[0.2em] uppercase">Official Contract</p>
                    </div>
                  </div>
                  <div className="text-center">
                      <h2 className="text-xl font-black bg-black text-white px-4 py-1.5 rounded-lg inline-block">عقد اتفاق وتصوير</h2>
                      <p className="mt-2 text-sm font-bold border-b border-black inline-block px-2">التاريخ: {new Date().toLocaleDateString('ar-EG')}</p>
                  </div>
                </header>

                <section className="mb-4">
                  <h3 className="text-lg font-black mb-2 border-r-[3px] border-black pr-2 bg-gray-100 py-1">بيانات التعاقد الأساسية</h3>
                  <ul className="list-none space-y-2 bg-gray-50 p-3 rounded border border-gray-200 font-medium">
                    <li><span className="font-bold text-gray-700 w-24 inline-block">العميل:</span> <span className="font-black text-lg border-b border-black pb-0.5">{booking.groomName} & {booking.brideName}</span></li>
                    <li><span className="font-bold text-gray-700 w-24 inline-block">رقم الهاتف:</span> <span dir="ltr" className="font-bold">{booking.phone}</span></li>
                  </ul>
                </section>

                <section className="mb-4">
                  <h3 className="text-lg font-black mb-2 border-r-[3px] border-black pr-2 bg-gray-100 py-1">تفاصيل المناسبة</h3>
                  <div className="grid grid-cols-2 gap-3 bg-gray-50 p-3 rounded border border-gray-200">
                    <p><span className="font-bold text-gray-700">التاريخ:</span> <span dir="ltr" className="font-bold">{booking.date}</span></p>
                    <p><span className="font-bold text-gray-700">النوع:</span> {booking.sessionType === 'آخر' ? booking.otherSessionType : booking.sessionType}</p>
                    <p><span className="font-bold text-gray-700">اللوكيشن الأساسي:</span> {booking.location === 'آخر' ? booking.otherLocation : (booking.location || '---')}</p>
                    {isPhotoBooking && (
                        <>
                           <p><span className="font-bold text-gray-700">لوكيشن الكاجوال:</span> {booking.casualLocation === 'آخر' ? booking.otherCasualLocation : (booking.casualLocation || '---')}</p>
                           <p><span className="font-bold text-gray-700">الميك أب:</span> {booking.makeupArtist || '---'}</p>
                           <p><span className="font-bold text-gray-700">وقت الخروج:</span> <span dir="ltr" className="font-bold text-red-600">{booking.makeupLeaveTime || '---'}</span></p>
                        </>
                    )}
                  </div>
                </section>

                <section className="mb-4">
                  <h3 className="text-lg font-black mb-2 border-r-[3px] border-black pr-2 bg-gray-100 py-1">الخدمات والأسعار</h3>
                  <div className="bg-gray-50 p-3 rounded border border-gray-200 space-y-3">
                    
                    {isPhotoBooking && (
                        <div>
                            <p><span className="font-bold text-gray-800">الباكيدج الأساسي (فوتوغرافيا):</span> {displayPkgName} <span className="text-gray-600 font-bold">({displayPkgPrice} ج.م)</span></p>
                            {addonsList && addonsList.length > 0 && <p className="mt-1 text-sm"><span className="font-bold text-gray-700">الإضافات:</span> {addonsList.map(a => `${a.name}`).join(' ، ')}</p>}
                        </div>
                    )}

                    {isVideoBooking && booking.snapshotVideoService && (
                        <div className={isPhotoBooking ? "border-t border-gray-300 pt-2" : ""}>
                            <p><span className="font-bold text-gray-800">خدمة الفيديو:</span> {videoName} <span className="text-gray-600 font-bold">({videoPrice} ج.م)</span> {booking.videoStartTime && <span className="text-red-600">| وقت البدء: {booking.videoStartTime}</span>}</p>
                            {booking.videoAddons && booking.videoAddons.length > 0 && <p className="mt-1 text-sm"><span className="font-bold text-gray-700">الإضافات:</span> {booking.videoAddons.map(a => `${a.name}`).join(' ، ')}</p>}
                        </div>
                    )}
                    
                    {booking.notes && (
                         <div className="border-t border-gray-300 pt-2">
                            <p><span className="font-bold text-gray-700">ملاحظات إضافية:</span></p>
                            <p className="text-sm mt-0.5 whitespace-pre-wrap">{booking.notes}</p>
                        </div>
                    )}
                    
                    <div className="border-t-[2px] border-black pt-3 mt-3 grid grid-cols-3 gap-2 text-center">
                        <div className="bg-white border border-gray-300 rounded p-1.5"><p className="text-xs font-bold text-gray-500">إجمالي الحساب</p><p className="text-lg font-black">{booking.totalPrice}</p></div>
                        <div className="bg-white border border-gray-300 rounded p-1.5"><p className="text-xs font-bold text-gray-500">المدفوع (عربون)</p><p className="text-lg font-black">{booking.paid || 0}</p></div>
                        <div className="bg-black text-white rounded p-1.5"><p className="text-xs font-bold opacity-80">المبلغ المتبقي</p><p className="text-lg font-black">{booking.remaining}</p></div>
                    </div>
                  </div>
                </section>

                <section className="mb-6">
                  <h3 className="text-lg font-black mb-2 border-r-[3px] border-black pr-2 bg-gray-100 py-1">الشروط والأحكام</h3>
                  <div className="text-[13px] leading-relaxed text-gray-800 bg-gray-50 p-3 rounded border border-gray-200">
                    <p>١. يقر العميل بمعاينته لأسلوب التصوير ويوافق على التعديلات الفنية التي يراها الاستوديو مناسبة.</p>
                    <p>٢. يلتزم الاستوديو بتسليم العمل خلال الفترة المتفق عليها بعد اختيار الصور.</p>
                    <p className="text-red-700 font-bold">٣. العربون المدفوع لا يُسترد نهائياً في حالة الإلغاء من قبل العميل لأي سبب.</p>
                    <p>٤. تصوير الفيديو Full HD ويُسلم على فلاشة. (لا يمكن الرجوع للاستوديو لاسترجاع البيانات بعد مرور ٣ أشهر).</p>
                  </div>
                </section>

                <footer className="flex justify-between px-12 pt-6 border-t-[2px] border-black">
                  <div className="text-center">
                    <p className="font-bold text-lg mb-8">توقيع الاستوديو</p>
                    <p className="border-t border-black w-40 pt-1 font-bold text-gray-600 text-sm">{settings.studioName || 'اسم الاستوديو'}</p>
                  </div>
                  <div className="text-center">
                    <p className="font-bold text-lg mb-8">توقيع العميل</p>
                    <p className="border-t border-black w-40 pt-1"></p>
                  </div>
                </footer>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
