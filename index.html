            MessageCircle: (props) => <Icon path="<path d='M7.9 20A9 9 0 1 0 4 16.1L2 22Z'/>" {...props}/>,

            Search: (props) => <Icon path="<circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/>" {...props}/>,

            Trash2: (props) => <Icon path="<path d='M3 6h18'/><path d='M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6'/><path d='M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2'/><line x1='10' x2='10' y1='11' y2='17'/><line x1='14' x2='14' y1='11' y2='17'/>" {...props}/>,
            Save: (props) => <Icon path="<path d='M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z'/><polyline points='17 21 17 13 7 13 7 21'/><polyline points='7 3 7 8 15 8'/>" {...props}/>,
            Plus: (props) => <Icon path="<path d='M5 12h14'/><path d='M12 5v14'/>" {...props}/>,
            AlertTriangle: (props) => <Icon path="<path d='m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z'/><path d='M12 9v4'/><path d='M12 17h.01'/>" {...props}/>,
            LogOut: (props) => <Icon path="<path d='M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4'/><polyline points='16 17 21 12 16 7'/><line x1='21' x2='9' y1='12' y2='12'/>" {...props}/>,
            CalendarPlus: (props) => <Icon path="<path d='M21 13V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8'/><line x1='16' x2='16' y1='2' y2='6'/><line x1='8' x2='8' y1='2' y2='6'/><line x1='3' x2='21' y1='10' y2='10'/><line x1='19' x2='19' y1='16' y2='22'/><line x1='16' x2='22' y1='19' y2='19'/>" {...props}/>,
            Info: (props) => <Icon path="<circle cx='12' cy='12' r='10'/><line x1='12' x2='12' y1='16' y2='12'/><line x1='12' x2='12.01' y1='8' y2='8'/>" {...props}/>,
            TrendingUp: (props) => <Icon path="<polyline points='23 6 13.5 15.5 8.5 10.5 1 18'/><polyline points='17 6 23 6 23 12'/>" {...props}/>
        };

        // --- Firebase Configuration ---
        const firebaseConfig = {
          apiKey: "AIzaSyB0G8-iLXf0UOZzJ3xuJZRMBfNPUooJpF0",
          authDomain: "gen-lang-client-0813248919.firebaseapp.com",
          projectId: "gen-lang-client-0813248919",
          storageBucket: "gen-lang-client-0813248919.firebasestorage.app",
          messagingSenderId: "609989118150",
          appId: "1:609989118150:web:783c577d877cde63412fc7",
          measurementId: "G-9RHXZTW54Z"
        };

        let isFirebaseActive = false;

        const DEFAULT_SETTINGS = {
          packages: [
            { id: 'p1', name: 'Wedding Basic', price: 5000 },
            { id: 'p2', name: 'Wedding Premium', price: 10000 },
            { id: 'p3', name: 'Engagement', price: 6000 },
            { id: 'p4', name: 'Casual', price: 3000 },
            { id: 'p5', name: 'Henna', price: 4000 }
          ],
          addons: [
            { id: 'a1', name: 'Drone Video', price: 1500 },
            { id: 'a2', name: 'Luxury Album', price: 2000 },
            { id: 'a3', name: 'Extra Photos', price: 1000 },
            { id: 'a4', name: 'Highlight Video', price: 2500 }
          ],
          videoServices: [
            { id: 'v1', name: 'كاميرا فردى', subtext: 'بليل فقط', price: 1500 },
            { id: 'v2', name: 'كاميرا مزمار', subtext: 'طول اليوم بدون عروسه', price: 2000 },
            { id: 'v3', name: 'وحدة ميكسر كامله', subtext: '', price: 3000 },
            { id: 'v4', name: 'وحدة ميكسر مزمار', subtext: 'طول اليوم من بعد الظهر', price: 3500 }
          ],
          videoAddons: [
            { id: 'va1', name: 'شاشه عرض', price: 1000 },
            { id: 'va2', name: 'درون', price: 1500 },
            { id: 'va4', name: 'كاميرا كرين', price: 2500 }
          ],
          locations: ['Wave', 'Amazon', 'River', 'Green Land', 'Vibes', 'Atlantis', 'آخر'],
          casualLocations: ['Wave', 'Amazon', 'River', 'Green Land', 'Vibes', 'Atlantis', 'المنصورة الجديدة', 'آخر'],
          sessionTypes: ['زفاف', 'خطوبة', 'كاجول', 'حنة', 'كتب كتاب', 'فوتوغرافي', 'آخر']
        };

        const LOGO_URL = "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh1m611kUbdULF_cv77ptyLsq5ssUUC1GGxZB65Ark2rIeXdbQr__HuuMbl6XbxKt-JNY3ZcGtgC-WjuJaIJTq1Be_DScv2TVEizbU4E1NYzDNj0iiNOIUESe2XyVs5CMgtzc-xsqLsMpYxun6IqzzQ6d8staQJWyUQM_CrGGt6zkLz0gsxONtu8Yd2Jfo/w640-h640/Gemini_Generated_Image_larjc1larjc1larj.png";

        // Helper to generate Google Calendar Link
        const generateGoogleCalendarLink = (booking) => {
            const dateObj = new Date(booking.date);
            if (isNaN(dateObj)) return "";
            const startStr = dateObj.toISOString().split('T')[0].replace(/-/g, '');
            dateObj.setDate(dateObj.getDate() + 1);
            const endStr = dateObj.toISOString().split('T')[0].replace(/-/g, '');
            const session = booking.sessionType === 'آخر' ? booking.otherSessionType : booking.sessionType;
            const loc = booking.location === 'آخر' ? booking.otherLocation : booking.location;
            const casualLoc = booking.casualLocation === 'آخر' ? booking.otherCasualLocation : (booking.casualLocation || 'لا يوجد');
            const title = encodeURIComponent(`📸 تصوير ${session} - ${booking.groomName} & ${booking.brideName}`);
            let desc = `📞 الهاتف: ${booking.phone}\n🏠 العنوان: ${booking.address || 'غير مسجل'}\n💄 ميك أب: ${booking.makeupArtist || 'غير محدد'} (خروج: ${booking.makeupLeaveTime || '--:--'})\n📍 اللوكيشن: ${loc || 'غير محدد'}\n📸 كاجوال: ${casualLoc}\n\n💰 مالي:\n- الإجمالي: ${booking.totalPrice} ج.م\n- المتبقي: ${booking.remaining} ج.م\n\n⚠️ تنبيه: تصوير Full HD.`;
            return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${startStr}/${endStr}&details=${encodeURIComponent(desc)}&location=${encodeURIComponent(loc || '')}`;
        };

        // --- Shared Helper Components ---
        function InputField({ label, type = "text", value, onChange, placeholder, required }) {
          return (
            <div className="flex flex-col w-full">
              <label className="text-xs text-gray-500 mb-1">{label} {required && <span className="text-red-500">*</span>}</label>
              <input 
                type={type} 
                min={type === 'number' ? "0" : undefined} 
                value={value} 
                onChange={onChange} 
                placeholder={placeholder} 
                required={required} 
                className="bg-black border border-[#333] text-white rounded-xl p-3 focus:outline-none focus:border-[#D4AF37] transition-all" 
              />
            </div>
          );
        }

        function SelectField({ label, value, onChange, options = [] }) {
          return (
            <div className="flex flex-col w-full">
              <label className="text-xs text-gray-500 mb-1">{label}</label>
              <select value={value} onChange={onChange} className="bg-black border border-[#333] text-white rounded-xl p-3 outline-none focus:border-[#D4AF37]">
                {options?.map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
              </select>
            </div>
          );
        }

        function DetailRow({ label, value, isMono }) {
          return (
            <div className="flex flex-col border-b border-[#222] pb-2">
              <span className="text-xs text-gray-500">{label}</span>
              <span className={`text-sm font-bold text-white ${isMono ? 'font-mono' : ''}`}>{value || '---'}</span>
            </div>
          );
        }

        // --- Main App Component ---
        function App() {
          const [user, setUser] = useState(null);
          const [isCheckingAuth, setIsCheckingAuth] = useState(true);
          const [isFirebaseActiveState, setIsFirebaseActiveState] = useState(false);
          const [bookings, setBookings] = useState(() => {
              const saved = localStorage.getItem('mrakby_bookings');
              return saved ? JSON.parse(saved) : [];
          });
          const [settings, setSettings] = useState(() => {
              const saved = localStorage.getItem('mrakby_settings');
              return saved ? JSON.parse(saved) : DEFAULT_SETTINGS;
          });
          const [currentView, setCurrentView] = useState('dashboard');
          const [contractToPrint, setContractToPrint] = useState(null);
          const [toast, setToast] = useState(null);
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const [initialBookingDate, setInitialBookingDate] = useState('');

          useEffect(() => {
              if (firebaseConfig.apiKey && window.firebase) {
                  try {
                      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                      isFirebaseActive = true;
                      setIsFirebaseActiveState(true);
                      firebase.auth().onAuthStateChanged((usr) => {
                          setUser(usr);
                          setIsCheckingAuth(false);
                      });
                  } catch(e) {
                      console.error("Firebase init error", e);
                      setIsCheckingAuth(false);
                  }
              } else {
                  const localUser = localStorage.getItem('mrakby_local_user');
                  if(localUser) setUser(JSON.parse(localUser));
                  setIsCheckingAuth(false);
              }
          }, []);

          useEffect(() => {
              if (!user || !isFirebaseActive || !window.firebase) return;
              const db = firebase.firestore();
              const unsubB = db.collection('users').doc(user.uid).collection('bookings').onSnapshot((snap) => {
                  const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                  data.sort((a, b) => new Date(b.date) - new Date(a.date));
                  setBookings(data);
              });
              const unsubS = db.collection('users').doc(user.uid).collection('settings').doc('config').onSnapshot((snap) => {
                  if(snap.exists) setSettings({ ...DEFAULT_SETTINGS, ...snap.data() });
              });
              return () => { unsubB(); unsubS(); };
          }, [user, isFirebaseActiveState]);

          useEffect(() => { localStorage.setItem('mrakby_bookings', JSON.stringify(bookings)); }, [bookings]);
          useEffect(() => { localStorage.setItem('mrakby_settings', JSON.stringify(settings)); }, [settings]);

          const showToast = (message, type = 'success') => {
            setToast({ message, type });
            setTimeout(() => setToast(null), 3000);
          };

          const handleLogout = () => {
              if (isFirebaseActive && window.firebase) firebase.auth().signOut();
              else { localStorage.removeItem('mrakby_local_user'); setUser(null); }
              setCurrentView('dashboard');
          };

          const navigateToNewBooking = (dateStr = '') => {
            setInitialBookingDate(dateStr);
            setCurrentView('new');
            setIsMobileMenuOpen(false);
          };

          if (isCheckingAuth) return <div className="min-h-screen bg-[#0a0a0a] flex items-center justify-center"><p className="text-[#D4AF37] font-bold text-xl">جاري التحميل...</p></div>;
          if (!user) return <LoginScreen onLogin={setUser} isFirebaseActive={isFirebaseActiveState} showToast={showToast} />;
          if (contractToPrint) return <ContractPrintView booking={contractToPrint} settings={settings} onClose={() => setContractToPrint(null)} />;

          return (
            <div className="min-h-screen bg-[#0a0a0a] text-gray-200 font-sans" dir="rtl">
              {toast && (
                <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-lg shadow-2xl z-50 flex items-center gap-2 transition-all ${toast.type === 'error' ? 'bg-red-900 text-white' : 'bg-[#D4AF37] text-black'}`}>
                  <Icons.CheckCircle size={20} />
                  <span className="font-bold">{toast.message}</span>
                </div>
              )}

              <div className="md:hidden flex items-center justify-between bg-[#111] p-4 border-b border-[#D4AF37]/30">
                <h1 className="text-[#D4AF37] font-bold text-xl flex items-center gap-2">
                  <img src={LOGO_URL} alt="Mrakby Logo" className="w-8 h-8 rounded-full border border-[#D4AF37]" /> Mrakby
                </h1>
                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-[#D4AF37]">
                  {isMobileMenuOpen ? <Icons.X size={28} /> : <Icons.LayoutDashboard size={28} />}
                </button>
              </div>

              <div className="flex flex-col md:flex-row min-h-screen">
                <aside className={`${isMobileMenuOpen ? 'block' : 'hidden'} md:block w-full md:w-64 bg-[#111] border-l border-[#222] p-6 flex-shrink-0 transition-all flex flex-col`}>
                  <div className="hidden md:flex items-center gap-3 mb-10">
                    <div className="p-1 rounded-full border-2 border-[#D4AF37] shadow-[0_0_15px_rgba(212,175,55,0.2)]"><img src={LOGO_URL} className="w-12 h-12 rounded-full" /></div>
                    <div><h1 className="text-[#D4AF37] font-bold text-xl leading-tight">Mrakby</h1><p className="text-xs text-gray-400 tracking-widest uppercase">Photography</p></div>
                  </div>
                  <nav className="space-y-2 flex-1">
                    <NavItem icon={<Icons.LayoutDashboard />} label="الرئيسية" active={currentView === 'dashboard'} onClick={() => {setCurrentView('dashboard'); setIsMobileMenuOpen(false);}} />
                    <NavItem icon={<Icons.PlusCircle />} label="حجز جديد" active={currentView === 'new'} onClick={() => navigateToNewBooking('')} />
                    <NavItem icon={<Icons.Users />} label="العملاء" active={currentView === 'clients'} onClick={() => {setCurrentView('clients'); setIsMobileMenuOpen(false);}} />
                    <NavItem icon={<Icons.CalendarIcon />} label="التقويم" active={currentView === 'calendar'} onClick={() => {setCurrentView('calendar'); setIsMobileMenuOpen(false);}} />
                    <NavItem icon={<Icons.Settings />} label="الإعدادات" active={currentView === 'settings'} onClick={() => {setCurrentView('settings'); setIsMobileMenuOpen(false);}} />
                  </nav>
                  <div className="mt-auto pt-10 space-y-4">
                    <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 bg-red-900/20 text-red-500 py-2 rounded-xl border border-red-900/50 hover:bg-red-900/40 transition-colors"><Icons.LogOut size={18} /> تسجيل الخروج</button>
                    <div className="p-4 bg-black/50 rounded-xl border border-[#D4AF37]/20 text-center"><p className="text-xs text-gray-500 mb-1">Studio ID</p><p className="font-mono text-[#D4AF37] font-bold">#MRKBY_2026</p></div>
                  </div>
                </aside>

                <main className="flex-1 p-4 md:p-8 overflow-y-auto">
                  {currentView === 'dashboard' && <Dashboard bookings={bookings} />}
                  {currentView === 'new' && <NewBooking settings={settings} initialDate={initialBookingDate} user={user} isFirebaseActive={isFirebaseActiveState} onSuccess={(newB) => { if(!isFirebaseActiveState) setBookings([newB, ...bookings].sort((a, b) => new Date(b.date) - new Date(a.date))); setCurrentView('clients'); }} showToast={showToast} />}
                  {currentView === 'clients' && <ClientsList bookings={bookings} settings={settings} onPrint={setContractToPrint} showToast={showToast} user={user} isFirebaseActive={isFirebaseActiveState} onLocalDelete={(id) => setBookings(bookings.filter(b => b.id !== id))} />}
                  {currentView === 'calendar' && <CalendarView bookings={bookings} onDayClick={navigateToNewBooking} settings={settings} showToast={showToast} />}
                  {currentView === 'settings' && <SettingsView settings={settings} user={user} isFirebaseActive={isFirebaseActiveState} onLocalSave={(s) => setSettings(s)} showToast={showToast} />}
                </main>
              </div>
            </div>
          );
        }

        // --- Screens ---

        function LoginScreen({ onLogin, isFirebaseActive, showToast }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isRegistering, setIsRegistering] = useState(false);
            const handleAuth = async (e) => {
                e.preventDefault(); setIsLoading(true);
                if (isFirebaseActive && window.firebase) {
                    try {
                        let userCredential = isRegistering ? await firebase.auth().createUserWithEmailAndPassword(email, password) : await firebase.auth().signInWithEmailAndPassword(email, password);
                        onLogin(userCredential.user);
                    } catch (error) { showToast("خطأ في البيانات!", "error"); }
                } else {
                    if(email && password) { const usr = { uid: 'local_admin', email }; localStorage.setItem('mrakby_local_user', JSON.stringify(usr)); onLogin(usr); } 
                    else showToast("أدخل البيانات", "error");
                }
                setIsLoading(false);
            };
            return (
                <div className="min-h-screen bg-[#0a0a0a] flex items-center justify-center p-4">
                    <div className="bg-[#111] p-8 rounded-3xl border border-[#D4AF37]/30 w-full max-w-md shadow-2xl">
                        <div className="text-center mb-8"><img src={LOGO_URL} className="w-20 h-20 rounded-full mx-auto mb-4 border border-[#D4AF37]"/><h1 className="text-2xl font-bold text-[#D4AF37]">MRAKBY STUDIO</h1></div>
                        <form onSubmit={handleAuth} className="space-y-4">
                            <input type="email" value={email} onChange={e => setEmail(e.target.value)} required className="w-full bg-black border border-[#333] text-white rounded-xl p-3 outline-none focus:border-[#D4AF37]" placeholder="البريد الإلكتروني" />
                            <input type="password" value={password} onChange={e => setPassword(e.target.value)} required className="w-full bg-black border border-[#333] text-white rounded-xl p-3 outline-none focus:border-[#D4AF37]" placeholder="كلمة المرور" />
                            <button type="submit" disabled={isLoading} className="w-full bg-[#D4AF37] text-black font-bold py-3 rounded-xl">{isLoading ? 'جاري التحميل...' : (isRegistering ? 'إنشاء حساب' : 'دخول')}</button>
                        </form>
                        <div className="mt-4 text-center"><button onClick={() => setIsRegistering(!isRegistering)} className="text-gray-500 text-sm">{isRegistering ? 'دخول؟' : 'إنشاء حساب؟'}</button></div>
                    </div>
                </div>
            );
        }

        function Dashboard({ bookings }) {
          const stats = useMemo(() => {
            let rev = 0, paid = 0, counts = { 'زفاف': 0, 'خطوبة': 0, 'كاجول': 0, 'حنة': 0, 'كتب كتاب': 0, 'فوتوغرافي': 0 };
            const monthly = {};
            const monthNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
            bookings.forEach(b => {
              const bRev = Number(b.totalPrice) || 0; const bPaid = Number(b.paid) || 0; rev += bRev; paid += bPaid;
              const type = b.sessionType === 'آخر' ? b.otherSessionType : b.sessionType;
              if (counts[type] !== undefined) counts[type]++; else counts[type] = 1;
              const d = new Date(b.date);
              if (!isNaN(d)) {
                  const mKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                  if (!monthly[mKey]) monthly[mKey] = { label: `${monthNames[d.getMonth()]} ${d.getFullYear()}`, rev: 0, count: 0 };
                  monthly[mKey].rev += bRev; monthly[mKey].count += 1;
              }
            });
            const sortedMonths = Object.keys(monthly).sort().reverse().map(key => monthly[key]);
            const maxMonthlyRev = Math.max(...sortedMonths.map(m => m.rev), 1);
            return { total: bookings.length, rev, paid, outstanding: rev - paid, counts, sortedMonths, maxMonthlyRev };
          }, [bookings]);
          return (
            <div className="space-y-8 animate-fadeIn">
              <header><h2 className="text-3xl font-bold">لوحة التحكم 📸</h2></header>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                <StatCard title="إجمالي الحجوزات" value={stats.total} subtitle="حجز" />
                <StatCard title="إجمالي الإيرادات" value={`${stats.rev.toLocaleString()} ج.م`} highlight />
                <StatCard title="المبالغ المتبقية" value={`${stats.outstanding.toLocaleString()} ج.م`} alert={stats.outstanding > 0} />
              </div>
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div className="bg-[#111] p-6 rounded-3xl border border-[#222] shadow-xl">
                  <div className="flex items-center gap-2 mb-6"><Icons.TrendingUp className="text-[#D4AF37]" size={20} /><h3 className="text-[#D4AF37] font-bold text-xl">إحصائيات الشهور</h3></div>
                  <div className="space-y-6">{stats.sortedMonths.map((m, i) => (
                    <div key={i} className="space-y-2">
                      <div className="flex justify-between items-end"><div><p className="text-white font-bold">{m.label}</p><p className="text-xs text-gray-500">{m.count} حجز</p></div><p className="text-[#D4AF37] font-bold">{m.rev.toLocaleString()} ج.م</p></div>
                      <div className="h-2 bg-black rounded-full overflow-hidden"><div className="h-full bg-gradient-to-l from-[#D4AF37] to-[#B8860B] transition-all duration-1000" style={{ width: `${(m.rev / stats.maxMonthlyRev) * 100}%` }}></div></div>
                    </div>
                  ))}</div>
                </div>
                <div className="bg-[#111] p-6 rounded-3xl border border-[#222] shadow-xl">
                  <div className="flex items-center gap-2 mb-6"><Icons.Camera className="text-[#D4AF37]" size={20} /><h3 className="text-[#D4AF37] font-bold text-xl">أنواع الحجوزات</h3></div>
                  <div className="grid grid-cols-1 gap-2">{Object.entries(stats.counts).filter(([_, c]) => c > 0).map(([t, c]) => (<div key={t} className="flex justify-between py-3 px-4 rounded-xl bg-black/40 border border-white/5 hover:border-[#D4AF37]/30 transition-colors"><span className="text-gray-300">{t}</span><span className="font-bold text-[#D4AF37]">{c}</span></div>))}</div>
                </div>
              </div>
            </div>
          );
        }

        function StatCard({ title, value, subtitle, highlight, alert }) {
          return (<div className={`p-6 rounded-3xl border ${highlight ? 'bg-[#D4AF37]/10 border-[#D4AF37]/50' : 'bg-[#111] border-[#222]'}`}><h3 className="text-gray-500 text-sm mb-1">{title}</h3><p className={`text-3xl font-bold ${alert ? 'text-red-500' : 'text-white'}`}>{value}</p><p className="text-xs text-gray-600 mt-1">{subtitle}</p></div>);
        }

        function NavItem({ icon, label, active, onClick }) {
          return (<button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${active ? 'bg-[#D4AF37] text-black font-bold' : 'text-gray-400 hover:bg-white/5'}`}>{icon}<span>{label}</span></button>);
        }

        function NewBooking({ settings, initialDate, onSuccess, showToast, user, isFirebaseActive }) {
            const [formData, setFormData] = useState({
                groomName: '', brideName: '', phone: '', address: '', date: initialDate || '', location: '', otherLocation: '',
                sessionType: settings.sessionTypes[0], otherSessionType: '', makeupArtist: '', makeupLeaveTime: '', casualLocation: '', otherCasualLocation: '', packageId: '', addons: [], paid: '',
                videoServiceId: '', videoServicePrice: '', videoStartTime: '', videoAddons: []
            });
            const [isSubmitting, setIsSubmitting] = useState(false);
            useEffect(() => { if (initialDate) setFormData(p => ({ ...p, date: initialDate })); }, [initialDate]);
            const pkg = settings.packages.find(p => p.id === formData.packageId) || { price: 0 };
            const addonsTot = formData.addons.reduce((s, id) => s + (settings.addons.find(a => a.id === id)?.price || 0), 0);
            const vServPrice = Number(formData.videoServicePrice) || 0;
            const vAddTot = formData.videoAddons.reduce((s, a) => s + (Number(a.price) || 0), 0);
            const total = Number(pkg.price) + addonsTot + vServPrice + vAddTot;
            const remaining = total - (Number(formData.paid) || 0);

            const submit = async (e) => {
                e.preventDefault(); if (!formData.groomName || !formData.date || !formData.packageId) return showToast("أكمل البيانات الأساسية", "error");
                setIsSubmitting(true);
                const snap = {
                    id: 'b_' + Date.now(), ...formData,
                    snapshotPackage: { name: pkg.name, price: pkg.price },
                    snapshotAddons: formData.addons.map(id => { const a = settings.addons.find(x => x.id === id); return a ? { name: a.name, price: a.price } : null; }).filter(Boolean),
                    snapshotVideoService: formData.videoServiceId ? { name: settings.videoServices.find(v => v.id === formData.videoServiceId)?.name, price: formData.videoServicePrice } : null,
                    totalPrice: total, remaining, createdAt: new Date().toISOString()
                };
                if (isFirebaseActive && user && window.firebase) {
                    try { await firebase.firestore().collection('users').doc(user.uid).collection('bookings').add(snap); onSuccess(snap); } catch(e) { showToast("خطأ سحابي", "error"); }
                } else { onSuccess(snap); showToast("تم الحفظ محلياً"); }
                setIsSubmitting(false);
            };

            return (
                <div className="max-w-4xl mx-auto pb-10 animate-fadeIn">
                    <h2 className="text-3xl font-bold text-[#D4AF37] mb-8 border-b border-[#D4AF37]/20 pb-4">تسجيل حجز جديد</h2>
                    <form onSubmit={submit} className="space-y-6">
                        <div className="bg-[#111] p-6 rounded-3xl border border-[#222] grid grid-cols-1 md:grid-cols-2 gap-4">
                            <InputField label="اسم العريس" value={formData.groomName} onChange={e => setFormData({...formData, groomName: e.target.value})} required />
                            <InputField label="اسم العروسة" value={formData.brideName} onChange={e => setFormData({...formData, brideName: e.target.value})} required />
                            <InputField label="الهاتف" type="tel" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} required />
                            <InputField label="العنوان" value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} />
                        </div>
                        <div className="bg-[#111] p-6 rounded-3xl border border-[#222] grid grid-cols-1 md:grid-cols-2 gap-4">
                            <SelectField label="نوع السيشن" value={formData.sessionType} onChange={e => setFormData({...formData, sessionType: e.target.value})} options={settings.sessionTypes} />
                            <InputField label="التاريخ" type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} required />
                            <SelectField label="اللوكيشن" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} options={['', ...settings.locations]} />
                            <InputField label="اسم الميك أب" value={formData.makeupArtist} onChange={e => setFormData({...formData, makeupArtist: e.target.value})} />
                            <InputField label="وقت الخروج" type="time" value={formData.makeupLeaveTime} onChange={e => setFormData({...formData, makeupLeaveTime: e.target.value})} />
                        </div>
                        <div className="bg-[#111] p-6 rounded-3xl border border-[#222]">
                            <h4 className="mb-4 font-bold text-[#D4AF37]">الباكيدج والإضافات</h4>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6">
                                {settings.packages.map(p => (<div key={p.id} onClick={() => setFormData({...formData, packageId: p.id})} className={`p-4 rounded-2xl border cursor-pointer transition-all ${formData.packageId === p.id ? 'border-[#D4AF37] bg-[#D4AF37]/10' : 'border-[#333]'}`}><p className="font-bold">{p.name}</p><p className="text-xs text-gray-500">{p.price} ج.م</p></div>))}
                            </div>
                        </div>
                        <div className="bg-[#D4AF37] text-black p-6 rounded-3xl flex flex-col md:flex-row justify-between items-center gap-4 shadow-xl">
                            <div><p className="text-sm font-bold opacity-60 uppercase">إجمالي المبلغ</p><p className="text-4xl font-bold">{total} ج.م</p></div>
                            <div className="w-full md:w-48"><input type="number" value={formData.paid} onChange={e => setFormData({...formData, paid: e.target.value})} className="w-full p-3 rounded-xl bg-black/10 border border-black/20 text-black font-bold placeholder-black/40" placeholder="المبلغ المدفوع" /></div>
                            <div className="text-left"><p className="text-sm font-bold opacity-60 uppercase">المتبقي</p><p className="text-4xl font-bold">{remaining} ج.م</p></div>
                        </div>
                        <button type="submit" disabled={isSubmitting} className="w-full bg-[#D4AF37] text-black font-bold py-4 rounded-3xl shadow-2xl hover:bg-yellow-500">{isSubmitting ? 'جاري الحفظ...' : 'تأكيد الحجز وحفظ البيانات'}</button>
                    </form>
                </div>
            );
        }

        function ClientsList({ bookings, settings, onPrint, showToast, user, isFirebaseActive, onLocalDelete }) {
            const [search, setSearch] = useState('');
            const filtered = bookings.filter(b => b.phone?.includes(search) || b.groomName?.includes(search));
            const remove = async (id) => {
                if(!confirm("حذف الحجز؟")) return;
                if (isFirebaseActive && user) { try { await firebase.firestore().collection('users').doc(user.uid).collection('bookings').doc(id).delete(); showToast("تم الحذف"); } catch(e) { showToast("خطأ", "error"); } }
                else { onLocalDelete(id); showToast("تم الحذف"); }
            };
            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center"><h2 className="text-3xl font-bold">العملاء</h2><input type="text" placeholder="بحث بالهاتف أو الاسم..." value={search} onChange={e => setSearch(e.target.value)} className="bg-[#111] border border-[#333] p-3 rounded-xl outline-none focus:border-[#D4AF37] w-64"/></div>
                    <div className="bg-[#111] rounded-3xl border border-[#333] overflow-x-auto"><table className="w-full text-right"><thead className="bg-black/40 border-b border-[#222]"><tr><th className="p-4">العروسين</th><th className="p-4">التاريخ</th><th className="p-4">المتبقي</th><th className="p-4">إجراءات</th></tr></thead><tbody>
                        {filtered.map(b => (
                            <tr key={b.id} className="border-b border-[#222] hover:bg-white/5">
                                <td className="p-4 font-bold">{b.groomName} & {b.brideName}</td><td className="p-4 text-sm text-gray-400">{b.date}</td><td className="p-4 text-red-500 font-bold">{b.remaining} ج.م</td>
                                <td className="p-4 flex gap-2">
                                    <button onClick={() => window.open(generateGoogleCalendarLink(b), '_blank')} className="p-2 bg-blue-500/20 text-blue-500 rounded-lg"><Icons.CalendarPlus size={18}/></button>
                                    <button onClick={() => onPrint(b)} className="p-2 bg-[#D4AF37]/20 text-[#D4AF37] rounded-lg"><Icons.Printer size={18}/></button>
                                    <button onClick={() => remove(b.id)} className="p-2 bg-red-500/20 text-red-500 rounded-lg"><Icons.Trash2 size={18}/></button>
                                </td>
                            </tr>
                        ))}
                    </tbody></table></div>
                </div>
            );
        }

        function CalendarView({ bookings, onDayClick, settings, showToast }) {
          const [selectedBooking, setSelectedBooking] = useState(null);
          const today = new Date();
          const year = today.getFullYear();
          const month = today.getMonth(); 
          const daysInMonth = new Date(year, month + 1, 0).getDate();
          const firstDayIndex = new Date(year, month, 1).getDay();
          const days = [];
          for(let i=0; i<firstDayIndex; i++) days.push(null);
          for(let i=1; i<=daysInMonth; i++) days.push(i);
          const monthNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];

          return (
            <div className="animate-fadeIn max-w-5xl mx-auto pb-10 relative">
              {selectedBooking && (
                <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[60] p-4 animate-fadeIn">
                  <div className="bg-[#111] border border-[#D4AF37]/30 p-6 rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-y-auto no-scrollbar shadow-2xl">
                    <div className="flex justify-between items-center mb-6 border-b border-[#222] pb-4">
                      <h3 className="text-2xl font-bold text-[#D4AF37]">بيانات الحجز التفصيلية</h3>
                      <button onClick={() => setSelectedBooking(null)} className="text-gray-400 hover:text-white"><Icons.X size={30} /></button>
                    </div>
                    <div className="space-y-6">
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <DetailRow label="العريس" value={selectedBooking.groomName} />
                        <DetailRow label="العروسة" value={selectedBooking.brideName} />
                        <DetailRow label="الهاتف" value={selectedBooking.phone} isMono />
                        <DetailRow label="التاريخ" value={selectedBooking.date} />
                        <DetailRow label="نوع السيشن" value={selectedBooking.sessionType === 'آخر' ? selectedBooking.otherSessionType : selectedBooking.sessionType} />
                        <DetailRow label="اللوكيشن" value={selectedBooking.location === 'آخر' ? selectedBooking.otherLocation : selectedBooking.location} />
                        <DetailRow label="الميك أب" value={selectedBooking.makeupArtist || 'غير محدد'} />
                        <DetailRow label="خروج ميك أب" value={selectedBooking.makeupLeaveTime || '--:--'} />
                        <DetailRow label="العنوان" value={selectedBooking.address || 'غير محدد'} />
                      </div>
                      <div className="bg-black/40 p-4 rounded-2xl border border-[#222]">
                        <h4 className="text-[#D4AF37] font-bold mb-2 flex items-center gap-2"><Icons.Camera size={18} /> الباكيج والإضافات</h4>
                        <p className="text-sm">الباكيدج: {selectedBooking.snapshotPackage?.name} ({selectedBooking.snapshotPackage?.price} ج.م)</p>
                      </div>
                      <div className="bg-[#D4AF37]/10 p-4 rounded-2xl border border-[#D4AF37]/30 flex justify-between items-center shadow-lg">
                        <div><p className="text-xs text-gray-400 uppercase">إجمالي الحساب</p><p className="text-2xl font-bold text-white">{selectedBooking.totalPrice} ج.م</p></div>
                        <div className="text-left border-r border-[#D4AF37]/20 pr-4"><p className="text-xs text-gray-400 uppercase">المبلغ المتبقي</p><p className="text-2xl font-bold text-red-500">{selectedBooking.remaining} ج.م</p></div>
                      </div>
                    </div>
                    <a href={generateGoogleCalendarLink(selectedBooking)} target="_blank" className="w-full mt-6 bg-[#4285F4] text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-blue-600 transition-colors shadow-md"><Icons.CalendarPlus size={20} /> مزامنة مع تقويم جوجل</a>
                  </div>
                </div>
              )}
              <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <h2 className="text-3xl font-bold text-[#D4AF37]">تقويم الحجوزات</h2>
                <div className="text-xl bg-[#111] px-6 py-2 rounded-xl border border-[#333] shadow-lg">{monthNames[month]} {year}</div>
              </div>
              <div className="bg-[#111] rounded-3xl border border-[#333] p-6 shadow-2xl">
                <div className="grid grid-cols-7 gap-1 md:gap-2 mb-4 text-center font-bold text-gray-500 text-sm md:text-base uppercase tracking-wider"><div>الأحد</div><div>الإثنين</div><div>الثلاثاء</div><div>الأربعاء</div><div>الخميس</div><div>الجمعة</div><div>السبت</div></div>
                <div className="grid grid-cols-7 gap-1 md:gap-3">
                  {days.map((day, idx) => {
                    if (!day) return <div key={`empty-${idx}`} className="h-24 md:h-36 bg-black/20 rounded-2xl border border-transparent"></div>;
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const dayBookings = bookings.filter(b => b.date === dateStr);
                    return (
                      <div key={idx} onClick={() => onDayClick(dateStr)} className={`h-24 md:h-36 p-1 md:p-3 rounded-2xl border cursor-pointer hover:border-[#D4AF37] transition-all group ${dayBookings.length > 0 ? 'border-[#D4AF37]/40 bg-[#D4AF37]/5' : 'border-[#222] bg-black/40'}`}>
                        <span className={`text-xs md:text-sm font-bold ${dayBookings.length > 0 ? 'text-[#D4AF37]' : 'text-gray-500'}`}>{day}</span>
                        <div className="mt-2 space-y-1.5 overflow-y-auto max-h-[70%] no-scrollbar">
                          {dayBookings.map((b, i) => (<div key={i} onClick={(e) => { e.stopPropagation(); setSelectedBooking(b); }} className="text-[9px] md:text-[11px] bg-[#D4AF37] text-black px-2 py-1 rounded-lg font-bold truncate flex items-center gap-1 hover:scale-105 transition-transform"><Icons.Camera size={10} /> {b.groomName}</div>))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        }

        function SettingsView({ settings, user, isFirebaseActive, onLocalSave, showToast }) {
            const [s, setS] = useState(settings);
            useEffect(() => setS(settings), [settings]);
            const save = async () => {
                if (isFirebaseActive && user) { try { await firebase.firestore().collection('users').doc(user.uid).collection('settings').doc('config').set(s); showToast("حفظ سحابي ✅"); } catch(e) { showToast("خطأ", "error"); } }
                else { onLocalSave(s); showToast("حفظ محلي ✅"); }
            };
            return (
                <div className="space-y-6 pb-20">
                    <div className="flex justify-between border-b border-[#D4AF37]/20 pb-4"><h2 className="text-3xl font-bold">الإعدادات</h2><button onClick={save} className="bg-[#D4AF37] text-black px-6 py-2 rounded-xl font-bold">حفظ التعديلات</button></div>
                    <div className="bg-[#111] p-6 rounded-3xl border border-[#222] shadow-xl"><h3 className="mb-4 font-bold text-[#D4AF37]">الباكيدجات الأساسية</h3><div className="space-y-2">{s.packages.map(p => (<div key={p.id} className="flex justify-between py-2 border-b border-white/5"><span>{p.name}</span><span className="text-[#D4AF37] font-bold">{p.price} ج.م</span></div>))}</div></div>
                </div>
            );
        }

        function ContractPrintView({ booking, settings, onClose }) {
          return (
            <div className="min-h-screen bg-white text-black p-10 font-sans" dir="rtl">
              <div className="print:hidden flex justify-between mb-8 bg-gray-100 p-4 rounded-xl shadow"><p className="text-red-500 font-bold">جاهز للطباعة A4</p><div className="flex gap-4"><button onClick={() => window.print()} className="bg-[#D4AF37] text-black px-6 py-2 rounded-xl font-bold flex items-center gap-2"><Icons.Printer size={20}/> طباعة</button><button onClick={onClose} className="bg-black text-white px-6 py-2 rounded-xl font-bold">عودة</button></div></div>
              <div className="max-w-3xl mx-auto border-2 border-black p-10 relative">
                <header className="flex justify-between items-center border-b-2 border-black pb-6 mb-8"><div className="flex items-center gap-4"><img src={LOGO_URL} className="w-16 h-16 rounded-full"/><h1 className="text-3xl font-black uppercase tracking-tighter">Mrakby <span className="text-gray-500 font-normal">Photography</span></h1></div><h2 className="text-xl font-bold underline">عقد اتفاق تصوير</h2></header>
                <div className="space-y-6 text-lg">
                    <p>إنه في يوم <b>{new Date().toLocaleDateString('ar-EG')}</b> تم الاتفاق بين:</p>
                    <p>١. الطرف الأول: <b>محمود المراكبي (استوديو المراكبي)</b></p>
                    <p>٢. الطرف الثاني الاسم: <b>{booking.groomName} / {booking.brideName}</b></p>
                    <div className="grid grid-cols-2 gap-4 bg-gray-50 p-4 rounded-lg border">
                        <p>التاريخ: {booking.date}</p><p>اللوكيشن: {booking.location === 'آخر' ? booking.otherLocation : booking.location}</p>
                        <p>السيشن: {booking.sessionType === 'آخر' ? booking.otherSessionType : booking.sessionType}</p><p>الميك أب: {booking.makeupArtist}</p>
                    </div>
                    <div className="border-t-2 border-black pt-4">
                        <p>الباكيدج: {booking.snapshotPackage?.name} ({booking.snapshotPackage?.price} ج.م)</p>
                        <div className="mt-6 flex justify-between bg-black text-white p-4 rounded-lg"><p>الإجمالي: {booking.totalPrice} ج.م</p><p>المدفوع: {booking.paid} ج.م</p><p className="text-xl font-black">المتبقي: {booking.remaining} ج.م</p></div>
                    </div>
                </div>
                <footer className="mt-20 flex justify-between px-10"><div className="text-center p-4 border-t-2 border-black w-40">توقيع الاستوديو</div><div className="text-center p-4 border-t-2 border-black w-40">توقيع العميل</div></footer>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
