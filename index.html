        function AnimatedAlertBox({ alerts, title, icon, onClick, type }) {

            }, [alerts.length]);

            if (alerts.length === 0) return null;

            const currentAlert = alerts[index];
            const isCasual = type === 'casual';
            const bgColor = isCasual ? 'bg-red-900/30' : 'bg-red-900/30'; 
            const borderColor = isCasual ? 'border-red-500' : 'border-red-500';
            const iconColor = isCasual ? 'text-red-400' : 'text-red-400';
            const badgeColor = isCasual ? 'bg-red-500/20 text-red-300' : 'bg-red-500/20 text-red-300';

            return (
                <div className={`${bgColor} border-r-4 ${borderColor} p-5 rounded-2xl shadow-xl mb-4 overflow-hidden`}>
                    <div className="flex justify-between items-center mb-3">
                        <h3 className={`${iconColor} font-bold text-lg flex items-center gap-2`}>
                            {icon} {title}
                        </h3>
                        {alerts.length > 1 && (
                            <span className={`text-xs font-bold ${badgeColor} px-2 py-1 rounded-full`}>
                                {index + 1} / {alerts.length}
                            </span>
                        )}
                    </div>
                    
                    <div 
                        key={currentAlert.id}
                        onClick={() => onClick(currentAlert)}
                        className="cursor-pointer bg-black/40 p-4 rounded-xl border border-white/5 hover:border-white/20 transition-all flex justify-between items-center animate-slideFade group"
                    >
                        <div>
                            <p className="font-bold text-white text-lg group-hover:text-[#D4AF37] transition-colors">{currentAlert.groomName} & {currentAlert.brideName}</p>
                            <p className="text-xs text-gray-300 mt-1">
                                {currentAlert.sessionType === 'آخر' ? currentAlert.otherSessionType : currentAlert.sessionType} 
                                {isCasual ? ` - مكان الكاجوال: ${currentAlert.actualCasualLoc}` : ` - اللوكيشن: ${currentAlert.location === 'آخر' ? currentAlert.otherLocation : currentAlert.location}`}
                            </p>
                        </div>
                        <div className="text-left flex flex-col items-end gap-2">
                            <p className="text-xs text-gray-400 font-mono">{currentAlert.date}</p>
                            <span className="text-[10px] font-bold bg-[#D4AF37]/10 text-[#D4AF37] px-2 py-1 rounded border border-[#D4AF37]/30">عرض التفاصيل</span>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Admin Components ---
        function AdminDashboard({ showToast }) {
            const [subscribers, setSubscribers] = useState([]);
            const [editingSub, setEditingSub] = useState(null);
            const [editForm, setEditForm] = useState({ email: '', phone: '', addDays: 0 });
            
            useEffect(() => {
                if(!window.firebase) return;
                const unsub = firebase.firestore().collection('subscribers').onSnapshot(snap => {
                    setSubscribers(snap.docs.map(doc => doc.data()));
                });
                return () => unsub();
            }, []);

            const toggleStatus = async (uid, currentStatus) => {
                try {
                    await firebase.firestore().collection('subscribers').doc(uid).update({ isActive: !currentStatus });
                    showToast(`تم ${!currentStatus ? 'تفعيل' : 'إيقاف'} الحساب بنجاح`);
                } catch(e) {
                    showToast("حدث خطأ أثناء تحديث حالة الحساب", "error");
                }
            };

            const deleteSubscriber = async (uid, email) => {
                if(window.confirm(`هل أنت متأكد من حذف المشترك (${email || 'بدون إيميل'}) نهائياً من قاعدة البيانات؟`)) {
                    try {
                        await firebase.firestore().collection('subscribers').doc(uid).delete();
                        showToast("تم حذف المشترك بنجاح");
                    } catch(e) {
                        showToast("حدث خطأ أثناء محاولة الحذف", "error");
                    }
                }
            };

            const openEdit = (sub) => {
                setEditingSub(sub);
                setEditForm({ email: sub.email || '', phone: sub.phone || '', addDays: 0 });
            };

            const saveEdit = async () => {
                if (!editingSub) return;
                try {
                    let updateData = { email: editForm.email, phone: editForm.phone };
                    if (editForm.addDays > 0) {
                        const currentEnd = editingSub.trialEndsAt ? new Date(editingSub.trialEndsAt) : new Date();
                        currentEnd.setDate(currentEnd.getDate() + Number(editForm.addDays));
                        updateData.trialEndsAt = currentEnd.toISOString();
                        updateData.isActive = true; 
                    }
                    await firebase.firestore().collection('subscribers').doc(editingSub.uid).update(updateData);
                    showToast("تم تحديث بيانات المشترك بنجاح!");
                    setEditingSub(null);
                } catch(e) {
                    showToast("خطأ في تحديث البيانات", "error");
                }
            };

            return (
                <div className="animate-fadeIn space-y-6 pb-10 relative">
                    
                    {editingSub && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[80] p-4 animate-fadeIn">
                            <div className="bg-[#111] border border-[#D4AF37]/30 p-6 rounded-3xl w-full max-w-md shadow-2xl">
                                <h3 className="text-xl font-bold text-[#D4AF37] mb-6 flex items-center gap-2">
                                    <Icons.Edit size={20} /> تعديل بيانات المشترك
                                </h3>
                                <div className="space-y-4">
                                    <InputField label="البريد الإلكتروني" value={editForm.email} onChange={e => setEditForm({...editForm, email: e.target.value})} />
                                    <InputField label="رقم الهاتف" value={editForm.phone} onChange={e => setEditForm({...editForm, phone: e.target.value})} />
                                    <div className="border-t border-[#333] pt-4 mt-4">
                                        <InputField label="تمديد الفترة التجريبية (إضافة أيام)" type="number" placeholder="مثال: 5" value={editForm.addDays} onChange={e => setEditForm({...editForm, addDays: e.target.value})} />
                                        <p className="text-xs text-gray-500 mt-1">تنبيه: الإيميل يتحدث في قاعدة البيانات كمرجع لك، لا يغير بيانات الدخول الخاصة بـ Firebase للمستخدم القديم.</p>
                                    </div>
                                    <div className="flex gap-4 pt-4">
                                        <button onClick={() => setEditingSub(null)} className="flex-1 py-3 bg-[#222] hover:bg-[#333] text-white rounded-xl transition-colors font-bold">إلغاء</button>
                                        <button onClick={saveEdit} className="flex-1 py-3 bg-[#D4AF37] hover:bg-yellow-500 text-black rounded-xl transition-colors font-bold">حفظ التعديلات</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="border-b border-[#222] pb-4">
                        <h2 className="text-3xl font-bold text-[#D4AF37] flex items-center gap-2"><Icons.Shield size={30} /> لوحة تحكم الإدارة العليا</h2>
                        <p className="text-gray-400 mt-1">إدارة الاستوديوهات والمصورين المشتركين في النظام.</p>
                    </header>

                    <div className="bg-[#111] rounded-3xl border border-[#333] overflow-x-auto shadow-xl">
                        <table className="w-full text-right">
                            <thead className="bg-black/40 border-b border-[#222]">
                                <tr>
                                    <th className="p-4 text-gray-400 font-medium">البريد الإلكتروني / الهاتف</th>
                                    <th className="p-4 text-gray-400 font-medium">تاريخ التسجيل</th>
                                    <th className="p-4 text-gray-400 font-medium">الحالة</th>
                                    <th className="p-4 text-center text-gray-400 font-medium">إجراءات الإدارة</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-[#222]">
                                {subscribers.map(sub => {
                                    const isTrialActive = sub.trialEndsAt ? new Date(sub.trialEndsAt) > new Date() : false;
                                    const statusDisplay = sub.isActive 
                                        ? (isTrialActive ? <span className="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-xs font-bold">فترة تجريبية</span> : <span className="bg-green-500/20 text-green-400 px-3 py-1 rounded-full text-xs font-bold">نشط</span>)
                                        : <span className="bg-red-500/20 text-red-400 px-3 py-1 rounded-full text-xs font-bold">موقوف</span>;

                                    return (
                                        <tr key={sub.uid} className="hover:bg-[#1a1a1a] transition-colors">
                                            <td className="p-4">
                                                <p className="font-mono font-bold text-white text-sm">{sub.phone || '---'}</p>
                                                <p className="text-xs text-gray-500 mt-1">{sub.email || '---'}</p>
                                            </td>
                                            <td className="p-4 text-sm text-gray-400">{new Date(sub.createdAt).toLocaleDateString('ar-EG')}</td>
                                            <td className="p-4">{statusDisplay}</td>
                                            <td className="p-4 text-center flex justify-center gap-2">
                                                <button 
                                                    onClick={() => openEdit(sub)}
                                                    className="px-3 py-2 bg-blue-900/30 text-blue-500 hover:bg-blue-600 hover:text-white rounded-xl transition-colors"
                                                    title="تعديل البيانات وتمديد التجربة"
                                                >
                                                    <Icons.Edit size={18} />
                                                </button>
                                                <button 
                                                    onClick={() => toggleStatus(sub.uid, sub.isActive)}
                                                    className={`px-4 py-2 rounded-xl font-bold text-sm transition-colors ${sub.isActive ? 'bg-orange-900/30 text-orange-500 hover:bg-orange-600 hover:text-white' : 'bg-green-900/30 text-green-500 hover:bg-green-600 hover:text-white'}`}
                                                >
                                                    {sub.isActive ? 'إيقاف' : 'تفعيل'}
                                                </button>
                                                <button 
                                                    onClick={() => deleteSubscriber(sub.uid, sub.email || sub.phone)}
                                                    className="px-3 py-2 bg-red-900/30 text-red-500 hover:bg-red-600 hover:text-white rounded-xl transition-colors"
                                                    title="حذف المشترك نهائياً"
                                                >
                                                    <Icons.Trash2 size={18} />
                                                </button>
                                            </td>
                                        </tr>
                                    );
                                })}
                                {subscribers.length === 0 && <tr><td colSpan="4" className="text-center p-10 text-gray-500">لا يوجد مشتركون بعد.</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // --- Calendar Component Restored ---
        function CalendarView({ bookings, onDayClick }) {
            const [selectedBooking, setSelectedBooking] = useState(null);
            
            const today = new Date();
            const [currentDate, setCurrentDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth(); 

            const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));
            const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
            const goToToday = () => setCurrentDate(new Date(today.getFullYear(), today.getMonth(), 1));

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDayIndex = new Date(year, month, 1).getDay();
            
            const days = [];
            for(let i=0; i<firstDayIndex; i++) days.push(null);
            for(let i=1; i<=daysInMonth; i++) days.push(i);
            const monthNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];

            return (
              <div className="animate-fadeIn max-w-5xl mx-auto pb-10 relative">
                {selectedBooking && (
                  <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[60] p-4 animate-fadeIn">
                    <div className="bg-[#111] border border-[#D4AF37]/30 p-6 rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-y-auto no-scrollbar shadow-2xl">
                      <div className="flex justify-between items-center mb-6 border-b border-[#222] pb-4">
                        <h3 className="text-2xl font-bold text-[#D4AF37]">بيانات الحجز التفصيلية</h3>
                        <button onClick={() => setSelectedBooking(null)} className="text-gray-400 hover:text-white"><Icons.X size={30} /></button>
                      </div>
                      <div className="space-y-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          <DetailRow label="العريس" value={selectedBooking.groomName} />
                          <DetailRow label="العروسة" value={selectedBooking.brideName} />
                          <DetailRow label="الهاتف" value={selectedBooking.phone} isMono />
                          <DetailRow label="التاريخ" value={selectedBooking.date} />
                          <DetailRow label="نوع السيشن" value={selectedBooking.sessionType === 'آخر' ? selectedBooking.otherSessionType : selectedBooking.sessionType} />
                          <DetailRow label="اللوكيشن" value={selectedBooking.location === 'آخر' ? selectedBooking.otherLocation : selectedBooking.location} />
                          <DetailRow label="الميك أب" value={selectedBooking.makeupArtist || 'غير محدد'} />
                          <DetailRow label="خروج ميك أب" value={selectedBooking.makeupLeaveTime || '--:--'} />
                          <DetailRow label="العنوان" value={selectedBooking.address || 'غير محدد'} />
                        </div>
                        
                        {selectedBooking.notes && (
                           <div className="bg-black/40 p-4 rounded-2xl border border-[#222]">
                              <h4 className="text-[#D4AF37] font-bold mb-2 flex items-center gap-2"><Icons.FileText size={18} /> ملاحظات إضافية</h4>
                              <p className="text-sm text-gray-300 whitespace-pre-wrap">{selectedBooking.notes}</p>
                           </div>
                        )}

                        <div className="bg-[#D4AF37]/10 p-4 rounded-2xl border border-[#D4AF37]/30 flex justify-between items-center shadow-lg">
                          <div><p className="text-xs text-gray-400 uppercase">إجمالي الحساب</p><p className="text-2xl font-bold text-white">{selectedBooking.totalPrice} ج.م</p></div>
                          <div className="text-left border-r border-[#D4AF37]/20 pr-4"><p className="text-xs text-gray-400 uppercase">المبلغ المتبقي</p><p className="text-2xl font-bold text-red-500">{selectedBooking.remaining} ج.م</p></div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                
                <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                  <h2 className="text-3xl font-bold text-[#D4AF37]">تقويم الحجوزات</h2>
                  <div className="flex items-center gap-4 bg-[#111] px-2 py-1 rounded-xl border border-[#333] shadow-lg">
                      <button onClick={prevMonth} className="p-2 text-gray-400 hover:text-[#D4AF37] hover:bg-[#222] rounded-lg transition-colors" title="الشهر السابق">
                          <Icons.ChevronRight size={24} />
                      </button>
                      <div className="text-xl font-bold min-w-[120px] text-center cursor-pointer hover:text-[#D4AF37] transition-colors" onClick={goToToday} title="العودة للشهر الحالي">
                          {monthNames[month]} {year}
                      </div>
                      <button onClick={nextMonth} className="p-2 text-gray-400 hover:text-[#D4AF37] hover:bg-[#222] rounded-lg transition-colors" title="الشهر القادم">
                          <Icons.ChevronLeft size={24} />
                      </button>
                  </div>
                </div>

                <div className="bg-[#111] rounded-3xl border border-[#333] p-6 shadow-2xl">
                  <div className="grid grid-cols-7 gap-1 md:gap-2 mb-4 text-center font-bold text-gray-500 text-sm md:text-base uppercase tracking-wider"><div>الأحد</div><div>الإثنين</div><div>الثلاثاء</div><div>الأربعاء</div><div>الخميس</div><div>الجمعة</div><div>السبت</div></div>
                  <div className="grid grid-cols-7 gap-1 md:gap-3">
                    {days.map((day, idx) => {
                      if (!day) return <div key={`empty-${idx}`} className="h-24 md:h-36 bg-black/20 rounded-2xl border border-transparent"></div>;
                      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                      const dayBookings = bookings.filter(b => b.date === dateStr);
                      return (
                        <div key={idx} onClick={() => onDayClick(dateStr)} className={`h-24 md:h-36 p-1 md:p-3 rounded-2xl border cursor-pointer hover:border-[#D4AF37] transition-all group ${dayBookings.length > 0 ? 'border-[#D4AF37]/40 bg-[#D4AF37]/5' : 'border-[#222] bg-black/40'}`}>
                          <span className={`text-xs md:text-sm font-bold ${dayBookings.length > 0 ? 'text-[#D4AF37]' : 'text-gray-500'}`}>{day}</span>
                          <div className="mt-2 space-y-1.5 overflow-y-auto max-h-[70%] no-scrollbar">
                            {dayBookings.map((b, i) => (<div key={i} onClick={(e) => { e.stopPropagation(); setSelectedBooking(b); }} className="text-[9px] md:text-[11px] bg-[#D4AF37] text-black px-2 py-1 rounded-lg font-bold truncate flex items-center gap-1 hover:scale-105 transition-transform"><Icons.Camera size={10} /> {b.groomName}</div>))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            );
        }

        // --- Main App Component ---
        function App() {
          const [user, setUser] = useState(null);
          const [isAdmin, setIsAdmin] = useState(false);
          const [isCheckingAuth, setIsCheckingAuth] = useState(true);
          const [isFirebaseActiveState, setIsFirebaseActiveState] = useState(false);
          const [trialInfo, setTrialInfo] = useState(null);
          
          const [bookings, setBookings] = useState(() => {
              try {
                  const saved = localStorage.getItem('mrakby_bookings');
                  return saved ? JSON.parse(saved) : [];
              } catch(e) { return []; }
          });
          const [settings, setSettings] = useState(() => {
              try {
                  const saved = localStorage.getItem('mrakby_settings');
                  if (saved) {
                      let parsed = JSON.parse(saved);
                      // تنظيف الروابط القديمة والتالفة من ذاكرة المتصفح
                      if (parsed.studioLogo && (parsed.studioLogo.includes('Gemini_Generated_Image') || parsed.studioLogo.includes('messages-prod') || parsed.studioLogo.includes('blogger.googleusercontent'))) {
                          parsed.studioLogo = LOGO_URL;
                      }
                      return parsed;
                  }
              } catch(e) { console.error(e); }
              return DEFAULT_SETTINGS;
          });
          
          const [currentView, setCurrentView] = useState('dashboard');
          const [contractToPrint, setContractToPrint] = useState(null);
          const [bookingToEdit, setBookingToEdit] = useState(null); 
          const [toast, setToast] = useState(null);
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const [initialBookingDate, setInitialBookingDate] = useState('');

          useEffect(() => {
              if (firebaseConfig.apiKey && window.firebase) {
                  try {
                      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                      isFirebaseActive = true;
                      setIsFirebaseActiveState(true);
                      
                      firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL)
                        .then(() => {
                            firebase.auth().onAuthStateChanged(async (usr) => {
                                if (usr) {
                                    if (usr.email === ADMIN_EMAIL) {
                                        setIsAdmin(true);
                                        setUser(usr);
                                        setIsCheckingAuth(false);
                                    } else {
                                        firebase.firestore().collection('subscribers').doc(usr.uid).get().then(doc => {
                                            if (doc.exists) {
                                                const data = doc.data();
                                                if (data.isActive === false) {
                                                    firebase.auth().signOut();
                                                    alert("تم إيقاف حسابك من قبل الإدارة. يرجى التواصل لتفعيل الحساب.");
                                                    setUser(null);
                                                } else {
                                                    if (data.trialEndsAt) {
                                                        const trialEnd = new Date(data.trialEndsAt);
                                                        if (new Date() > trialEnd) {
                                                             firebase.firestore().collection('subscribers').doc(usr.uid).update({ isActive: false });
                                                             firebase.auth().signOut();
                                                             alert("انتهت الفترة التجريبية المجانية. يرجى التواصل مع الإدارة لتفعيل حسابك.");
                                                             setUser(null);
                                                        } else {
                                                             const daysLeft = Math.ceil((trialEnd - new Date()) / (1000 * 60 * 60 * 24));
                                                             setTrialInfo(`الحساب في الفترة التجريبية. متبقي ${daysLeft} أيام.`);
                                                             setUser(usr);
                                                        }
                                                    } else {
                                                        setUser(usr); 
                                                    }
                                                }
                                            } else {
                                                setUser(usr);
                                            }
                                            setIsCheckingAuth(false);
                                        }).catch(err => {
                                            console.error("Error checking subscriber status", err);
                                            setUser(usr); 
                                            setIsCheckingAuth(false);
                                        });
                                    }
                                } else {
                                    setUser(null);
                                    setIsAdmin(false);
                                    setTrialInfo(null);
                                    setIsCheckingAuth(false);
                                }
                            });
                        })
                        .catch(err => {
                            console.error("Auth persistence error", err);
                            setIsCheckingAuth(false);
                        });
                  } catch(e) {
                      console.error("Firebase init error", e);
                      setIsCheckingAuth(false);
                  }
              } else {
                  const localUser = localStorage.getItem('mrakby_local_user');
                  if(localUser) {
                      const parsed = JSON.parse(localUser);
                      if (parsed.email === ADMIN_EMAIL) setIsAdmin(true);
                      setUser(parsed);
                  }
                  setIsCheckingAuth(false);
              }
          }, []);

          useEffect(() => {
              if (!user || !isFirebaseActive || !window.firebase || isAdmin) return; 
              
              const db = firebase.firestore();
              const unsubB = db.collection('users').doc(user.uid).collection('bookings').onSnapshot((snap) => {
                  const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                  data.sort((a, b) => new Date(b.date) - new Date(a.date));
                  setBookings(data);
              });
              const unsubS = db.collection('users').doc(user.uid).collection('settings').doc('config').onSnapshot((snap) => {
                  if(snap.exists) setSettings({ ...DEFAULT_SETTINGS, ...snap.data() });
              });
              return () => { unsubB(); unsubS(); };
          }, [user, isFirebaseActiveState, isAdmin]);

          useEffect(() => { localStorage.setItem('mrakby_bookings', JSON.stringify(bookings)); }, [bookings]);
          useEffect(() => { localStorage.setItem('mrakby_settings', JSON.stringify(settings)); }, [settings]);

          const showToast = (message, type = 'success') => {
            setToast({ message, type });
            setTimeout(() => setToast(null), 3000);
          };

          const handleLogout = async () => {
              if (isFirebaseActive && window.firebase) await firebase.auth().signOut();
              else { localStorage.removeItem('mrakby_local_user'); setUser(null); setIsAdmin(false); }
              setCurrentView('dashboard');
          };

          const navigateToNewBooking = (dateStr = '') => {
            setBookingToEdit(null);
            setInitialBookingDate(dateStr);
            setCurrentView('new');
            setIsMobileMenuOpen(false);
          };

          const navigateToEditBooking = (booking) => {
            setBookingToEdit(booking);
            setCurrentView('new');
            setIsMobileMenuOpen(false);
          };

          if (isCheckingAuth) return <div className="min-h-screen bg-[#0a0a0a] flex items-center justify-center"><p className="text-[#D4AF37] font-bold text-xl">جاري التحميل...</p></div>;
          if (!user) return <LoginScreen onLogin={setUser} isFirebaseActive={isFirebaseActiveState} showToast={showToast} settings={settings} />;
          if (contractToPrint) return <ContractPrintView booking={contractToPrint} settings={settings} onClose={() => setContractToPrint(null)} />;

          return (
            <div className="min-h-screen bg-[#0a0a0a] text-gray-200 font-sans" dir="rtl">
              {toast && (
                <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-lg shadow-2xl z-50 flex items-center gap-2 transition-all ${toast.type === 'error' ? 'bg-red-900 text-white' : 'bg-[#D4AF37] text-black'}`}>
                  <Icons.CheckCircle size={20} />
                  <span className="font-bold">{toast.message}</span>
                </div>
              )}

              {/* شريط التنبيه الخاص بالفترة التجريبية مع زر الاشتراك */}
              {trialInfo && !isAdmin && (
                  <div className="bg-blue-900/40 text-blue-400 py-3 px-4 border-b border-blue-500/30 flex flex-col md:flex-row items-center justify-center gap-4 shadow-md">
                      <span className="font-bold text-sm flex items-center gap-2">
                          <Icons.Info size={18} /> {trialInfo}
                      </span>
                      <button 
                          onClick={() => {
                              const el = document.createElement('textarea');
                              el.value = '01126810107';
                              document.body.appendChild(el);
                              el.select();
                              document.execCommand('copy');
                              document.body.removeChild(el);
                              showToast("تم النسخ اذهب لطريقة الدفع وقوم بلصق رقم الهاتف");
                          }}
                          className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded-full text-xs font-bold transition-colors shadow-lg flex items-center gap-1"
                      >
                          <Icons.Copy size={14} /> اشترك الآن
                      </button>
                  </div>
              )}

              <div className="md:hidden flex items-center justify-between bg-[#111] p-4 border-b border-[#D4AF37]/30">
                <h1 className="text-[#D4AF37] font-bold text-xl flex items-center gap-2">
                  <img 
                      src={settings?.studioLogo || LOGO_URL} 
                      onError={(e) => { if(e.target.src !== LOGO_URL) e.target.src = LOGO_URL; }} 
                      alt="Logo" 
                      crossOrigin="anonymous" 
                      className="w-8 h-8 rounded-full border border-[#D4AF37] object-cover bg-white" 
                  /> {settings?.studioName || 'اسم الاستوديو'}
                </h1>
                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-[#D4AF37]">
                  {isMobileMenuOpen ? <Icons.X size={28} /> : <Icons.LayoutDashboard size={28} />}
                </button>
              </div>

              <div className="flex flex-col md:flex-row min-h-screen">
                <aside className={`${isMobileMenuOpen ? 'block' : 'hidden'} md:block w-full md:w-64 bg-[#111] border-l border-[#222] p-6 flex-shrink-0 transition-all flex flex-col`}>
                  <div className="hidden md:flex items-center gap-3 mb-10">
                    <div className="p-1 rounded-full border-2 border-[#D4AF37] shadow-[0_0_15px_rgba(212,175,55,0.2)]">
                        <img 
                            src={settings?.studioLogo || LOGO_URL} 
                            onError={(e) => { if(e.target.src !== LOGO_URL) e.target.src = LOGO_URL; }} 
                            crossOrigin="anonymous" 
                            className="w-12 h-12 rounded-full object-cover bg-white" 
                        />
                    </div>
                    <div className="overflow-hidden">
                        <h1 className="text-[#D4AF37] font-bold text-lg leading-tight truncate" title={settings?.studioName}>{settings?.studioName || 'اسم الاستوديو'}</h1>
                        <p className="text-xs text-gray-400 tracking-widest uppercase">Photography</p>
                    </div>
                  </div>

                  <nav className="space-y-2 flex-1">
                    {!isAdmin ? (
                        <>
                            <NavItem icon={<Icons.LayoutDashboard />} label="الرئيسية" active={currentView === 'dashboard'} onClick={() => {setCurrentView('dashboard'); setIsMobileMenuOpen(false);}} />
                            <NavItem icon={<Icons.PlusCircle />} label="حجز جديد" active={currentView === 'new'} onClick={() => navigateToNewBooking('')} />
                            <NavItem icon={<Icons.Users />} label="العملاء" active={currentView === 'clients'} onClick={() => {setCurrentView('clients'); setIsMobileMenuOpen(false);}} />
                            <NavItem icon={<Icons.CalendarIcon />} label="التقويم" active={currentView === 'calendar'} onClick={() => {setCurrentView('calendar'); setIsMobileMenuOpen(false);}} />
                            <NavItem icon={<Icons.Settings />} label="الإعدادات" active={currentView === 'settings'} onClick={() => {setCurrentView('settings'); setIsMobileMenuOpen(false);}} />
                        </>
                    ) : (
                        <NavItem icon={<Icons.Shield />} label="إدارة المشتركين" active={currentView === 'admin'} onClick={() => {setCurrentView('admin'); setIsMobileMenuOpen(false);}} />
                    )}
                  </nav>
                  <div className="mt-auto pt-10 space-y-4">
                    <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 bg-red-900/20 text-red-500 py-2 rounded-xl border border-red-900/50 hover:bg-red-900/40 transition-colors">
                        <Icons.LogOut size={18} /> تسجيل الخروج
                    </button>
                    <div className="p-4 bg-black/50 rounded-xl border border-[#D4AF37]/20 text-center">
                      <p className="text-xs text-gray-500 mb-1">Studio ID</p>
                      <p className="font-mono text-[#D4AF37] font-bold uppercase">#{settings?.studioName ? settings.studioName.substring(0,4) : 'STUDIO'}_USER</p>
                    </div>
                  </div>
                </aside>

                <main className="flex-1 p-4 md:p-8 overflow-y-auto flex flex-col">
                  <div className="flex-1">
                      {isAdmin ? (
                          <AdminDashboard showToast={showToast} />
                      ) : (
                          <>
                              {currentView === 'dashboard' && <Dashboard bookings={bookings} settings={settings} onDayClick={navigateToNewBooking} />}
                              {currentView === 'new' && <NewBooking settings={settings} initialDate={initialBookingDate} user={user} bookingToEdit={bookingToEdit} isFirebaseActive={isFirebaseActiveState} onSuccess={(newB, isUpdate) => { if(!isFirebaseActiveState) { if (isUpdate) setBookings(prev => prev.map(b => b.id === newB.id ? newB : b).sort((a, b) => new Date(b.date) - new Date(a.date))); else setBookings([newB, ...bookings].sort((a, b) => new Date(b.date) - new Date(a.date))); } setCurrentView('clients'); setBookingToEdit(null); }} showToast={showToast} />}
                              {currentView === 'clients' && <ClientsList bookings={bookings} settings={settings} onPrint={setContractToPrint} onEdit={navigateToEditBooking} showToast={showToast} user={user} isFirebaseActive={isFirebaseActiveState} onLocalDelete={(id) => setBookings(bookings.filter(b => b.id !== id))} />}
                              {currentView === 'calendar' && <CalendarView bookings={bookings} onDayClick={navigateToNewBooking} />}
                              {currentView === 'settings' && <SettingsView settings={settings} user={user} isFirebaseActive={isFirebaseActiveState} onLocalSave={(s) => setSettings(s)} showToast={showToast} />}
                          </>
                      )}
                  </div>
                  
                  {/* تذييل الموقع (Footer) */}
                  <footer className="mt-12 pt-6 border-t border-[#222] text-center text-gray-500 text-xs font-mono">
                      Programmer: mrakby | Contact: 01097576073
                  </footer>
                </main>
              </div>
            </div>
          );
        }

        // --- Screens ---

        function LoginScreen({ onLogin, isFirebaseActive, showToast, settings }) {
            const [identifier, setIdentifier] = useState('');
            const [password, setPassword] = useState('');
            const [phone, setPhone] = useState(''); 
            const [isLoading, setIsLoading] = useState(false);
            const [isRegistering, setIsRegistering] = useState(false);
            
            const handleAuth = async (e) => {
                e.preventDefault(); 
                
                if (!identifier.trim()) {
                     showToast("يرجى إدخال رقم الهاتف أو البريد الإلكتروني.", "error");
                     return;
                }

                setIsLoading(true);

                const authEmail = identifier.includes('@') ? identifier : `${identifier}@studio.system`;

                if (isFirebaseActive && window.firebase) {
                    try {
                        let userCredential;
                        if (isRegistering) {
                            userCredential = await firebase.auth().createUserWithEmailAndPassword(authEmail, password);
                            
                            const trialEndDate = new Date();
                            trialEndDate.setDate(trialEndDate.getDate() + 5); // 5 Days Trial
                            
                            const isPhone = !identifier.includes('@');

                            await firebase.firestore().collection('subscribers').doc(userCredential.user.uid).set({
                                uid: userCredential.user.uid,
                                email: isPhone ? '' : identifier,
                                phone: isPhone ? identifier : '', 
                                createdAt: new Date().toISOString(),
                                isActive: true,
                                trialEndsAt: trialEndDate.toISOString() 
                            });
                            
                            await firebase.firestore().collection('users').doc(userCredential.user.uid).collection('settings').doc('config').set(DEFAULT_SETTINGS);
                            
                            showToast("🎉 شكراً لاشتراكك معنا! تم إنشاء حسابك ومنحك 5 أيام تجريبية مجاناً.");
                        } else {
                            userCredential = await firebase.auth().signInWithEmailAndPassword(authEmail, password);
                            showToast("تم تسجيل الدخول!");
                        }
                        onLogin(userCredential.user);
                    } catch (error) {
                        let msg = error.code === 'auth/email-already-in-use' ? "هذا الحساب مسجل مسبقاً!" : "بيانات الدخول غير صحيحة!";
                        showToast(msg, "error");
                    }
                } else {
                    if(identifier && password) { 
                        const usr = { uid: 'local_admin', email: authEmail }; 
                        localStorage.setItem('mrakby_local_user', JSON.stringify(usr)); 
                        onLogin(usr); 
                        showToast("تم الدخول للوضع المحلي");
                    } else {
                        showToast("أدخل البيانات", "error");
                    }
                }
                setIsLoading(false);
            };

            const handleCopyPhone = () => {
                const el = document.createElement('textarea');
                el.value = '01126810107';
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast("تم النسخ اذهب لطريقة الدفع وقوم بلصق رقم الهاتف");
            };

            return (
                <div className="min-h-screen bg-[#0a0a0a] flex items-center justify-center p-4 relative overflow-hidden" dir="rtl">
                    <div className="absolute inset-0 opacity-5 pointer-events-none flex items-center justify-center">
                         <Icons.Camera size={600} className="text-[#D4AF37]" />
                    </div>
                    <div className="bg-[#111] p-8 rounded-3xl border border-[#D4AF37]/30 w-full max-w-md shadow-2xl relative z-10 mt-8 mb-8">
                        <div className="text-center mb-6">
                            <div className="w-24 h-24 bg-white rounded-full mx-auto mb-4 border-2 border-[#D4AF37] flex items-center justify-center overflow-hidden shadow-[0_0_15px_rgba(212,175,55,0.3)]">
                                <img 
                                    src={settings?.studioLogo || LOGO_URL} 
                                    onError={(e) => { if(e.target.src !== LOGO_URL) e.target.src = LOGO_URL; }} 
                                    crossOrigin="anonymous" 
                                    className="w-full h-full object-cover" 
                                />
                            </div>
                            <h1 className="text-3xl font-bold text-[#D4AF37] tracking-wider">{settings?.studioName || 'نظام إدارة الاستوديو'}</h1>
                            <p className="text-gray-400 text-sm mt-2">
                                {isRegistering ? 'أنشئ حساباً جديداً وابدأ فترتك التجريبية' : 'مرحباً بعودتك! سجل الدخول للوصول لبياناتك'}
                            </p>
                        </div>
                        
                        {isRegistering && (
                            <div className="bg-gradient-to-br from-green-900/40 to-[#111] border border-green-500/50 p-5 rounded-2xl mb-6 text-center shadow-lg relative overflow-hidden">
                                <div className="absolute -right-4 -top-4 w-16 h-16 bg-green-500/20 rounded-full blur-xl"></div>
                                <h4 className="text-green-400 font-bold text-lg mb-3 flex items-center justify-center gap-2">
                                    <Icons.CheckCircle size={22} /> اشتراك النظام
                                </h4>
                                <p className="text-sm text-gray-300 leading-relaxed mb-3">
                                    ستحصل فوراً على <span className="font-bold text-white bg-green-600/30 px-2 py-0.5 rounded">5 أيام تجريبية مجاناً</span>.<br/>
                                    بعدها، تكلفة الاشتراك الدائم هي <span className="font-bold text-white border-b border-green-500">150 جنيه</span> فقط للإصدار الحالي.<br/>
                                </p>
                                <div className="bg-black/50 p-3 rounded-xl border border-gray-700/50 text-xs text-gray-400">
                                    يرجى الدفع عبر <b>إنستاباي (InstaPay)</b> أو <b>فودافون كاش</b>
                                    <button type="button" onClick={handleCopyPhone} className="w-full flex items-center justify-center gap-2 text-base font-mono text-black font-black mt-3 bg-[#D4AF37] py-2.5 rounded-xl border border-[#D4AF37]/30 hover:bg-yellow-500 transition-colors">
                                        <Icons.Copy size={18} /> نسخ رقم الدفع
                                    </button>
                                </div>
                            </div>
                        )}

                        <form onSubmit={handleAuth} className="space-y-4">
                            <input 
                                type="text" 
                                value={identifier} 
                                onChange={e => setIdentifier(e.target.value)} 
                                required 
                                className="w-full bg-black border border-[#333] text-white rounded-xl p-3.5 outline-none focus:border-[#D4AF37] transition-all" 
                                placeholder="رقم الهاتف أو البريد الإلكتروني" 
                            />
                            
                            <input 
                                type="password" 
                                value={password} 
                                onChange={e => setPassword(e.target.value)} 
                                required 
                                className="w-full bg-black border border-[#333] text-white rounded-xl p-3.5 outline-none focus:border-[#D4AF37] transition-all" 
                                placeholder="كلمة المرور (6 أحرف على الأقل)" 
                                minLength="6" 
                            />
                            
                            <button type="submit" disabled={isLoading} className="w-full bg-gradient-to-r from-[#D4AF37] to-[#B8860B] text-black font-bold text-lg py-3.5 rounded-xl hover:opacity-90 transition-opacity shadow-lg mt-2">
                                {isLoading ? 'جاري التحميل...' : (isRegistering ? 'إنشاء حساب وبدء التجربة' : 'تسجيل الدخول')}
                            </button>
                        </form>
                        
                        {isFirebaseActive && (
                            <div className="mt-6 text-center border-t border-[#222] pt-4">
                                <button 
                                    type="button"
                                    onClick={() => {
                                        setIsRegistering(!isRegistering);
                                        setIdentifier(''); 
                                    }} 
                                    className="text-gray-400 text-sm hover:text-[#D4AF37] transition-colors font-medium"
                                >
                                    {isRegistering ? 'لديك حساب بالفعل؟ سجل الدخول من هنا' : 'ليس لديك حساب؟ أنشئ حساب جديد لاستوديوهات أخرى'}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function Dashboard({ bookings, settings, onDayClick }) {
          const [selectedAlertBooking, setSelectedAlertBooking] = useState(null);

          const { stats, upcoming, tomorrowAlerts, casualAlerts } = useMemo(() => {
            let rev = 0, paid = 0, counts = { 'زفاف': 0, 'خطوبة': 0, 'كاجول': 0, 'حنة': 0, 'كتب كتاب': 0, 'فوتوغرافي': 0 };
            const monthly = {};
            const monthNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            
            const oneMonthFromNow = new Date(today);
            oneMonthFromNow.setMonth(today.getMonth() + 1);

            let upcomingList = [];
            let tmrwAlerts = [];
            let casualList = [];

            bookings.forEach(b => {
              const bRev = Number(b.totalPrice) || 0; const bPaid = Number(b.paid) || 0; rev += bRev; paid += bPaid;
              const type = b.sessionType === 'آخر' ? b.otherSessionType : b.sessionType;
              if (counts[type] !== undefined) counts[type]++; else counts[type] = 1;
              
              const d = new Date(b.date);
              if (!isNaN(d)) {
                  const mKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                  if (!monthly[mKey]) monthly[mKey] = { label: `${monthNames[d.getMonth()]} ${d.getFullYear()}`, rev: 0, count: 0 };
                  monthly[mKey].rev += bRev; monthly[mKey].count += 1;
                  
                  const dTime = d.getTime();
                  if (dTime >= today.getTime()) {
                      if (dTime <= oneMonthFromNow.getTime()) {
                          upcomingList.push(b);
                          const actualCasual = b.casualLocation === 'آخر' ? b.otherCasualLocation : b.casualLocation;
                          if (actualCasual && actualCasual.trim() !== '') {
                              casualList.push({ ...b, actualCasualLoc: actualCasual });
                          }
                      }
                      
                      if (dTime === tomorrow.getTime()) {
                          tmrwAlerts.push(b);
                      }
                  }
              }
            });

            upcomingList.sort((a, b) => new Date(a.date) - new Date(b.date));
            casualList.sort((a, b) => new Date(a.date) - new Date(b.date));

            const sortedMonths = Object.keys(monthly).sort().reverse().map(key => monthly[key]);
            const maxMonthlyRev = Math.max(...sortedMonths.map(m => m.rev), 1);
            
            return { 
                stats: { total: bookings.length, rev, paid, outstanding: rev - paid, counts, sortedMonths, maxMonthlyRev },
                upcoming: upcomingList,
                tomorrowAlerts: tmrwAlerts,
                casualAlerts: casualList
            };
          }, [bookings]);

          const formatMoney = (val) => `${val.toLocaleString()} ج.م`;

          return (
            <div className="space-y-8 animate-fadeIn relative">
              
              {/* Detail Modal for Alerts */}
              {selectedAlertBooking && (
                <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[80] p-4 animate-fadeIn">
                  <div className="bg-[#111] border border-[#D4AF37]/30 p-6 rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-y-auto no-scrollbar shadow-2xl">
                    <div className="flex justify-between items-center mb-6 border-b border-[#222] pb-4">
                      <h3 className="text-2xl font-bold text-[#D4AF37]">تفاصيل العميل القادم</h3>
                      <button onClick={() => setSelectedAlertBooking(null)} className="text-gray-400 hover:text-white"><Icons.X size={30} /></button>
                    </div>
                    <div className="space-y-6">
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <DetailRow label="العريس" value={selectedAlertBooking.groomName} />
                        <DetailRow label="العروسة" value={selectedAlertBooking.brideName} />
                        <DetailRow label="الهاتف" value={selectedAlertBooking.phone} isMono />
                        <DetailRow label="التاريخ" value={selectedAlertBooking.date} isRed />
                        <DetailRow label="نوع السيشن" value={selectedAlertBooking.sessionType === 'آخر' ? selectedAlertBooking.otherSessionType : selectedAlertBooking.sessionType} />
                        <DetailRow label="اللوكيشن الأساسي" value={selectedAlertBooking.location === 'آخر' ? selectedAlertBooking.otherLocation : selectedAlertBooking.location} />
                        <DetailRow label="الكاجوال" value={selectedAlertBooking.casualLocation === 'آخر' ? selectedAlertBooking.otherCasualLocation : selectedAlertBooking.casualLocation || '---'} />
                        <DetailRow label="خروج ميك أب" value={selectedAlertBooking.makeupLeaveTime || '--:--'} isRed />
                      </div>
                      
                      {selectedAlertBooking.notes && (
                         <div className="bg-black/40 p-4 rounded-2xl border border-[#222]">
                            <h4 className="text-[#D4AF37] font-bold mb-2 flex items-center gap-2"><Icons.FileText size={18} /> ملاحظات مهمة</h4>
                            <p className="text-sm text-white whitespace-pre-wrap">{selectedAlertBooking.notes}</p>
                         </div>
                      )}
                      
                      <div className="bg-[#D4AF37]/10 p-4 rounded-2xl border border-[#D4AF37]/30 flex justify-between items-center shadow-lg mt-4">
                        <div><p className="text-xs text-gray-400 uppercase">إجمالي الحساب</p><p className="text-2xl font-bold text-white">{selectedAlertBooking.totalPrice} ج.م</p></div>
                        <div className="text-left border-r border-[#D4AF37]/20 pr-4"><p className="text-xs text-gray-400 uppercase">المبلغ المتبقي وقت التصوير</p><p className="text-2xl font-bold text-red-500">{selectedAlertBooking.remaining} ج.م</p></div>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              <header className="bg-gradient-to-r from-[#111] to-[#0a0a0a] p-6 rounded-3xl border border-[#333] shadow-lg flex justify-between items-center mb-8 relative overflow-hidden">
                <div className="absolute top-0 left-0 w-32 h-32 bg-[#D4AF37]/10 rounded-full blur-3xl -ml-10 -mt-10 pointer-events-none"></div>
                <div className="relative z-10">
                    <h2 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#D4AF37] to-white mb-2">لوحة التحكم 📸</h2>
                    <p className="text-gray-400 text-sm md:text-base">مرحباً بك في <span className="text-[#D4AF37] font-bold">{settings.studioName || 'الاستوديو'}</span>، إليك ملخص أعمالك.</p>
                </div>
              </header>

              {/* Animated Alert Queue Section */}
              <div className="space-y-4">
                  <AnimatedAlertBox 
                     alerts={tomorrowAlerts} 
                     title="تنبيه هام: تصوير غداً!" 
                     icon={<Icons.Bell size={24} />} 
                     type="tomorrow"
                     onClick={setSelectedAlertBooking}
                  />
                  <AnimatedAlertBox 
                     alerts={casualAlerts} 
                     title="تجهيزات الكاجوال القادمة (هذا الشهر)" 
                     icon={<Icons.MapPin size={22} />} 
                     type="casual"
                     onClick={setSelectedAlertBooking}
                  />
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-8">
                {/* Upcoming Queue */}
                <div className="lg:col-span-2 bg-[#111] p-6 rounded-3xl border border-[#222] shadow-xl">
                  <div className="flex items-center gap-2 mb-6"><Icons.ClockIcon className="text-[#D4AF37]" size={20} /><h3 className="text-[#D4AF37] font-bold text-xl">العملاء القادمون (خلال شهر)</h3></div>
                  <div className="space-y-3 max-h-80 overflow-y-auto pr-2 no-scrollbar">
                      {upcoming.length > 0 ? upcoming.map(b => (
                          <div key={b.id} onClick={() => setSelectedAlertBooking(b)} className="flex flex-col md:flex-row md:items-center justify-between bg-black/40 p-4 rounded-xl border border-white/5 hover:border-[#D4AF37]/50 transition-colors gap-4 cursor-pointer">
                              <div className="flex items-center gap-4">
                                  <div className="bg-[#D4AF37]/10 text-[#D4AF37] font-bold text-center p-3 rounded-xl min-w-[70px] border border-[#D4AF37]/20">
                                      <p className="text-2xl leading-none">{new Date(b.date).getDate()}</p>
                                      <p className="text-xs mt-1">{new Date(b.date).toLocaleString('ar-EG', {month: 'short'})}</p>
                                  </div>
                                  <div>
                                      <p className="font-bold text-white text-lg">{b.groomName} & {b.brideName}</p>
                                      <p className="text-sm text-gray-400">{b.sessionType === 'آخر' ? b.otherSessionType : b.sessionType} • اللوكيشن: {b.location === 'آخر' ? b.otherLocation : b.location}</p>
                                  </div>
                              </div>
                              <div className="text-left bg-black p-3 rounded-lg border border-[#333]">
                                  <p className="text-xs text-gray-500 mb-1">المتبقي</p>
                                  <p className="font-bold text-red-500">{formatMoney(b.remaining)}</p>
                              </div>
                          </div>
                      )) : <p className="text-gray-500 text-center py-10 bg-black/20 rounded-xl">لا يوجد حجوزات قادمة خلال الشهر الحالي.</p>}
                  </div>
                </div>

                {/* Monthly Stats Summary */}
                <div className="bg-[#111] p-6 rounded-3xl border border-[#222] shadow-xl">
                  <div className="flex items-center gap-2 mb-6"><Icons.TrendingUp className="text-[#D4AF37]" size={20} /><h3 className="text-[#D4AF37] font-bold text-xl">إحصائيات الشهور</h3></div>
                  <div className="space-y-6 max-h-80 overflow-y-auto pr-2 no-scrollbar">{stats.sortedMonths.length > 0 ? stats.sortedMonths.map((m, i) => (
                    <div key={i} className="space-y-2">
                      <div className="flex justify-between items-end"><div><p className="text-white font-bold">{m.label}</p><p className="text-xs text-gray-500">{m.count} حجوزات</p></div><p className="text-[#D4AF37] font-bold">{formatMoney(m.rev)}</p></div>
                      <div className="h-2 bg-black rounded-full overflow-hidden"><div className="h-full bg-gradient-to-l from-[#D4AF37] to-[#B8860B] transition-all duration-1000" style={{ width: `${(m.rev / stats.maxMonthlyRev) * 100}%` }}></div></div>
                    </div>
                  )) : <p className="text-gray-500 text-center py-4">لا توجد بيانات متاحة بعد.</p>}</div>
                </div>
              </div>

              {/* Stats moved to the bottom */}
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
                <StatCard title="إجمالي الحجوزات" value={stats.total} subtitle="حجز مسجل" />
                <StatCard title="إجمالي الإيرادات" value={formatMoney(stats.rev)} highlight subtitle={`المدفوع: ${stats.paid.toLocaleString()} ج.م`} />
                <StatCard title="المبالغ المتبقية" value={formatMoney(stats.outstanding)} alert={stats.outstanding > 0} subtitle="مستحقات لدى العملاء" />
              </div>
              
            </div>
          );
        }

        function StatCard({ title, value, subtitle, highlight, alert }) {
          return (<div className={`p-6 rounded-3xl border ${highlight ? 'bg-gradient-to-br from-[#1a1500] to-[#0a0a0a] border-[#D4AF37]/50 shadow-[0_0_20px_rgba(212,175,55,0.1)]' : 'bg-[#111] border-[#222]'}`}><h3 className="text-gray-500 text-sm mb-1">{title}</h3><p className={`text-4xl font-bold ${alert ? 'text-red-500' : 'text-white'}`}>{value}</p><p className="text-xs text-gray-600 mt-2">{subtitle}</p></div>);
        }

        function NavItem({ icon, label, active, onClick }) {
          return (<button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${active ? 'bg-gradient-to-r from-[#D4AF37]/20 to-transparent text-[#D4AF37] border-r-4 border-[#D4AF37]' : 'text-gray-400 hover:bg-white/5'}`}>{icon}<span>{label}</span></button>);
        }

        // --- NEW BOOKING FORM ---
        function NewBooking({ settings, initialDate, bookingToEdit, onSuccess, showToast, user, isFirebaseActive }) {
            const [formData, setFormData] = useState({
                bookingMainType: 'فوتوغرافي وفيديو', // النوع الافتراضي الجديد للحجز
                groomName: '', brideName: '', phone: '', address: '', date: initialDate || '', location: '', otherLocation: '',
                sessionType: settings.sessionTypes[0], otherSessionType: '', makeupArtist: '', makeupLeaveTime: '', casualLocation: '', otherCasualLocation: '', packageId: '', addons: [], paid: '',
                videoServiceId: '', videoServicePrice: '', videoStartTime: '', videoAddons: [], notes: ''
            });
            const [isSubmitting, setIsSubmitting] = useState(false);
            
            useEffect(() => { 
                if (bookingToEdit) {
                    setFormData({
                        ...bookingToEdit,
                        bookingMainType: bookingToEdit.bookingMainType || 'فوتوغرافي وفيديو',
                        addons: bookingToEdit.addons || [],
                        videoAddons: bookingToEdit.videoAddons || []
                    });
                } else if (initialDate) {
                    setFormData(p => ({ ...p, date: initialDate })); 
                }
            }, [initialDate, bookingToEdit]);
            
            // متغيرات التحكم في العرض بناءً على نوع الحجز
            const isPhotoBooking = ['تصوير فوتوغرافي', 'فوتوغرافي وفيديو'].includes(formData.bookingMainType);
            const isVideoBooking = ['تصوير فيديو', 'فوتوغرافي وفيديو'].includes(formData.bookingMainType);

            // الحسابات
            const pkg = settings.packages.find(p => p.id === formData.packageId) || { price: 0 };
            
            const photoPrice = isPhotoBooking ? Number(pkg.price) : 0;
            const addonsTot = isPhotoBooking ? formData.addons.reduce((s, id) => s + (settings.addons.find(a => a.id === id)?.price || 0), 0) : 0;
            
            const vServPrice = isVideoBooking ? (Number(formData.videoServicePrice) || 0) : 0;
            const vAddTot = isVideoBooking ? formData.videoAddons.reduce((s, a) => s + (Number(a.price) || 0), 0) : 0;
            
            const totalPrice = photoPrice + addonsTot + vServPrice + vAddTot;
            const remaining = totalPrice - (Number(formData.paid) || 0);

            const handleAddonToggle = (addonId) => {
                setFormData(prev => ({
                    ...prev,
                    addons: prev.addons.includes(addonId) ? prev.addons.filter(id => id !== addonId) : [...prev.addons, addonId]
                }));
            };

            const handleAddVideoAddon = (e) => {
                const addonId = e.target.value;
                if (!addonId) return;
                const addonDef = settings.videoAddons.find(a => a.id === addonId);
                if (addonDef && !formData.videoAddons.find(a => a.id === addonId)) {
                   setFormData(prev => ({ ...prev, videoAddons: [...prev.videoAddons, { id: addonDef.id, name: addonDef.name, price: addonDef.price }] }));
                }
                e.target.value = '';
            };

            const handleVideoAddonPriceChange = (id, newPrice) => {
                setFormData(prev => ({ ...prev, videoAddons: prev.videoAddons.map(a => a.id === id ? { ...a, price: newPrice } : a) }));
            };

            const removeVideoAddon = (id) => {
                 setFormData(prev => ({ ...prev, videoAddons: prev.videoAddons.filter(a => a.id !== id) }));
            };

            const submit = async (e) => {
                e.preventDefault(); 
                if (!formData.groomName || !formData.date) return showToast("أكمل البيانات الأساسية", "error");
                
                // التأكد من اختيار باكيدج فقط لو كان الحجز فيه فوتوغرافي
                if (isPhotoBooking && !formData.packageId) return showToast("يرجى اختيار باكيدج التصوير الفوتوغرافي", "error");
                
                // التأكد من اختيار خدمة فيديو فقط لو كان الحجز فيه فيديو
                if (isVideoBooking && !formData.videoServiceId) return showToast("يرجى اختيار خدمة تصوير الفيديو", "error");
                
                setIsSubmitting(true);
                const snapData = {
                    ...formData,
                    snapshotPackage: isPhotoBooking ? { name: pkg.name, price: pkg.price } : null,
                    snapshotAddons: isPhotoBooking ? formData.addons.map(id => { const a = settings.addons.find(x => x.id === id); return a ? { name: a.name, price: a.price } : null; }).filter(Boolean) : [],
                    snapshotVideoService: isVideoBooking && formData.videoServiceId ? { name: settings.videoServices.find(v => v.id === formData.videoServiceId)?.name, price: formData.videoServicePrice } : null,
                    totalPrice: totalPrice, remaining, 
                    createdAt: bookingToEdit ? bookingToEdit.createdAt : new Date().toISOString()
                };
                
                if (isFirebaseActive && user && window.firebase) {
                    try { 
                        if (bookingToEdit) {
                            await firebase.firestore().collection('users').doc(user.uid).collection('bookings').doc(bookingToEdit.id).update(snapData);
                            showToast("تم تحديث الحجز بنجاح");
                        } else {
                            await firebase.firestore().collection('users').doc(user.uid).collection('bookings').add(snapData); 
                            showToast("تم الحفظ بنجاح في السحابة");
                        }
                        onSuccess(snapData, !!bookingToEdit); 
                    } catch(e) { showToast("خطأ سحابي", "error"); }
                } else { 
                    const finalBooking = { id: bookingToEdit ? bookingToEdit.id : 'b_' + Date.now(), ...snapData };
                    onSuccess(finalBooking, !!bookingToEdit); 
                    showToast(bookingToEdit ? "تم التحديث محلياً" : "تم الحفظ محلياً"); 
                }
                setIsSubmitting(false);
            };

            return (
                <div className="max-w-4xl mx-auto pb-10 animate-fadeIn">
                    <h2 className="text-3xl font-bold text-[#D4AF37] mb-8 border-b border-[#D4AF37]/30 pb-4">
                        {bookingToEdit ? '✏️ تعديل بيانات الحجز' : '📝 تسجيل حجز جديد'}
                    </h2>
                    
                    <form onSubmit={submit} className="space-y-8">
                        {/* بيانات العميل */}
                        <div className="bg-[#111] p-6 rounded-2xl border border-[#333]">
                          <h3 className="text-xl text-white mb-4 flex items-center gap-2"><Icons.Users size={20} className="text-[#D4AF37]"/> بيانات العميل</h3>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <InputField label="اسم العريس" value={formData.groomName} onChange={e => setFormData({...formData, groomName: e.target.value})} required />
                            <InputField label="اسم العروسة" value={formData.brideName} onChange={e => setFormData({...formData, brideName: e.target.value})} required />
                            <InputField label="رقم الهاتف" type="tel" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} required />
                            <InputField label="العنوان" value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} />
                          </div>
                        </div>

                        {/* نوع الحجز الأساسي */}
                        <div className="bg-[#111] p-6 rounded-2xl border border-[#333]">
                            <h3 className="text-xl text-white mb-4 flex items-center gap-2"><Icons.Settings size={20} className="text-[#D4AF37]"/> نوع الحجز</h3>
                            <SelectField 
                                label="اختر نوع الخدمة المطلوبة" 
                                value={formData.bookingMainType} 
                                onChange={e => setFormData({...formData, bookingMainType: e.target.value})} 
                                options={['فوتوغرافي وفيديو', 'تصوير فوتوغرافي', 'تصوير فيديو']} 
                            />
                        </div>

                        {/* تفاصيل المناسبة */}
                        <div className="bg-[#111] p-6 rounded-2xl border border-[#333]">
                          <h3 className="text-xl text-white mb-4 flex items-center gap-2"><Icons.CalendarIcon size={20} className="text-[#D4AF37]"/> تفاصيل المناسبة</h3>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <SelectField label="نوع السيشن" value={formData.sessionType} onChange={e => setFormData({...formData, sessionType: e.target.value})} options={settings.sessionTypes} />
                                {formData.sessionType === 'آخر' && <div className="mt-2"><InputField label="تفاصيل نوع السيشن" value={formData.otherSessionType} onChange={e=>setFormData({...formData, otherSessionType: e.target.value})} required /></div>}
                            </div>
                            <InputField label="تاريخ المناسبة" type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} required />
                            <div>
                                <SelectField label="اللوكيشن الأساسي" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} options={['', ...settings.locations]} />
                                {formData.location === 'آخر' && <div className="mt-2"><InputField label="تفاصيل اللوكيشن" value={formData.otherLocation} onChange={e=>setFormData({...formData, otherLocation: e.target.value})} required /></div>}
                            </div>
                            {isPhotoBooking && (
                                <>
                                    <div>
                                        <SelectField label="مكان تصوير الكاجوال (اختياري)" value={formData.casualLocation} onChange={e => setFormData({...formData, casualLocation: e.target.value})} options={['', ...settings.casualLocations]} />
                                        {formData.casualLocation === 'آخر' && <div className="mt-2"><InputField label="تفاصيل مكان الكاجوال" value={formData.otherCasualLocation} onChange={e=>setFormData({...formData, otherCasualLocation: e.target.value})} required /></div>}
                                    </div>
                                    <InputField label="اسم الميك أب" value={formData.makeupArtist} onChange={e => setFormData({...formData, makeupArtist: e.target.value})} />
                                    <InputField label="وقت الخروج من الميك أب" type="time" value={formData.makeupLeaveTime} onChange={e => setFormData({...formData, makeupLeaveTime: e.target.value})} />
                                </>
                            )}
                          </div>
                        </div>

                        {/* الباكيدج والإضافات (فوتوغرافيا) */}
                        {isPhotoBooking && (
                            <div className="bg-[#111] p-6 rounded-2xl border border-[#333] animate-fadeIn">
                              <h3 className="text-xl text-white mb-4 flex items-center gap-2"><Icons.Camera size={20} className="text-[#D4AF37]"/> الباكيدج والإضافات (فوتوغرافيا)</h3>
                              <div className="mb-6">
                                <label className="block text-sm text-gray-400 mb-2">اختر الباكيدج الأساسي</label>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                    {settings.packages.map(pkg => (
                                      <div key={pkg.id} onClick={() => setFormData({...formData, packageId: pkg.id})} className={`p-4 rounded-xl cursor-pointer border-2 transition-all ${formData.packageId === pkg.id ? 'border-[#D4AF37] bg-[#D4AF37]/10' : 'border-[#333] hover:border-gray-500'}`}>
                                        <p className="font-bold text-white">{pkg.name}</p>
                                        <p className="text-[#D4AF37] mt-1 font-bold">{pkg.price} ج.م</p>
                                      </div>
                                    ))}
                                </div>
                              </div>
                              <div>
                                <label className="block text-sm text-gray-400 mb-2">الإضافات (اختياري)</label>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                    {settings.addons.map(addon => (
                                      <label key={addon.id} className="flex items-center gap-2 p-3 bg-black border border-[#333] rounded-lg cursor-pointer hover:bg-[#222]">
                                        <input type="checkbox" checked={formData.addons.includes(addon.id)} onChange={() => handleAddonToggle(addon.id)} className="accent-[#D4AF37] w-5 h-5"/>
                                        <div><p className="text-sm font-bold text-white">{addon.name}</p><p className="text-xs text-[#D4AF37]">+{addon.price}</p></div>
                                      </label>
                                    ))}
                                </div>
                              </div>
                            </div>
                        )}

                        {/* قسم تصوير الفيديو */}
                        {isVideoBooking && (
                            <div className="bg-[#111] p-6 rounded-2xl border border-[#333] animate-fadeIn">
                              <div className="flex justify-between items-start mb-4">
                                <div>
                                    <h3 className="text-xl text-white flex items-center gap-2 mb-2"><Icons.Video size={20} className="text-[#D4AF37]"/> قسم تصوير الفيديو</h3>
                                    <p className="text-sm text-gray-400 max-w-2xl leading-relaxed">
                                        كل خدمات الفيديو تصوير Full HD يتم تسلم المناسبه على فلاشه خاصه.
                                        <br/>
                                        <span className="text-red-400 text-xs mt-1 block">تنبيه: برجاء عمل نسخه احتياطيه من الحفل، عند حذف الفيديو بعد مدة تزيد عن 3 اشهر لا يمكن استرجاعه. تكلفة النسخه تتم على حسب حجم الفلاشه بدأً من 500 الى 800 ج.م.</span>
                                    </p>
                                </div>
                                {formData.videoServiceId && <button type="button" onClick={() => setFormData({...formData, videoServiceId: '', videoServicePrice: '', videoStartTime: '', videoAddons: []})} className="text-red-400 text-sm hover:underline border border-red-500/30 px-3 py-1 rounded shrink-0">إلغاء قسم الفيديو</button>}
                              </div>
                              
                              <div className="mb-6">
                                <label className="block text-sm text-gray-400 mb-2">اختر خدمة الفيديو الأساسية</label>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                  {settings.videoServices.map(vs => (
                                    <div key={vs.id} onClick={() => setFormData(prev => ({...prev, videoServiceId: vs.id, videoServicePrice: prev.videoServiceId !== vs.id ? vs.price : prev.videoServicePrice}))} className={`p-4 rounded-xl cursor-pointer border-2 transition-all ${formData.videoServiceId === vs.id ? 'border-[#D4AF37] bg-[#D4AF37]/10' : 'border-[#333] hover:border-gray-500'}`}>
                                      <p className="font-bold text-white">{vs.name}</p>
                                      {vs.subtext && <p className="text-xs text-gray-400 mt-1">{vs.subtext}</p>}
                                    </div>
                                  ))}
                                </div>
                              </div>
                              
                              {formData.videoServiceId && (
                                <div className="mb-6 border-t border-[#333] pt-6 flex flex-col md:flex-row gap-4">
                                  <div className="md:w-1/2">
                                    <InputField label={`سعر ${settings.videoServices.find(v => v.id === formData.videoServiceId)?.name} (قابل للتعديل)`} type="number" value={formData.videoServicePrice} onChange={e => setFormData({...formData, videoServicePrice: e.target.value})} />
                                  </div>
                                  {formData.videoServiceId === 'v4' && (
                                    <div className="md:w-1/2">
                                      <InputField label="وقت البدء (من بعد الظهر)" type="time" value={formData.videoStartTime} onChange={e => setFormData({...formData, videoStartTime: e.target.value})} />
                                    </div>
                                  )}
                                </div>
                              )}

                          <div className="border-t border-[#333] pt-6">
                            <label className="block text-sm text-gray-400 mb-2">إضافات الفيديو</label>
                            <select onChange={handleAddVideoAddon} value="" className="w-full md:w-1/2 bg-black border border-[#333] text-white rounded-lg p-3 focus:outline-none focus:border-[#D4AF37] transition-all mb-4">
                              <option value="" disabled>-- اختر إضافة --</option>
                              {settings.videoAddons?.filter(va => !formData.videoAddons.find(a => a.id === va.id)).map(va => <option key={va.id} value={va.id}>{va.name}</option>)}
                            </select>
                            
                            {formData.videoAddons.length > 0 && (
                              <div className="space-y-3 mt-4">
                                {formData.videoAddons.map(addon => (
                                  <div key={addon.id} className="flex flex-col md:flex-row md:items-center justify-between bg-[#1a1a1a] p-3 rounded-lg border border-[#333] gap-4">
