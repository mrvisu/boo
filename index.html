              <header className="bg-gradient-to-r from-[#111] to-[#0a0a0a] p-6 rounded-3xl border border-[#333] shadow-lg flex justify-between items-center mb-8 relative overflow-hidden">
                <div className="absolute top-0 left-0 w-32 h-32 bg-[#D4AF37]/10 rounded-full blur-3xl -ml-10 -mt-10 pointer-events-none"></div>
                <div className="relative z-10">
                    <h2 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#D4AF37] to-white mb-2">لوحة التحكم 📸</h2>
                    <p className="text-gray-400 text-sm md:text-base">مرحباً بك في <span className="text-[#D4AF37] font-bold">{settings.studioName || 'الاستوديو'}</span>، إليك ملخص أعمالك.</p>
                </div>
              </header>

              {/* Animated Alert Queue Section */}
              <div className="space-y-4">
                  <AnimatedAlertBox 
                     alerts={tomorrowAlerts} 
                     title="تنبيه هام: تصوير غداً!" 
                     icon={<Icons.Bell size={24} />} 
                     type="tomorrow"
                     onClick={(b) => setSelectedAlertBooking({ data: b, type: 'general' })}
                  />
                  <AnimatedAlertBox 
                     alerts={casualAlerts} 
                     title="تجهيزات الكاجوال القادمة (هذا الشهر)" 
                     icon={<Icons.MapPin size={22} />} 
                     type="casual"
                     onClick={(b) => setSelectedAlertBooking({ data: b, type: 'casual' })}
                  />
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-8">
                {/* Upcoming Queue */}
                <div className="lg:col-span-2 bg-[#111] p-6 rounded-3xl border border-[#222] shadow-xl flex flex-col h-[400px]">
                  <div className="flex items-center justify-between gap-3 mb-6 shrink-0">
                      <h3 className="text-[#D4AF37] font-bold text-xl flex items-center gap-2">
                          <Icons.ClockIcon className="text-[#D4AF37]" size={20} />
                          العملاء القادمون (شهر {stats.currentMonthNumber})
                      </h3>
                      <span className="bg-[#D4AF37]/10 text-[#D4AF37] text-sm px-3 py-1 rounded-full border border-[#D4AF37]/30 font-bold whitespace-nowrap">
                          {stats.currentMonthTotalBookings} حجوزات
                      </span>
                  </div>
                  <div className="space-y-3 overflow-y-auto pr-2 no-scrollbar flex-1">
                      {upcoming.length > 0 ? upcoming.map(b => (
                          <div key={b.id} onClick={() => setSelectedAlertBooking({ data: b, type: 'general' })} className="flex flex-col md:flex-row md:items-center justify-between bg-black/40 p-4 rounded-xl border border-white/5 hover:border-[#D4AF37]/50 transition-colors gap-4 cursor-pointer shrink-0">
                              <div className="flex items-center gap-4">
                                  <div className="bg-[#D4AF37]/10 text-[#D4AF37] font-bold text-center p-3 rounded-xl min-w-[70px] border border-[#D4AF37]/20">
                                      <p className="text-2xl leading-none">{new Date(b.date).getDate()}</p>
                                      <p className="text-xs mt-1">{new Date(b.date).toLocaleString('ar-EG', {month: 'short'})}</p>
                                  </div>
                                  <div>
                                      <p className="font-bold text-white text-lg">{b.groomName} & {b.brideName}</p>
                                      <p className="text-sm text-gray-400">{b.sessionType === 'آخر' ? b.otherSessionType : b.sessionType} • اللوكيشن: {b.location === 'آخر' ? b.otherLocation : b.location}</p>
                                  </div>
                              </div>
                              <div className="flex flex-col items-end bg-black p-3 rounded-lg border border-[#333] min-w-[120px]">
                                  <p className="text-xs text-gray-500 mb-1">المتبقي</p>
                                  {b.remaining > 0 ? (
                                      <p className="font-bold text-red-500 mb-2">{formatMoney(b.remaining)}</p>
                                  ) : (
                                      <span className="text-[11px] bg-green-500/20 text-green-400 border border-green-500/30 px-2 py-1 rounded-lg mb-2 font-bold whitespace-nowrap">تم سداد كامل المبلغ</span>
                                  )}
                                  {b.remaining > 0 && (
                                      <button 
                                          onClick={(e) => { e.stopPropagation(); setPaymentBooking(b); }} 
                                          className="text-xs bg-green-600 hover:bg-green-500 text-white px-4 py-1.5 rounded-lg transition-colors shadow-lg w-full font-bold"
                                      >
                                          سداد مبلغ
                                      </button>
                                  )}
                              </div>
                          </div>
                      )) : <p className="text-gray-500 text-center py-10 bg-black/20 rounded-xl">لا يوجد حجوزات قادمة خلال الشهر الحالي.</p>}
                  </div>
                </div>

                {/* Right Column */}
                <div className="flex flex-col gap-6 h-[400px]">
                    <StatCard title="إجمالي الحجوزات النشطة" value={stats.total} subtitle="لا تشمل المسلمة" highlight={true} />
                    
                    {/* Monthly Stats Summary */}
                    <div className="bg-[#111] p-6 rounded-3xl border border-[#222] shadow-xl flex-1 flex flex-col overflow-hidden">
                      <div className="flex items-center gap-2 mb-6 shrink-0"><Icons.TrendingUp className="text-[#D4AF37]" size={20} /><h3 className="text-[#D4AF37] font-bold text-xl">إحصائيات الشهور</h3></div>
                      <div className="space-y-6 overflow-y-auto pr-2 no-scrollbar flex-1">{stats.sortedMonths.length > 0 ? stats.sortedMonths.map((m, i) => (
                        <div key={i} className="space-y-2 shrink-0">
                          <div className="flex justify-between items-end"><div><p className="text-white font-bold">{m.label}</p><p className="text-xs text-gray-500">{m.count} حجوزات</p></div><p className="text-[#D4AF37] font-bold">{formatMoney(m.rev)}</p></div>
                          <div className="h-2 bg-black rounded-full overflow-hidden"><div className="h-full bg-gradient-to-l from-[#D4AF37] to-[#B8860B] transition-all duration-1000" style={{ width: `${(m.rev / stats.maxMonthlyRev) * 100}%` }}></div></div>
                        </div>
                      )) : <p className="text-gray-500 text-center py-4">لا توجد بيانات متاحة بعد.</p>}</div>
                    </div>
                </div>
              </div>

              {/* Stats at the bottom */}
              <div className="flex justify-between items-center mt-10 mb-4 border-b border-[#222] pb-4">
                  <h3 className="text-2xl font-bold text-[#D4AF37] flex items-center gap-2">
                      <Icons.Wallet size={24} /> الملخص المالي الشامل
                  </h3>
                  <button onClick={() => setLocalHideFinancials(!localHideFinancials)} className="bg-[#222] hover:bg-[#333] p-2.5 rounded-xl text-gray-400 hover:text-[#D4AF37] transition-colors border border-[#333] shadow-md flex items-center gap-2 text-sm font-bold">
                      {localHideFinancials ? <><Icons.EyeOff size={18}/> إظهار المبالغ</> : <><Icons.Eye size={18}/> إخفاء المبالغ</>}
                  </button>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4">
                <StatCard title="إجمالي الإيرادات" value={formatMoney(stats.totalExpectedRevenue)} subtitle="قيمة كل الحجوزات" highlight={true} isObscured={localHideFinancials} />
                <StatCard title="إجمالي التحصيلات" value={formatMoney(stats.totalCollected)} subtitle="ما تم قبضه فعلياً" highlight={true} isObscured={localHideFinancials} />
                <StatCard title="إجمالي المصروفات" value={formatMoney(totalExpenses)} subtitle="كافة نفقات الاستوديو" alert={true} isObscured={localHideFinancials} />
                <StatCard title="صافي الربح" value={formatMoney(netProfit)} subtitle="التحصيلات - المصروفات" success={netProfit >= 0} alert={netProfit < 0} isObscured={localHideFinancials} />
                <StatCard title="مبالغ بالسوق" value={formatMoney(stats.globalOutstanding)} alert={stats.globalOutstanding > 0} subtitle="مستحقات لدى العملاء" isObscured={localHideFinancials} />
              </div>
              
            </div>
          );
        }

        function StatCard({ title, value, subtitle, highlight, alert, success, isObscured }) {
          return (
            <div className={`p-5 rounded-3xl border flex flex-col justify-center shrink-0 ${highlight ? 'bg-gradient-to-br from-[#1a1500] to-[#0a0a0a] border-[#D4AF37]/50 shadow-[0_0_20px_rgba(212,175,55,0.1)]' : 'bg-[#111] border-[#222]'}`}>
                <h3 className="text-gray-500 text-xs md:text-sm mb-1">{title}</h3>
                <p className={`text-2xl md:text-3xl font-bold ${alert ? 'text-red-500' : success ? 'text-green-500' : 'text-white'}`}>
                    {isObscured ? '••••••' : value}
                </p>
                <p className="text-[10px] md:text-xs text-gray-600 mt-2">{subtitle}</p>
            </div>
          );
        }

        function NavItem({ icon, label, active, onClick }) {
          return (<button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${active ? 'bg-gradient-to-r from-[#D4AF37]/20 to-transparent text-[#D4AF37] border-r-4 border-[#D4AF37]' : 'text-gray-400 hover:bg-white/5'}`}>{icon}<span>{label}</span></button>);
        }

        // --- NEW BOOKING FORM ---
        function NewBooking({ settings, initialDate, bookingToEdit, onSuccess, showToast, user, isFirebaseActive }) {
            const initialFormState = {
                bookingMainType: 'فوتوغرافي وفيديو',
                groomName: '', brideName: '', phone: '', address: '', date: initialDate || '', location: '', otherLocation: '',
                sessionType: settings.sessionTypes && settings.sessionTypes.length > 0 ? settings.sessionTypes[0] : 'زفاف', 
                otherSessionType: '', makeupArtist: '', makeupLeaveTime: '', casualLocation: '', otherCasualLocation: '', packageId: '', addons: [], paid: '',
                videoServiceId: '', videoServicePrice: '', videoStartTime: '', videoAddons: [], notes: '',
                videoTerms: settings.videoContractTerm !== undefined ? settings.videoContractTerm : "تصوير الفيديو Full HD ويُسلم على فلاشة. (لا يمكن الرجوع للاستوديو لاسترجاع البيانات بعد مرور ٣ أشهر).",
                status: 'حجز جديد'
            };
            const [formData, setFormData] = useState(initialFormState);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isEditingVideoTerms, setIsEditingVideoTerms] = useState(false);
            
            useEffect(() => { 
                if (bookingToEdit) {
                    setFormData({
                        ...bookingToEdit,
                        bookingMainType: bookingToEdit.bookingMainType || 'فوتوغرافي وفيديو',
                        addons: bookingToEdit.addons || [],
                        videoAddons: bookingToEdit.videoAddons || [],
                        videoTerms: bookingToEdit.videoTerms !== undefined ? bookingToEdit.videoTerms : (settings.videoContractTerm !== undefined ? settings.videoContractTerm : "تصوير الفيديو Full HD ويُسلم على فلاشة. (لا يمكن الرجوع للاستوديو لاسترجاع البيانات بعد مرور ٣ أشهر)."),
                        status: bookingToEdit.status || 'حجز جديد'
                    });
                } else {
                    setFormData({ ...initialFormState, date: initialDate || '' }); 
                }
            }, [initialDate, bookingToEdit, settings.videoContractTerm]);
            
            // متغيرات التحكم في العرض بناءً على نوع الحجز
            const isPhotoBooking = ['تصوير فوتوغرافي', 'فوتوغرافي وفيديو'].includes(formData.bookingMainType);
            const isVideoBooking = ['تصوير فيديو', 'فوتوغرافي وفيديو'].includes(formData.bookingMainType);

            // الحسابات
            const pkg = settings.packages.find(p => p.id === formData.packageId) || { name: 'غير محدد', price: 0 };
            
            const photoPrice = isPhotoBooking ? Number(pkg.price) : 0;
            const addonsTot = isPhotoBooking ? formData.addons.reduce((s, id) => s + (settings.addons.find(a => a.id === id)?.price || 0), 0) : 0;
            
            const vServPrice = isVideoBooking ? (Number(formData.videoServicePrice) || 0) : 0;
            const vAddTot = isVideoBooking ? formData.videoAddons.reduce((s, a) => s + (Number(a.price) || 0), 0) : 0;
            
            const totalPrice = photoPrice + addonsTot + vServPrice + vAddTot;
            const remaining = totalPrice - (Number(formData.paid) || 0);

            const handleAddonToggle = (addonId) => {
                setFormData(prev => ({
                    ...prev,
                    addons: prev.addons.includes(addonId) ? prev.addons.filter(id => id !== addonId) : [...prev.addons, addonId]
                }));
            };

            const handleVideoAddonToggle = (addonDef) => {
                setFormData(prev => {
                    const exists = prev.videoAddons.find(a => a.id === addonDef.id);
                    if (exists) {
                        return { ...prev, videoAddons: prev.videoAddons.filter(a => a.id !== addonDef.id) };
                    } else {
                        return { ...prev, videoAddons: [...prev.videoAddons, { id: addonDef.id, name: addonDef.name, price: addonDef.price, subtext: addonDef.subtext, provider: '' }] };
                    }
                });
            };

            const handleVideoAddonPriceChange = (id, newPrice) => {
                setFormData(prev => ({ ...prev, videoAddons: prev.videoAddons.map(a => a.id === id ? { ...a, price: newPrice } : a) }));
            };

            const handleVideoAddonProviderChange = (id, newProvider) => {
                setFormData(prev => ({ ...prev, videoAddons: prev.videoAddons.map(a => a.id === id ? { ...a, provider: newProvider } : a) }));
            };

            const submit = async (e) => {
                e.preventDefault(); 
                if (!formData.groomName || !formData.brideName || !formData.phone || !formData.date) {
                     return showToast("يرجى إكمال البيانات الأساسية (الأسماء، الهاتف، والتاريخ)", "error");
                }
                
                setIsSubmitting(true);
                
                const sanitizedVideoAddons = formData.videoAddons.map(a => ({
                    id: a.id || '',
                    name: a.name || '',
                    price: Number(a.price) || 0,
                    provider: a.provider || '',
                    subtext: a.subtext || ''
                }));

                const snapData = {
                    ...formData,
                    snapshotPackage: isPhotoBooking ? { name: pkg.name || '', price: pkg.price || 0 } : null,
                    snapshotAddons: isPhotoBooking ? formData.addons.map(id => { const a = settings.addons.find(x => x.id === id); return a ? { name: a.name || '', price: a.price || 0 } : null; }).filter(Boolean) : [],
                    snapshotVideoService: isVideoBooking && formData.videoServiceId ? { name: settings.videoServices.find(v => v.id === formData.videoServiceId)?.name || '', price: Number(formData.videoServicePrice) || 0 } : null,
                    videoAddons: sanitizedVideoAddons,
                    totalPrice: totalPrice, remaining: remaining,
                    status: formData.status || 'حجز جديد', 
                    createdAt: bookingToEdit ? bookingToEdit.createdAt : new Date().toISOString()
                };
                
                // إزالة أي قيمة undefined لمنع أخطاء Firebase
                Object.keys(snapData).forEach(key => {
                    if (snapData[key] === undefined) {
                        snapData[key] = null;
                    }
                });
                
                if (isFirebaseActive && user && window.firebase) {
                    try { 
                        if (bookingToEdit) {
                            await firebase.firestore().collection('users').doc(user.uid).collection('bookings').doc(bookingToEdit.id).update(snapData);
                            showToast("تم تحديث الحجز بنجاح");
                        } else {
                            await firebase.firestore().collection('users').doc(user.uid).collection('bookings').add(snapData); 
                            showToast("تم الحفظ بنجاح في السحابة");
                        }
                        onSuccess(snapData, !!bookingToEdit); 
                    } catch(e) { 
                        showToast("خطأ سحابي، تأكد من اتصالك بالإنترنت", "error"); 
                    }
                } else { 
                    const finalBooking = { id: bookingToEdit ? bookingToEdit.id : 'b_' + Date.now(), ...snapData };
                    onSuccess(finalBooking, !!bookingToEdit); 
                    showToast(bookingToEdit ? "تم التحديث محلياً" : "تم الحفظ محلياً"); 
                }
                setIsSubmitting(false);
            };

            return (
                <div className="max-w-4xl mx-auto pb-10 animate-fadeIn">
                    <h2 className="text-3xl font-bold text-[#D4AF37] mb-8 border-b border-[#D4AF37]/30 pb-4">
                        {bookingToEdit ? '✏️ تعديل بيانات الحجز' : '📝 تسجيل حجز جديد'}
                    </h2>
                    
                    <form onSubmit={submit} className="space-y-8">
                        {/* بيانات العميل */}
                        <div className="bg-[#111] p-6 rounded-2xl border border-[#333]">
                          <h3 className="text-xl text-white mb-4 flex items-center gap-2"><Icons.Users size={20} className="text-[#D4AF37]"/> بيانات العميل</h3>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <InputField label="اسم العريس" value={formData.groomName} onChange={e => setFormData({...formData, groomName: e.target.value})} required />
                            <InputField label="اسم العروسة" value={formData.brideName} onChange={e => setFormData({...formData, brideName: e.target.value})} required />
                            <InputField label="رقم الهاتف" type="tel" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} required />
                            <InputField label="العنوان" value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} />
                          </div>
                        </div>

                        {/* نوع الحجز الأساسي */}
                        <div className="bg-[#111] p-6 rounded-2xl border border-[#333]">
                            <h3 className="text-xl text-white mb-4 flex items-center gap-2"><Icons.Settings size={20} className="text-[#D4AF37]"/> نوع الحجز</h3>
                            <SelectField 
                                label="اختر نوع الخدمة المطلوبة" 
                                value={formData.bookingMainType} 
                                onChange={e => setFormData({...formData, bookingMainType: e.target.value})} 
                                options={['فوتوغرافي وفيديو', 'تصوير فوتوغرافي', 'تصوير فيديو']} 
                            />
                        </div>

                        {/* تفاصيل المناسبة */}
                        <div className="bg-[#111] p-6 rounded-2xl border border-[#333]">
                          <h3 className="text-xl text-white mb-4 flex items-center gap-2"><Icons.CalendarIcon size={20} className="text-[#D4AF37]"/> تفاصيل المناسبة</h3>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="flex flex-col sm:flex-row gap-2">
                                <div className="flex-1">
                                    <SelectField label="نوع السيشن" value={formData.sessionType} onChange={e => setFormData({...formData, sessionType: e.target.value})} options={settings.sessionTypes} />
                                </div>
                                {formData.sessionType === 'آخر' && (
                                    <div className="flex-1">
                                        <InputField label="تفاصيل نوع السيشن" value={formData.otherSessionType} onChange={e=>setFormData({...formData, otherSessionType: e.target.value})} />
                                    </div>
                                )}
                            </div>
                            
                            <InputField label="تاريخ المناسبة" type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} required />
                            
                            <div className="flex flex-col sm:flex-row gap-2">
                                <div className="flex-1">
                                    <SelectField label="اللوكيشن الأساسي" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} options={['', ...settings.locations]} />
                                </div>
                                {formData.location === 'آخر' && (
                                    <div className="flex-1">
                                        <InputField label="تفاصيل اللوكيشن" value={formData.otherLocation} onChange={e=>setFormData({...formData, otherLocation: e.target.value})} />
                                    </div>
                                )}
                            </div>
                            
                            {isPhotoBooking && (
                                <>
                                    <div className="flex flex-col sm:flex-row gap-2">
                                        <div className="flex-1">
                                            <SelectField label="مكان تصوير الكاجوال (اختياري)" value={formData.casualLocation} onChange={e => setFormData({...formData, casualLocation: e.target.value})} options={['', ...settings.casualLocations]} />
                                        </div>
                                        {formData.casualLocation === 'آخر' && (
                                            <div className="flex-1">
                                                <InputField label="تفاصيل مكان الكاجوال" value={formData.otherCasualLocation} onChange={e=>setFormData({...formData, otherCasualLocation: e.target.value})} />
                                            </div>
                                        )}
                                    </div>
                                    <InputField label="اسم الميك أب" value={formData.makeupArtist} onChange={e => setFormData({...formData, makeupArtist: e.target.value})} />
                                    <InputField label="وقت الخروج من الميك أب" type="time" value={formData.makeupLeaveTime} onChange={e => setFormData({...formData, makeupLeaveTime: e.target.value})} />
                                </>
                            )}
                          </div>
                        </div>

                        {/* الباكيدج والإضافات (فوتوغرافيا) */}
                        {isPhotoBooking && (
                            <div className="bg-[#111] p-6 rounded-2xl border border-[#333] animate-fadeIn">
                              <h3 className="text-xl text-white mb-4 flex items-center gap-2"><Icons.Camera size={20} className="text-[#D4AF37]"/> الباكيدج والإضافات (فوتوغرافيا)</h3>
                              <div className="mb-6">
                                <label className="block text-sm text-gray-400 mb-2">اختر الباكيدج الأساسي</label>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                    {settings.packages.map(pkg => (
                                      <div key={pkg.id} onClick={() => setFormData({...formData, packageId: formData.packageId === pkg.id ? '' : pkg.id})} className={`p-4 rounded-xl cursor-pointer border-2 transition-all ${formData.packageId === pkg.id ? 'border-[#D4AF37] bg-[#D4AF37]/10' : 'border-[#333] hover:border-gray-500'}`}>
                                        <p className="font-bold text-white">{pkg.name}</p>
                                        <p className="text-[#D4AF37] mt-1 font-bold">{pkg.price} ج.م</p>
                                        {pkg.subtext && <p className="text-xs text-gray-400 mt-1">{pkg.subtext}</p>}
                                      </div>
                                    ))}
                                </div>
                              </div>
                              <div>
                                <label className="block text-sm text-gray-400 mb-2">الإضافات (اختياري)</label>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                    {settings.addons.map(addon => (
                                      <label key={addon.id} className="flex items-start gap-2 p-3 bg-black border border-[#333] rounded-lg cursor-pointer hover:bg-[#222]">
                                        <input type="checkbox" checked={formData.addons.includes(addon.id)} onChange={() => handleAddonToggle(addon.id)} className="accent-[#D4AF37] w-5 h-5 mt-0.5"/>
                                        <div>
                                            <p className="text-sm font-bold text-white">{addon.name}</p>
                                            <p className="text-xs text-[#D4AF37]">+{addon.price}</p>
                                            {addon.subtext && <p className="text-[10px] text-gray-500 mt-1">{addon.subtext}</p>}
                                        </div>
                                      </label>
                                    ))}
                                </div>
                              </div>
                            </div>
                        )}

                        {/* قسم تصوير الفيديو */}
                        {isVideoBooking && (
                            <div className="bg-[#111] p-6 rounded-2xl border border-[#333] animate-fadeIn">
                              <div className="flex justify-between items-start mb-4">
                                <div className="w-full">
                                    <div className="flex items-center justify-between mb-2">
                                        <h3 className="text-xl text-white flex items-center gap-2"><Icons.Video size={20} className="text-[#D4AF37]"/> قسم تصوير الفيديو</h3>
                                        <button type="button" onClick={() => setIsEditingVideoTerms(!isEditingVideoTerms)} className="text-gray-400 hover:text-[#D4AF37] flex items-center gap-1 text-sm bg-black px-3 py-1 rounded-lg border border-[#333]"><Icons.Edit size={14}/> تعديل الشروط</button>
                                    </div>
                                    {isEditingVideoTerms ? (
                                        <textarea 
                                            value={formData.videoTerms} 
                                            onChange={e => setFormData({...formData, videoTerms: e.target.value})} 
                                            className="w-full bg-black border border-red-500/50 text-red-300 rounded-xl p-3 focus:outline-none focus:border-red-500 transition-all text-sm mb-2"
                                            rows="3"
                                            placeholder="اكتب شروط الفيديو التي ستظهر في العقد (أو اتركها فارغة لحذفها من العقد)..."
                                        />
                                    ) : (
                                        formData.videoTerms ? <p className="text-sm text-red-400 max-w-2xl leading-relaxed whitespace-pre-wrap">{formData.videoTerms}</p> : <p className="text-sm text-gray-600 italic">لا توجد شروط للفيديو (اضغط تعديل لإضافة)</p>
                                    )}
                                </div>
                              </div>
                              
                              <div className="mb-6 mt-4">
                                <label className="block text-sm text-gray-400 mb-2">اختر خدمة الفيديو الأساسية</label>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                  {settings.videoServices.map(vs => (
                                    <div key={vs.id} onClick={() => setFormData(prev => prev.videoServiceId === vs.id ? {...prev, videoServiceId: '', videoServicePrice: ''} : {...prev, videoServiceId: vs.id, videoServicePrice: vs.price})} className={`p-4 rounded-xl cursor-pointer border-2 transition-all ${formData.videoServiceId === vs.id ? 'border-[#D4AF37] bg-[#D4AF37]/10' : 'border-[#333] hover:border-gray-500'}`}>
                                      <p className="font-bold text-white">{vs.name}</p>
                                      {vs.subtext && <p className="text-xs text-gray-400 mt-1">{vs.subtext}</p>}
                                    </div>
                                  ))}
                                </div>
                              </div>
                              
                              {formData.videoServiceId && (
                                <div className="mb-6 border-t border-[#333] pt-6 flex flex-col md:flex-row gap-4">
                                  <div className="md:w-1/2">
                                    <InputField label={`سعر ${settings.videoServices.find(v => v.id === formData.videoServiceId)?.name} (قابل للتعديل)`} type="number" value={formData.videoServicePrice} onChange={e => setFormData({...formData, videoServicePrice: e.target.value})} />
                                  </div>
                                  {formData.videoServiceId === 'v4' && (
                                    <div className="md:w-1/2">
                                      <InputField label="وقت البدء (من بعد الظهر)" type="time" value={formData.videoStartTime} onChange={e => setFormData({...formData, videoStartTime: e.target.value})} />
                                    </div>
                                  )}
                                </div>
                              )}

                          <div className="border-t border-[#333] pt-6">
                            <label className="block text-sm text-gray-400 mb-2">إضافات الفيديو (اختياري)</label>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                {settings.videoAddons.map(addon => {
                                    const isSelected = formData.videoAddons.some(a => a.id === addon.id);
                                    const selectedData = formData.videoAddons.find(a => a.id === addon.id);
                                    return (
                                        <div key={addon.id} className={`p-3 rounded-xl border-2 transition-all ${isSelected ? 'border-[#D4AF37] bg-[#D4AF37]/5' : 'border-[#333] bg-black hover:border-[#222]'}`}>
                                            <label className="flex items-start gap-2 cursor-pointer">
                                                <input type="checkbox" checked={isSelected} onChange={() => handleVideoAddonToggle(addon)} className="accent-[#D4AF37] w-5 h-5 mt-0.5"/>
                                                <div>
                                                    <p className="text-sm font-bold text-white">{addon.name}</p>
                                                    <p className="text-xs text-[#D4AF37]">+{selectedData ? selectedData.price : addon.price}</p>
                                                    {addon.subtext && <p className="text-[10px] text-gray-500 mt-1">{addon.subtext}</p>}
                                                </div>
                                            </label>
                                            {isSelected && (
                                                <div className="mt-3 pt-3 border-t border-[#333] flex flex-col gap-2 animate-fadeIn">
                                                    <div className="flex items-center justify-between gap-2">
                                                        <span className="text-[10px] text-gray-400 whitespace-nowrap">المورد/المؤجر:</span>
                                                        <input type="text" value={selectedData.provider || ''} onChange={(e) => handleVideoAddonProviderChange(addon.id, e.target.value)} className="w-full bg-[#111] border border-[#444] text-white rounded px-2 py-1.5 text-xs focus:border-[#D4AF37] outline-none" placeholder="الاسم..."/>
                                                    </div>
                                                    <div className="flex items-center justify-between gap-2">
                                                        <span className="text-[10px] text-gray-400 whitespace-nowrap">السعر:</span>
                                                        <input type="number" min="0" value={selectedData.price} onChange={(e) => handleVideoAddonPriceChange(addon.id, e.target.value)} className="w-full bg-[#111] border border-[#444] text-white rounded px-2 py-1.5 text-xs focus:border-[#D4AF37] outline-none"/>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                          </div>
                        </div>
                        )}

                        {/* الملاحظات الإضافية تم نقلها للأسفل */}
                        <div className="bg-[#111] p-6 rounded-2xl border border-[#333]">
                            <h3 className="text-xl text-white mb-4 flex items-center gap-2"><Icons.FileText size={20} className="text-[#D4AF37]"/> ملاحظات إضافية</h3>
                            <textarea value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} rows="3" className="w-full bg-black border border-[#333] text-white rounded-xl p-4 focus:outline-none focus:border-[#D4AF37] transition-all" placeholder="اكتب هنا أي تفاصيل أو اتفاقات خاصة مع العميل..."></textarea>
                        </div>

                        {/* الملخص المالي */}
                        <div className="bg-gradient-to-br from-[#1a1500] to-[#0a0a0a] p-6 rounded-2xl border border-[#D4AF37]/50">
                          <h3 className="text-xl text-[#D4AF37] font-bold mb-4">الملخص المالي</h3>
                          <div className="flex flex-col md:flex-row gap-6 items-center justify-between">
                            <div className="text-center md:text-right w-full">
                              <p className="text-gray-400">الإجمالي</p>
                              <p className="text-3xl font-bold text-white">{totalPrice} ج.م</p>
                            </div>
                            <div className="w-full">
                              <InputField label="المدفوع (عربون)" type="number" value={formData.paid} onChange={e => setFormData({...formData, paid: e.target.value})} placeholder="أدخل المبلغ..." />
                            </div>
                            <div className="text-center md:text-right w-full">
                              <p className="text-gray-400">المتبقي</p>
                              <p className={`text-3xl font-bold ${remaining > 0 ? 'text-red-400' : 'text-green-400'}`}>{remaining} ج.م</p>
                            </div>
                          </div>
                        </div>
                        
                        <button type="submit" disabled={isSubmitting} className={`w-full text-black font-bold text-xl py-4 rounded-xl transition-all shadow-[0_0_20px_rgba(212,175,55,0.3)] ${isSubmitting ? 'bg-yellow-700 cursor-not-allowed opacity-70' : 'bg-[#D4AF37] hover:bg-yellow-500'}`}>
                          {isSubmitting ? 'جاري الحفظ...' : (bookingToEdit ? 'تحديث وحفظ الحجز' : 'تأكيد وحفظ الحجز')}
                        </button>
                    </form>
                </div>
            );
        }

        function ClientsList({ bookings, settings, onPrint, onEdit, showToast, user, isFirebaseActive, onLocalDelete, onUpdateBooking }) {
            const [search, setSearch] = useState('');
            const [statusFilter, setStatusFilter] = useState('all');
            const [bookingToDelete, setBookingToDelete] = useState(null);
            const [msgModalBooking, setMsgModalBooking] = useState(null);
            
            // Payment Modal States
            const [paymentModalOpen, setPaymentModalOpen] = useState(false);
            const [paymentSearch, setPaymentSearch] = useState('');
            const [selectedPaymentClient, setSelectedPaymentClient] = useState(null);
            const [paymentAmount, setPaymentAmount] = useState('');
            
            // Thank You Modal State
            const [thankYouClient, setThankYouClient] = useState(null);

            const filtered = bookings.filter(b => {
                const matchesSearch = b.phone?.includes(search) || b.groomName?.includes(search) || b.brideName?.includes(search);
                const matchesStatus = statusFilter === 'all' || (b.status || 'حجز جديد') === statusFilter;
                return matchesSearch && matchesStatus;
            });
            
            const remove = async (id) => {
                if (isFirebaseActive && user && window.firebase) { try { await firebase.firestore().collection('users').doc(user.uid).collection('bookings').doc(id).delete(); showToast("تم الحذف من السحابة"); } catch(e) { showToast("خطأ", "error"); } }
                else { onLocalDelete(id); showToast("تم الحذف"); }
                setBookingToDelete(null);
            };

            const processGlobalPayment = () => {
                const amt = Number(paymentAmount);
                if (amt <= 0 || !amt) return;
                if (amt > selectedPaymentClient.remaining) return alert('عذراً: المبلغ المضاف أكبر من المبلغ المتبقي على العميل!');
                
                const newPaid = (Number(selectedPaymentClient.paid) || 0) + amt;
                const newRemaining = selectedPaymentClient.totalPrice - newPaid;
                
                const updatedBooking = {
                    ...selectedPaymentClient,
                    paid: newPaid,
                    remaining: newRemaining
                };
                
                onUpdateBooking(updatedBooking);
                
                if (newRemaining === 0) {
                    setThankYouClient(updatedBooking);
                }
                
                setPaymentModalOpen(false);
                setSelectedPaymentClient(null);
                setPaymentAmount('');
                setPaymentSearch('');
            };

            const updateBookingStatus = (booking, newStatus) => {
                if (newStatus === 'تم التسليم' && Number(booking.remaining) > 0) {
                    showToast("عذراً، لا يمكن تغيير الحالة إلى 'تم التسليم' لوجود مبلغ متبقي على العميل!", "error");
                    return; // إيقاف العملية وعدم تغيير الحالة
                }
                onUpdateBooking({ ...booking, status: newStatus });
            };

            const getStatusColor = (status) => {
                switch(status) {
                    case 'حجز جديد': return 'text-white font-bold';
                    case 'في مرحلة الريتاتش': return 'text-purple-400 font-bold';
                    case 'في مرحلة الطباعة': return 'text-orange-400 font-bold';
                    case 'جاهز للاستلام': return 'text-green-400 font-bold';
                    case 'تم التسليم': return 'text-gray-500 font-bold';
                    default: return 'text-white font-bold';
                }
            };

            // --- دالة تصدير البيانات إلى Excel الحقيقي ---
            const handleExportBackup = () => {
                if (bookings.length === 0) {
                    return showToast("لا توجد بيانات لتصديرها!", "error");
                }

                // 1. تحديد عناوين الأعمدة
                const headers = ['اسم العريس', 'اسم العروسة', 'الهاتف', 'التاريخ', 'نوع السيشن', 'المكان', 'إجمالي الحساب', 'المدفوع', 'المتبقي', 'حالة الطلب'];
                
                // 2. تجهيز صفوف البيانات (مصفوفة ثنائية الأبعاد)
                const data = bookings.map(b => {
                    const session = b.sessionType === 'آخر' ? b.otherSessionType : b.sessionType;
                    const loc = b.location === 'آخر' ? b.otherLocation : b.location;
                    const status = b.status || 'حجز جديد';
                    
                    return [
                        b.groomName || '', 
                        b.brideName || '', 
                        b.phone || '', 
                        b.date || '', 
                        session || '', 
                        loc || '', 
                        b.totalPrice || 0, 
                        b.paid || 0, 
                        b.remaining || 0, 
                        status
                    ];
                });

                // 3. إنشاء ملف الـ Excel باستخدام مكتبة xlsx
                const wb = XLSX.utils.book_new(); // إنشاء كتاب جديد
                const ws = XLSX.utils.aoa_to_sheet([headers, ...data]); // دمج العناوين مع البيانات
                
                // إضافة الشيت إلى الكتاب
                XLSX.utils.book_append_sheet(wb, ws, "العملاء");
                
                // تنزيل الملف بصيغة .xlsx
                XLSX.writeFile(wb, `MrakbyStudio_Bookings_${new Date().toISOString().split('T')[0]}.xlsx`);
                
                showToast("تم تحميل الحجوزات (Excel) بنجاح! ✅");

                                      setThankYouClient(null);

                            <div className="flex justify-center gap-4">

                                        <div className="bg-black/50 p-4 rounded-xl border border-[#333]">
                                            <div className="flex justify-between items-start mb-2">
                                                <div>
                                                    <p className="font-bold text-white text-lg">{selectedPaymentClient.groomName} & {selectedPaymentClient.brideName}</p>

                                                <div><p className="text-xs text-gray-500">المدفوع مسبقاً</p><p className="font-bold text-green-500">{selectedPaymentClient.paid} ج.م</p></div>
                                                <div className="text-left"><p className="text-xs text-gray-500">المتبقي</p><p className="font-bold text-red-500">{selectedPaymentClient.remaining} ج.م</p></div>
                                            </div>
                                        </div>
                                        
                                        <div className="flex flex-col w-full">
                                            <label className="text-xs text-gray-400 mb-1">المبلغ المراد سداده الآن</label>

                                                className="bg-black border border-[#333] text-white rounded-xl p-3 focus:outline-none focus:border-green-500 transition-all w-full" 
                                            />

                                        <button onClick={processGlobalPayment} disabled={!paymentAmount || paymentAmount <= 0 || paymentAmount > selectedPaymentClient.remaining} className="w-full bg-green-600 disabled:bg-gray-600 disabled:cursor-not-allowed hover:bg-green-500 text-white font-bold py-3 rounded-xl transition-colors mt-4">
                                            تأكيد السداد
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <div className="flex flex-col md:flex-row justify-between items-center gap-4 w-full">
                        <div className="flex flex-wrap items-center gap-2 md:gap-4">
                            <h2 className="text-3xl font-bold text-[#D4AF37]">قاعدة العملاء</h2>
                            <div className="flex gap-2">
                                <button onClick={() => setPaymentModalOpen(true)} className="bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-colors shadow-lg text-sm md:text-base">
                                    <Icons.PlusCircle size={18} /> سداد دفعة
                                </button>
                                <button onClick={handleExportBackup} className="bg-blue-900/40 text-blue-400 border border-blue-500/30 hover:bg-blue-600 hover:text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-colors shadow-lg text-sm md:text-base">
                                    <Icons.Save size={18} /> تصدير Excel
                                </button>
                            </div>
                        </div>
                        <div className="relative w-full md:w-96"><Icons.Search className="absolute right-4 top-3.5 text-gray-500" size={20}/><input type="text" placeholder="ابحث بالاسم أو رقم الهاتف..." value={search} onChange={e => setSearch(e.target.value)} className="w-full bg-[#111] border border-[#333] p-3 pr-12 rounded-2xl outline-none focus:border-[#D4AF37] text-white"/></div>

                    {/* Status Filters */}
                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2 border-b border-[#222]">
                        <button onClick={() => setStatusFilter('all')} className={`px-4 py-2 rounded-xl text-sm whitespace-nowrap transition-colors ${statusFilter === 'all' ? 'bg-[#D4AF37] text-black font-bold' : 'bg-[#111] text-gray-400 hover:bg-[#222] border border-[#333]'}`}>الكل</button>
                        {BOOKING_STATUSES.map(s => (
                            <button key={s} onClick={() => setStatusFilter(s)} className={`px-4 py-2 rounded-xl text-sm whitespace-nowrap transition-colors ${statusFilter === s ? 'bg-[#D4AF37] text-black font-bold' : 'bg-[#111] text-gray-400 hover:bg-[#222] border border-[#333]'}`}>{s}</button>
                        ))}
                    </div>

                    <div className="bg-[#111] rounded-3xl border border-[#333] overflow-x-auto shadow-xl"><table className="w-full text-right"><thead className="bg-black/40 border-b border-[#222]"><tr><th className="p-4 text-gray-400 font-medium">العروسين</th><th className="p-4 text-gray-400 font-medium">التفاصيل</th><th className="p-4 text-gray-400 font-medium">التاريخ</th><th className="p-4 text-gray-400 font-medium">الحساب</th><th className="p-4 text-gray-400 font-medium">حالة الطلب</th><th className="p-4 text-center text-gray-400 font-medium">إجراءات</th></tr></thead><tbody className="divide-y divide-[#222]">
                        {filtered.map(b => (
                            <tr key={b.id} className="hover:bg-[#1a1a1a] transition-colors">
                                <td className="p-4"><p className="font-bold text-white text-lg">{b.groomName}</p><p className="text-sm text-gray-500">& {b.brideName}</p></td>
                                <td className="p-4"><p className="text-white">{b.sessionType === 'آخر' ? b.otherSessionType : b.sessionType}</p><p className="text-xs text-[#D4AF37] mt-1 border border-[#D4AF37]/30 rounded px-2 py-0.5 inline-block">{b.location === 'آخر' ? b.otherLocation : b.location}</p></td>
                                <td className="p-4 text-sm font-mono text-gray-300">{b.date}</td>
                                <td className="p-4">
                                    <p className="text-white font-bold">{b.totalPrice} ج.م</p>
                                    {b.remaining > 0 ? (
                                        <p className="text-xs text-red-500 mt-1 font-bold">باقي {b.remaining}</p>
                                    ) : (
                                        <span className="text-[11px] bg-green-500/20 text-green-400 border border-green-500/30 px-2 py-1 rounded-lg mt-1 inline-block font-bold">تم سداد كامل المبلغ</span>
                                    )}
                                </td>
                                <td className="p-4">
                                    <select
                                        value={b.status || 'حجز جديد'}
                                        onChange={(e) => updateBookingStatus(b, e.target.value)}
                                        className={`bg-black border border-[#333] rounded-lg p-2 text-sm outline-none focus:border-[#D4AF37] ${getStatusColor(b.status || 'حجز جديد')}`}
                                    >
                                        {BOOKING_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                </td>
                                <td className="p-4 flex justify-center gap-2">
                                    <button onClick={() => setMsgModalBooking(b)} className="p-2.5 bg-green-500/10 text-green-500 hover:bg-green-500 hover:text-white rounded-xl transition-colors" title="إرسال رسالة سريعة للعميل"><Icons.MessageSquare size={20}/></button>
                                    <button onClick={() => window.open(generateGoogleCalendarLink(b, settings.studioName), '_blank')} className="p-2.5 bg-blue-500/10 text-blue-500 hover:bg-blue-500 hover:text-white rounded-xl transition-colors" title="إضافة للتقويم"><Icons.CalendarPlus size={20}/></button>
                                    <button onClick={() => onEdit(b)} className="p-2.5 bg-blue-500/10 text-blue-500 hover:bg-blue-500 hover:text-white rounded-xl transition-colors" title="تعديل الحجز"><Icons.Edit size={20}/></button>
                                    <button onClick={() => onPrint(b)} className="p-2.5 bg-[#D4AF37]/10 text-[#D4AF37] hover:bg-[#D4AF37] hover:text-black rounded-xl transition-colors" title="طباعة العقد"><Icons.Printer size={20}/></button>
                                    <button onClick={() => setBookingToDelete(b.id)} className="p-2.5 bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white rounded-xl transition-colors" title="حذف العميل"><Icons.Trash2 size={20}/></button>
                                </td>
                            </tr>
                        ))}
                        {filtered.length === 0 && <tr><td colSpan="6" className="text-center p-10 text-gray-500">لا توجد نتائج مطابقة.</td></tr>}
