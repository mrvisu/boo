                    desc += `- الإضافات: ${booking.videoAddons.map(a => `${a.name}${a.provider ? ` (مورد: ${a.provider})` : ''}`).join('، ')}\n`;
                }
                desc += `\n`;
            }
            
            desc += `💰 التفاصيل المالية:\n`;
            desc += `- إجمالي الحساب: ${booking.totalPrice} ج.م\n`;
            desc += `- المدفوع (عربون): ${booking.paid || 0} ج.م\n`;
            desc += `- المبلغ المتبقي: ${booking.remaining} ج.م\n\n`;

            if (booking.notes) {
                desc += `📝 ملاحظات واتفاقات إضافية:\n${booking.notes}\n\n`;
            }

            return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${startStr}/${endStr}&details=${encodeURIComponent(desc)}&location=${encodeURIComponent(loc || '')}`;
        };

        function InputField({ label, type = "text", value, onChange, placeholder, required }) {
          return (
            <div className="flex flex-col w-full">
              <label className="text-xs text-gray-400 mb-1">{label} {required && <span className="text-red-500">*</span>}</label>
              <input 
                type={type} 
                min={type === 'number' ? "0" : undefined} 
                value={value} 
                onChange={onChange} 
                placeholder={placeholder} 
                required={required} 
                className="bg-black border border-[#333] text-white rounded-xl p-3 focus:outline-none focus:border-[#D4AF37] transition-all w-full" 
              />
            </div>
          );
        }

        function SelectField({ label, value, onChange, options = [] }) {
          return (
            <div className="flex flex-col w-full">
              <label className="text-xs text-gray-500 mb-1">{label}</label>
              <select value={value} onChange={onChange} className="bg-black border border-[#333] text-white rounded-xl p-3 outline-none focus:border-[#D4AF37] w-full">
                {options?.map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
              </select>
            </div>
          );
        }

        function DetailRow({ label, value, isMono, isRed }) {
          return (
            <div className="flex flex-col border-b border-[#222] pb-2">
              <span className="text-xs text-gray-500">{label}</span>
              <span className={`text-sm font-bold ${isRed ? 'text-red-500' : 'text-white'} ${isMono ? 'font-mono' : ''}`}>{value || '---'}</span>
            </div>
          );
        }

        function AnimatedAlertBox({ alerts, title, icon, onClick, type }) {
            const [index, setIndex] = useState(0);

            useEffect(() => {
                if (alerts.length <= 1) return;
                const timer = setInterval(() => {
                    setIndex(prev => (prev + 1) % alerts.length);
                }, 10000);
                return () => clearInterval(timer);
            }, [alerts.length]);

            if (alerts.length === 0) return null;

            const currentAlert = alerts[index];
            const isCasual = type === 'casual';
            const bgColor = isCasual ? 'bg-red-900/30' : 'bg-red-900/30'; 
            const borderColor = isCasual ? 'border-red-500' : 'border-red-500';
            const iconColor = isCasual ? 'text-red-400' : 'text-red-400';
            const badgeColor = isCasual ? 'bg-red-500/20 text-red-300' : 'bg-red-500/20 text-red-300';

            return (
                <div className={`${bgColor} border-r-4 ${borderColor} p-5 rounded-2xl shadow-xl mb-4 overflow-hidden`}>
                    <div className="flex justify-between items-center mb-3">
                        <h3 className={`${iconColor} font-bold text-lg flex items-center gap-2`}>
                            {icon} {title}
                        </h3>
                        {alerts.length > 1 && (
                            <span className={`text-xs font-bold ${badgeColor} px-2 py-1 rounded-full`}>
                                {index + 1} / {alerts.length}
                            </span>
                        )}
                    </div>
                    
                    <div 
                        key={currentAlert.id}
                        onClick={() => onClick(currentAlert)}
                        className="cursor-pointer bg-black/40 p-4 rounded-xl border border-white/5 hover:border-white/20 transition-all flex justify-between items-center animate-slideFade group"
                    >
                        <div>
                            <p className="font-bold text-white text-lg group-hover:text-[#D4AF37] transition-colors">{currentAlert.groomName} & {currentAlert.brideName}</p>
                            <p className="text-xs text-gray-300 mt-1">
                                {currentAlert.sessionType === 'آخر' ? currentAlert.otherSessionType : currentAlert.sessionType} 
                                {isCasual ? ` - مكان الكاجوال: ${currentAlert.actualCasualLoc}` : ` - اللوكيشن: ${currentAlert.location === 'آخر' ? currentAlert.otherLocation : currentAlert.location}`}
                            </p>
                        </div>
                        <div className="text-left flex flex-col items-end gap-2">
                            <p className="text-xs text-gray-400 font-mono">{currentAlert.date}</p>
                            <span className="text-[10px] font-bold bg-[#D4AF37]/10 text-[#D4AF37] px-2 py-1 rounded border border-[#D4AF37]/30">عرض التفاصيل</span>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Onboarding Guide Modal ---

                {
                    title: "مرحباً بك في نظام الاستوديو! 👋",

                    icon: <Icons.Camera size={60} className="text-[#D4AF37] mb-6 mx-auto animate-pulse" />
                },
                {
                    title: "📊 الرئيسية والملخص المالي",
                    text: "هنا تجد نظرة شاملة على عملك: إجمالي الإيرادات، التحصيلات، والمصروفات. كما تظهر لك تنبيهات ذكية بمواعيد التصوير لتكون مستعداً دائماً. (يمكنك إخفاء المبالغ المالية للحفاظ على الخصوصية).",
                    icon: <Icons.LayoutDashboard size={60} className="text-[#D4AF37] mb-6 mx-auto" />

                {

                    text: "سجل بيانات العريس والعروسة، اختر نوع التصوير (فيديو أو فوتوغرافي)، وحدد الباقات. سيقوم النظام بحساب الإجمالي والمتبقي تلقائياً، ويمكنك طباعة العقد رسمياً أو مشاركته.",
                    icon: <Icons.PlusCircle size={60} className="text-[#D4AF37] mb-6 mx-auto" />

            return (

                        <div className="min-h-[250px] flex flex-col justify-center">
                            {steps[step].icon}

        // --- Admin Components ---
        function AdminDashboard({ showToast }) {
            const [subscribers, setSubscribers] = useState([]);
            const [editingSub, setEditingSub] = useState(null);
            const [editForm, setEditForm] = useState({ email: '', phone: '', addDays: 0, subType: 'trial' });
            
            useEffect(() => {
                if(!window.firebase) return;
                const unsub = firebase.firestore().collection('subscribers').onSnapshot(snap => {
                    setSubscribers(snap.docs.map(doc => doc.data()));
                });
                return () => unsub();
            }, []);

            const toggleStatus = async (uid, currentStatus) => {
                try {
                    await firebase.firestore().collection('subscribers').doc(uid).update({ isActive: !currentStatus });
                    showToast(`تم ${!currentStatus ? 'تفعيل' : 'إيقاف'} الحساب بنجاح`);
                } catch(e) {
                    showToast("حدث خطأ أثناء تحديث حالة الحساب", "error");
                }
            };

            const deleteSubscriber = async (uid, email) => {
                if(window.confirm(`هل أنت متأكد من حذف المشترك (${email || 'بدون إيميل'}) نهائياً من قاعدة البيانات؟`)) {
                    try {
                        await firebase.firestore().collection('subscribers').doc(uid).delete();
                        showToast("تم حذف المشترك بنجاح");
                    } catch(e) {
                        showToast("حدث خطأ أثناء محاولة الحذف", "error");
                    }
                }
            };

            const openEdit = (sub) => {
                setEditingSub(sub);
                setEditForm({ email: sub.email || '', phone: sub.phone || '', addDays: 0, subType: sub.subscriptionType || 'trial' });
            };

            const saveEdit = async () => {
                if (!editingSub) return;
                try {
                    let updateData = { email: editForm.email, phone: editForm.phone, subscriptionType: editForm.subType };
                    
                    if (Number(editForm.addDays) > 0) {
                        // بدء الحساب من تاريخ اليوم (تصفير العداد القديم)
                        const newEndDate = new Date();
                        newEndDate.setDate(newEndDate.getDate() + Number(editForm.addDays));
                        
                        updateData.trialEndsAt = newEndDate.toISOString();
                        updateData.isActive = true; 
                    }
                    
                    await firebase.firestore().collection('subscribers').doc(editingSub.uid).update(updateData);
                    showToast("تم تحديث بيانات المشترك بنجاح!");
                    setEditingSub(null);
                } catch(e) {
                    showToast("خطأ في تحديث البيانات", "error");
                }
            };

            return (
                <div className="animate-fadeIn space-y-6 pb-10 relative">
                    
                    {editingSub && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[80] p-4 animate-fadeIn">
                            <div className="bg-[#111] border border-[#D4AF37]/30 p-6 rounded-3xl w-full max-w-md shadow-2xl">
                                <h3 className="text-xl font-bold text-[#D4AF37] mb-6 flex items-center gap-2">
                                    <Icons.Edit size={20} /> إدارة اشتراك العميل
                                </h3>
                                <div className="space-y-4">
                                    <InputField label="البريد الإلكتروني" value={editForm.email} onChange={e => setEditForm({...editForm, email: e.target.value})} />
                                    <InputField label="رقم الهاتف" value={editForm.phone} onChange={e => setEditForm({...editForm, phone: e.target.value})} />
                                    
                                    <div className="border-t border-[#333] pt-4 mt-4">
                                        <label className="text-xs text-gray-500 mb-1 block">نوع الاشتراك</label>
                                        <select value={editForm.subType} onChange={e => setEditForm({...editForm, subType: e.target.value})} className="bg-black border border-[#333] text-white rounded-xl p-3 w-full outline-none focus:border-[#D4AF37]">
                                            <option value="trial">فترة تجريبية مجانية</option>
                                            <option value="paid">اشتراك مدفوع (حقيقي)</option>
                                        </select>
                                    </div>

                                    <div className="mt-2">
                                        <label className="text-xs text-gray-500 mb-1 block">تحديد مدة الاشتراك الجديدة (من اليوم)</label>
                                        <select value={editForm.addDays} onChange={e => setEditForm({...editForm, addDays: e.target.value})} className="bg-black border border-[#333] text-white rounded-xl p-3 w-full outline-none focus:border-[#D4AF37]">
                                            <option value="0">بدون تمديد (تعديل البيانات فقط)</option>
                                            <optgroup label="فترة تجريبية">
                                                <option value="5">فترة تجريبية (5 أيام)</option>
                                                <option value="14">فترة تجريبية (14 يوم)</option>
                                            </optgroup>
                                            <optgroup label="اشتراكات مدفوعة">
                                                <option value="30">اشتراك شهر واحد</option>
                                                <option value="60">اشتراك شهرين</option>
                                                <option value="90">اشتراك 3 أشهر</option>
                                                <option value="180">اشتراك 6 أشهر</option>
                                                <option value="365">اشتراك سنة كاملة</option>
                                            </optgroup>
                                        </select>
                                        <p className="text-[10px] text-red-400 mt-2 leading-relaxed font-bold">ملاحظة: اختيار مدة جديدة سيلغي أي أيام متبقية قديمة ويبدأ العد من تاريخ اليوم.</p>
                                    </div>
                                    
                                    <div className="flex gap-4 pt-4 border-t border-[#222]">
                                        <button onClick={() => setEditingSub(null)} className="flex-1 py-3 bg-[#222] hover:bg-[#333] text-white rounded-xl transition-colors font-bold">إلغاء</button>
                                        <button onClick={saveEdit} className="flex-1 py-3 bg-[#D4AF37] hover:bg-yellow-500 text-black rounded-xl transition-colors font-bold">حفظ التعديلات</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="border-b border-[#222] pb-4">
                        <h2 className="text-3xl font-bold text-[#D4AF37] flex items-center gap-2"><Icons.Shield size={30} /> لوحة تحكم الإدارة العليا</h2>
                        <p className="text-gray-400 mt-1">إدارة الاستوديوهات والمصورين المشتركين في النظام.</p>
                    </header>

                    <div className="bg-[#111] rounded-3xl border border-[#333] overflow-x-auto shadow-xl">
                        <table className="w-full text-right">
                            <thead className="bg-black/40 border-b border-[#222]">
                                <tr>
                                    <th className="p-4 text-gray-400 font-medium">البريد الإلكتروني / الهاتف</th>
                                    <th className="p-4 text-gray-400 font-medium">تاريخ الانتهاء / العداد</th>
                                    <th className="p-4 text-gray-400 font-medium">حالة ونوع الاشتراك</th>
                                    <th className="p-4 text-center text-gray-400 font-medium">إجراءات الإدارة</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-[#222]">
                                {subscribers.map(sub => {
                                    const endDate = sub.trialEndsAt ? new Date(sub.trialEndsAt) : new Date();
                                    const diffTime = endDate - new Date();
                                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                                    const isExpired = diffDays <= 0;
                                    
                                    let badge;
                                    if (!sub.isActive || isExpired) {
                                        badge = <span className="bg-red-500/20 text-red-400 px-3 py-1 rounded-full text-xs font-bold border border-red-500/30">منتهي / موقوف</span>;
                                    } else if (sub.subscriptionType === 'paid') {
                                        badge = <span className="bg-green-500/20 text-green-400 px-3 py-1 rounded-full text-xs font-bold border border-green-500/30">اشتراك مدفوع</span>;
                                    } else {
                                        badge = <span className="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-xs font-bold border border-blue-500/30">فترة تجريبية</span>;
                                    }

                                    return (
                                        <tr key={sub.uid} className="hover:bg-[#1a1a1a] transition-colors">
                                            <td className="p-4">
                                                <p className="font-mono font-bold text-white text-sm">{sub.phone || '---'}</p>
                                                <p className="text-xs text-gray-500 mt-1">{sub.email || '---'}</p>
                                                <p className="text-[10px] text-gray-600 mt-1">سجل: {new Date(sub.createdAt).toLocaleDateString('ar-EG')}</p>
                                            </td>
                                            <td className="p-4">
                                                <p className="text-sm text-gray-300">{endDate.toLocaleDateString('ar-EG')}</p>
                                                {!isExpired && sub.isActive ? (
                                                    <span className="text-xs text-[#D4AF37] font-bold mt-1 flex items-center gap-1">
                                                        <Icons.Clock size={12} /> متبقي {diffDays} يوم
                                                    </span>
                                                ) : (
                                                    <span className="text-xs text-red-500 font-bold mt-1 block">انتهت الصلاحية</span>
                                                )}
                                            </td>
                                            <td className="p-4">{badge}</td>
                                            <td className="p-4 text-center flex justify-center gap-2">
                                                <button 
                                                    onClick={() => openEdit(sub)}
                                                    className="px-3 py-2 bg-blue-900/30 text-blue-500 hover:bg-blue-600 hover:text-white rounded-xl transition-colors"
                                                    title="تعديل البيانات وتمديد التجربة"
                                                >
                                                    <Icons.Edit size={18} />
                                                </button>
                                                <button 
                                                    onClick={() => toggleStatus(sub.uid, sub.isActive)}
                                                    className={`px-4 py-2 rounded-xl font-bold text-sm transition-colors ${sub.isActive ? 'bg-orange-900/30 text-orange-500 hover:bg-orange-600 hover:text-white' : 'bg-green-900/30 text-green-500 hover:bg-green-600 hover:text-white'}`}
                                                >
                                                    {sub.isActive ? 'إيقاف' : 'تفعيل'}
                                                </button>
                                                <button 
                                                    onClick={() => deleteSubscriber(sub.uid, sub.email || sub.phone)}
                                                    className="px-3 py-2 bg-red-900/30 text-red-500 hover:bg-red-600 hover:text-white rounded-xl transition-colors"
                                                    title="حذف المشترك نهائياً"
                                                >
                                                    <Icons.Trash2 size={18} />
                                                </button>
                                            </td>
                                        </tr>
                                    );
                                })}
                                {subscribers.length === 0 && <tr><td colSpan="4" className="text-center p-10 text-gray-500">لا يوجد مشتركون بعد.</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // --- Calendar Component Restored ---
        function CalendarView({ bookings, expenses, onDayClick, settings }) {
            const [selectedBooking, setSelectedBooking] = useState(null);
            
            const today = new Date();
            const [currentDate, setCurrentDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth(); 

            const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));
            const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
            const goToToday = () => setCurrentDate(new Date(today.getFullYear(), today.getMonth(), 1));

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDayIndex = new Date(year, month, 1).getDay();
            
            const days = [];
            for(let i=0; i<firstDayIndex; i++) days.push(null);
            for(let i=1; i<=daysInMonth; i++) days.push(i);
            const monthNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];

            // حساب تكلفة العريس المحددة
            const bExpenses = selectedBooking ? expenses.filter(e => e.bookingId === selectedBooking.id) : [];
            const totalCost = bExpenses.reduce((sum, e) => sum + (Number(e.amount) || 0), 0);
            const netProfit = selectedBooking ? selectedBooking.totalPrice - totalCost : 0;

            return (
              <div className="animate-fadeIn max-w-5xl mx-auto pb-10 relative">
                {selectedBooking && (
                  <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[60] p-4 animate-fadeIn">
                    <div className="bg-[#111] border border-[#D4AF37]/30 p-6 rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-y-auto no-scrollbar shadow-2xl">
                      <div className="flex justify-between items-center mb-6 border-b border-[#222] pb-4">
                        <h3 className="text-2xl font-bold text-[#D4AF37]">بيانات الحجز التفصيلية</h3>
                        <button onClick={() => setSelectedBooking(null)} className="text-gray-400 hover:text-white"><Icons.X size={30} /></button>
                      </div>
                      <div className="space-y-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          <DetailRow label="العريس" value={selectedBooking.groomName} />
                          <DetailRow label="العروسة" value={selectedBooking.brideName} />
                          <DetailRow label="الهاتف" value={selectedBooking.phone} isMono />
                          <DetailRow label="التاريخ" value={selectedBooking.date} />
                          <DetailRow label="نوع السيشن" value={selectedBooking.sessionType === 'آخر' ? selectedBooking.otherSessionType : selectedBooking.sessionType} />
                          <DetailRow label="اللوكيشن" value={selectedBooking.location === 'آخر' ? selectedBooking.otherLocation : selectedBooking.location} />
                          <DetailRow label="الميك أب" value={selectedBooking.makeupArtist || 'غير محدد'} />
                          <DetailRow label="خروج ميك أب" value={selectedBooking.makeupLeaveTime || '--:--'} />
                          <DetailRow label="العنوان" value={selectedBooking.address || 'غير محدد'} />
                        </div>
                        
                        {selectedBooking.videoAddons && selectedBooking.videoAddons.length > 0 && (
                            <div className="bg-[#1a1a1a] p-4 rounded-xl border border-[#333] mt-2">
                                <h4 className="text-[#D4AF37] font-bold text-sm mb-2 flex items-center gap-2"><Icons.Video size={16} /> إضافات الفيديو والموردين</h4>
                                <div className="space-y-2 mt-3">
                                    {selectedBooking.videoAddons.map((va, idx) => (
                                        <div key={idx} className="flex justify-between items-center text-sm border-b border-[#333] pb-2 last:border-0 last:pb-0">
                                            <span className="text-white font-bold">{va.name}</span>
                                            <span className="text-gray-400">{va.provider ? `المورد: ${va.provider}` : 'بدون مورد'}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        
                        {selectedBooking.notes && (
                           <div className="bg-black/40 p-4 rounded-2xl border border-[#222]">
                              <h4 className="text-[#D4AF37] font-bold mb-2 flex items-center gap-2"><Icons.FileText size={18} /> ملاحظات إضافية</h4>
                              <p className="text-sm text-gray-300 whitespace-pre-wrap">{selectedBooking.notes}</p>
                           </div>
                        )}

                        <div className="bg-[#D4AF37]/10 p-4 rounded-2xl border border-[#D4AF37]/30 flex justify-between items-center shadow-lg mt-2">
                          <div><p className="text-xs text-gray-400 uppercase">إجمالي الحساب</p><p className="text-2xl font-bold text-white">{selectedBooking.totalPrice} ج.م</p></div>
                          <div className="text-left border-r border-[#D4AF37]/20 pr-4">
                            <p className="text-xs text-gray-400 uppercase mb-1">المبلغ المتبقي</p>
                            {selectedBooking.remaining > 0 ? (
                                <p className="text-2xl font-bold text-red-500">{selectedBooking.remaining} ج.م</p>
                            ) : (
                                <span className="text-sm bg-green-500/20 text-green-400 border border-green-500/30 px-3 py-1.5 rounded-lg mt-1 inline-block font-bold whitespace-nowrap">تم سداد كامل المبلغ</span>
                            )}
                          </div>
                        </div>

                        {/* ملخص المصروفات الخاصة بالعريس المحددة */}
                        <div className="grid grid-cols-2 gap-4 mt-2">
                            <div className="bg-red-900/10 p-3 rounded-2xl border border-red-900/30 flex flex-col justify-center items-center text-center shadow-inner">
                                 <p className="text-xs text-red-400 mb-1">إجمالي المصروفات عليه</p>
                                 <p className="text-lg font-bold text-red-500">{totalCost} ج.م</p>
                            </div>
                            <div className="bg-green-900/10 p-3 rounded-2xl border border-green-900/30 flex flex-col justify-center items-center text-center shadow-inner">
                                 <p className="text-xs text-green-400 mb-1">صافي الربح (المتوقع)</p>
                                 <p className="text-lg font-bold text-green-500">{netProfit} ج.م</p>
                            </div>
                        </div>

                        {bExpenses.length > 0 && (
                            <div className="bg-red-900/10 p-4 rounded-2xl border border-red-900/30 mt-4 shadow-inner">
                                <h4 className="text-red-400 font-bold mb-3 flex items-center gap-2"><Icons.Wallet size={18} /> تفاصيل مصروفات وتكلفة هذا الحجز</h4>
                                <div className="space-y-2 max-h-32 overflow-y-auto pr-2 no-scrollbar">
                                    {bExpenses.map(e => (
                                        <div key={e.id} className="flex justify-between text-sm border-b border-red-900/20 pb-2">
                                            <div className="flex flex-col">
                                                <span className="text-gray-300 font-bold">{e.category}</span>
                                                {e.notes && <span className="text-xs text-gray-500 mt-0.5">{e.notes}</span>}
                                            </div>
                                            <span className="text-red-400 font-bold mt-1">{e.amount} ج.م</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                      </div>
                      <a href={generateGoogleCalendarLink(selectedBooking, settings?.studioName)} target="_blank" className="w-full mt-6 bg-[#4285F4] text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-blue-600 transition-colors shadow-md"><Icons.CalendarPlus size={20} /> مزامنة مع تقويم جوجل</a>
                    </div>
                  </div>
                )}
                
                <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                  <div>
                    <h2 className="text-3xl font-bold text-[#D4AF37]">التقويم</h2>
                    <p className="text-gray-400 mt-2 text-sm">اضغط على أي يوم لإضافة حجز جديد، أو لمعاينة حجوزاتك السابقة.</p>
                  </div>
                  <div className="flex items-center gap-4 bg-[#111] px-2 py-1 rounded-xl border border-[#333] shadow-lg">
                      <button onClick={prevMonth} className="p-2 text-gray-400 hover:text-[#D4AF37] hover:bg-[#222] rounded-lg transition-colors" title="الشهر السابق">
                          <Icons.ChevronRight size={24} />
                      </button>
                      <div className="text-xl font-bold min-w-[120px] text-center cursor-pointer hover:text-[#D4AF37] transition-colors" onClick={goToToday} title="العودة للشهر الحالي">
                          {monthNames[month]} {year}
                      </div>
                      <button onClick={nextMonth} className="p-2 text-gray-400 hover:text-[#D4AF37] hover:bg-[#222] rounded-lg transition-colors" title="الشهر القادم">
                          <Icons.ChevronLeft size={24} />
                      </button>
                  </div>
                </div>

                <div className="bg-[#111] rounded-3xl border border-[#333] p-6 shadow-2xl">
                  <div className="grid grid-cols-7 gap-1 md:gap-2 mb-4 text-center font-bold text-gray-500 text-sm md:text-base uppercase tracking-wider"><div>الأحد</div><div>الإثنين</div><div>الثلاثاء</div><div>الأربعاء</div><div>الخميس</div><div>الجمعة</div><div>السبت</div></div>
                  <div className="grid grid-cols-7 gap-1 md:gap-3">
                    {days.map((day, idx) => {
                      if (!day) return <div key={`empty-${idx}`} className="h-24 md:h-36 bg-black/20 rounded-2xl border border-transparent"></div>;
                      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                      const dayBookings = bookings.filter(b => b.date === dateStr);
                      return (
                        <div key={idx} onClick={() => onDayClick(dateStr)} className={`h-24 md:h-36 p-1 md:p-3 rounded-2xl border cursor-pointer hover:border-[#D4AF37] transition-all group ${dayBookings.length > 0 ? 'border-[#D4AF37]/40 bg-[#D4AF37]/5' : 'border-[#222] bg-black/40'}`}>
                          <span className={`text-xs md:text-sm font-bold ${dayBookings.length > 0 ? 'text-[#D4AF37]' : 'text-gray-500'}`}>{day}</span>
                          <div className="mt-2 space-y-1.5 overflow-y-auto max-h-[70%] no-scrollbar">
                            {dayBookings.map((b, i) => (<div key={i} onClick={(e) => { e.stopPropagation(); setSelectedBooking(b); }} className="text-[9px] md:text-[11px] bg-[#D4AF37] text-black px-2 py-1 rounded-lg font-bold truncate flex items-center gap-1 hover:scale-105 transition-transform"><Icons.Camera size={10} /> {b.groomName}</div>))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            );
        }

        // --- App Component ---
        function App() {
          const [user, setUser] = useState(null);
          const [isAdmin, setIsAdmin] = useState(false);
          const [isCheckingAuth, setIsCheckingAuth] = useState(true);
          const [isFirebaseActiveState, setIsFirebaseActiveState] = useState(false);
          const [trialInfo, setTrialInfo] = useState(null);
          const [showLogoutConfirm, setShowLogoutConfirm] = useState(false);
          
          // Onboarding Tutorial State
          const [showGuide, setShowGuide] = useState(() => {
              try {
                  const seen = localStorage.getItem('mrakby_guide_seen');
                  return seen !== 'true'; // Show if not previously seen
              } catch(e) { return false; }
          });
          
          const closeGuide = () => {
              localStorage.setItem('mrakby_guide_seen', 'true');
              setShowGuide(false);
          };

          const [bookings, setBookings] = useState(() => {
              try {
                  const saved = localStorage.getItem('mrakby_bookings');
                  return saved ? JSON.parse(saved) : [];
              } catch(e) { return []; }
          });

          // إضافة حالة المصروفات
          const [expenses, setExpenses] = useState(() => {
              try {
                  const saved = localStorage.getItem('mrakby_expenses');
                  return saved ? JSON.parse(saved) : [];
              } catch(e) { return []; }
          });

          const [settings, setSettings] = useState(() => {
              try {
                  const saved = localStorage.getItem('mrakby_settings');
                  if (saved) {
                      let parsed = JSON.parse(saved);
                      // تنظيف الروابط القديمة والتالفة من ذاكرة المتصفح
                      if (parsed.studioLogo && (parsed.studioLogo.includes('Gemini_Generated_Image') || parsed.studioLogo.includes('messages-prod') || parsed.studioLogo.includes('blogger.googleusercontent'))) {
                          parsed.studioLogo = LOGO_URL;
                      }
                      return parsed;
                  }
              } catch(e) { console.error(e); }
              return DEFAULT_SETTINGS;
          });
          
          const [currentView, setCurrentView] = useState('dashboard');
          const [contractToPrint, setContractToPrint] = useState(null);
          const [bookingToEdit, setBookingToEdit] = useState(null); 
          const [toast, setToast] = useState(null);
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const [initialBookingDate, setInitialBookingDate] = useState('');

          useEffect(() => {
              if (firebaseConfig.apiKey && window.firebase) {
                  try {
                      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                      isFirebaseActive = true;
                      setIsFirebaseActiveState(true);
                      
                      firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL)
                        .then(() => {
                            firebase.auth().onAuthStateChanged(async (usr) => {
                                if (usr) {
                                    if (usr.email === ADMIN_EMAIL) {
                                        setIsAdmin(true);
                                        setUser(usr);
                                        setIsCheckingAuth(false);
                                    } else {
                                        firebase.firestore().collection('subscribers').doc(usr.uid).get().then(doc => {
                                            if (doc.exists) {
                                                const data = doc.data();
                                                if (data.isActive === false) {
                                                    firebase.auth().signOut();
                                                    alert("تم إيقاف حسابك من قبل الإدارة. يرجى التواصل لتفعيل الحساب.");
                                                    setUser(null);
                                                } else {
                                                    if (data.trialEndsAt) {
                                                        const trialEnd = new Date(data.trialEndsAt);
                                                        if (new Date() > trialEnd) {
                                                             firebase.firestore().collection('subscribers').doc(usr.uid).update({ isActive: false });
                                                             firebase.auth().signOut();
                                                             alert("انتهت الفترة التجريبية المجانية. يرجى التواصل مع الإدارة لتفعيل حسابك.");
                                                             setUser(null);
                                                        } else {
                                                             const daysLeft = Math.ceil((trialEnd - new Date()) / (1000 * 60 * 60 * 24));
                                                             setTrialInfo(`الحساب في الفترة التجريبية. متبقي ${daysLeft} أيام.`);
                                                             setUser(usr);
                                                        }
                                                    } else {
                                                        setUser(usr); 
                                                    }
                                                }
                                            } else {
                                                setUser(usr);
                                            }
                                            setIsCheckingAuth(false);
                                        }).catch(err => {
                                            console.error("Error checking subscriber status", err);
                                            setUser(usr); 
                                            setIsCheckingAuth(false);
                                        });
                                    }
                                } else {
                                    setUser(null);
                                    setIsAdmin(false);
                                    setTrialInfo(null);
                                    setIsCheckingAuth(false);
                                }
                            });
                        })
                        .catch(err => {
                            console.error("Auth persistence error", err);
                            setIsCheckingAuth(false);
                        });
                  } catch(e) {
                      console.error("Firebase init error", e);
                      setIsCheckingAuth(false);
                  }
              } else {
                  const localUser = localStorage.getItem('mrakby_local_user');
                  if(localUser) {
                      const parsed = JSON.parse(localUser);
                      if (parsed.email === ADMIN_EMAIL) setIsAdmin(true);
                      setUser(parsed);
                  }
                  setIsCheckingAuth(false);
              }
          }, []);

          useEffect(() => {
              if (!user || !isFirebaseActive || !window.firebase || isAdmin) return; 
              
              const db = firebase.firestore();
              const unsubB = db.collection('users').doc(user.uid).collection('bookings').onSnapshot((snap) => {
                  const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                  
                  // Sorting logic: Future dates ascending, then past dates descending
                  const today = new Date();
                  today.setHours(0,0,0,0);
                  
                  data.sort((a, b) => {
                      const dateA = new Date(a.date);
                      const dateB = new Date(b.date);
                      const isFutureA = dateA >= today;
                      const isFutureB = dateB >= today;
                      
                      if (isFutureA && isFutureB) {
                          return dateA - dateB; // الأقرب فالمستقبل أولاً
                      } else if (!isFutureA && !isFutureB) {
                          return dateB - dateA; // الأقرب في الماضي أولاً
                      } else if (isFutureA && !isFutureB) {
                          return -1; // المستقبل يظهر قبل الماضي
                      } else {
                          return 1;
                      }
                  });
                  setBookings(data);
              });
              
              const unsubE = db.collection('users').doc(user.uid).collection('expenses').onSnapshot((snap) => {
                  const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                  data.sort((a, b) => new Date(b.date) - new Date(a.date));
                  setExpenses(data);
              });

              const unsubS = db.collection('users').doc(user.uid).collection('settings').doc('config').onSnapshot((snap) => {
                  if(snap.exists) setSettings({ ...DEFAULT_SETTINGS, ...snap.data() });
              });
              return () => { unsubB(); unsubE(); unsubS(); };
          }, [user, isFirebaseActiveState, isAdmin]);

          useEffect(() => { localStorage.setItem('mrakby_bookings', JSON.stringify(bookings)); }, [bookings]);
          useEffect(() => { localStorage.setItem('mrakby_expenses', JSON.stringify(expenses)); }, [expenses]);
          useEffect(() => { localStorage.setItem('mrakby_settings', JSON.stringify(settings)); }, [settings]);

          // إضافة رسالة تأكيد عند محاولة إغلاق الموقع أو التبويب
          useEffect(() => {
              const handleBeforeUnload = (e) => {
                  e.preventDefault();
                  // المتصفحات الحديثة تتطلب هذا السطر ولكنها ستعرض رسالتها الافتراضية
                  e.returnValue = ''; 
              };

              window.addEventListener('beforeunload', handleBeforeUnload);

              return () => {
                  window.removeEventListener('beforeunload', handleBeforeUnload);
              };
          }, []);

          const showToast = (message, type = 'success') => {
            setToast({ message, type });
            setTimeout(() => setToast(null), 3000);
          };

          const handleLogoutClick = () => {
              setShowLogoutConfirm(true);
          };

          const confirmLogout = async () => {
              if (isFirebaseActive && window.firebase) await firebase.auth().signOut();
              else { localStorage.removeItem('mrakby_local_user'); setUser(null); setIsAdmin(false); }
              setCurrentView('dashboard');
              setShowLogoutConfirm(false);
          };

          const navigateToNewBooking = (dateStr = '') => {
            setBookingToEdit(null);
            setInitialBookingDate(dateStr);
            setCurrentView('new');
            setIsMobileMenuOpen(false);
          };

          const navigateToEditBooking = (booking) => {
            setBookingToEdit(booking);
            setCurrentView('new');
            setIsMobileMenuOpen(false);
          };

          const handleUpdateBooking = async (updatedData) => {
              if (isFirebaseActiveState && user && window.firebase) {
                  try {
                      await firebase.firestore().collection('users').doc(user.uid).collection('bookings').doc(updatedData.id).update(updatedData);
                      showToast("تم تحديث الحساب بنجاح");
                  } catch(e) {
                      showToast("حدث خطأ أثناء التحديث السحابي", "error");
                  }
              } else {
                  setBookings(prev => {
                      const updatedList = prev.map(b => b.id === updatedData.id ? updatedData : b);
                      const today = new Date();
                      today.setHours(0,0,0,0);
                      return updatedList.sort((a, b) => {
                          const dateA = new Date(a.date);
                          const dateB = new Date(b.date);
                          const isFutureA = dateA >= today;
                          const isFutureB = dateB >= today;
                          
                          if (isFutureA && isFutureB) {
                              return dateA - dateB;
                          } else if (!isFutureA && !isFutureB) {
                              return dateB - dateA;
                          } else if (isFutureA && !isFutureB) {
                              return -1;
                          } else {
                              return 1;
                          }
                      });
                  });
                  showToast("تم التحديث محلياً");
              }
          };

          const handleAddExpense = async (expenseData) => {
              if (isFirebaseActiveState && user && window.firebase) {
                  try {
                      await firebase.firestore().collection('users').doc(user.uid).collection('expenses').add(expenseData);
                      showToast("تم تسجيل المصروف بنجاح");
                  } catch(e) {
                      showToast("خطأ أثناء حفظ المصروف", "error");
                  }
              } else {
                  const newExpense = { id: 'e_' + Date.now(), ...expenseData };
                  setExpenses([newExpense, ...expenses].sort((a, b) => new Date(b.date) - new Date(a.date)));
                  showToast("تم تسجيل المصروف محلياً");
              }
          };

          const handleUpdateExpense = async (updatedExpense) => {
              if (isFirebaseActiveState && user && window.firebase) {
                  try {
                      await firebase.firestore().collection('users').doc(user.uid).collection('expenses').doc(updatedExpense.id).update(updatedExpense);
                      showToast("تم تحديث المصروف بنجاح");
                  } catch(e) {
                      showToast("خطأ أثناء التعديل", "error");
                  }
              } else {
                  setExpenses(prev => {
                      const updatedList = prev.map(e => e.id === updatedExpense.id ? updatedExpense : e);
                      return updatedList.sort((a, b) => new Date(b.date) - new Date(a.date));
                  });
                  showToast("تم التعديل محلياً");
              }
          };

          const handleDeleteExpense = async (id) => {
              if (isFirebaseActiveState && user && window.firebase) {
                  try {
                      await firebase.firestore().collection('users').doc(user.uid).collection('expenses').doc(id).delete();
                      showToast("تم الحذف بنجاح");
                  } catch(e) {
                      showToast("خطأ أثناء الحذف", "error");
                  }
              } else {
                  setExpenses(expenses.filter(e => e.id !== id));
                  showToast("تم الحذف محلياً");
              }
          };

          if (isCheckingAuth) return (
              <div className="min-h-screen bg-[#0a0a0a] flex flex-col items-center justify-center p-4">
                  <div className="w-24 h-24 bg-white rounded-full mx-auto mb-6 border-2 border-[#D4AF37] flex items-center justify-center overflow-hidden shadow-[0_0_20px_rgba(212,175,55,0.4)] animate-pulse">
                      <img 
                          src={settings?.studioLogo || LOGO_URL} 
                          onError={(e) => { if(e.target.src !== LOGO_URL) e.target.src = LOGO_URL; }} 
                          crossOrigin="anonymous" 
                          className="w-full h-full object-cover" 
                      />
                  </div>
                  <h1 className="text-3xl font-bold text-[#D4AF37] mb-2 text-center animate-fadeIn">مرحباً بك في {settings?.studioName || 'نظام إدارة الاستوديو'}</h1>
                  <p className="text-gray-400 font-bold text-lg animate-pulse">جاري التحميل...</p>
              </div>
          );
          if (!user) return <LoginScreen onLogin={setUser} isFirebaseActive={isFirebaseActiveState} showToast={showToast} settings={settings} />;
          if (contractToPrint) return <ContractPrintView booking={contractToPrint} settings={settings} expenses={expenses} onClose={() => setContractToPrint(null)} />;

          return (
            <div className="min-h-screen bg-[#0a0a0a] text-gray-200 font-sans" dir="rtl">
              {toast && (
                <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-lg shadow-2xl z-50 flex items-center gap-2 transition-all ${toast.type === 'error' ? 'bg-red-900 text-white' : 'bg-[#D4AF37] text-black'}`}>
                  <Icons.CheckCircle size={20} />
                  <span className="font-bold">{toast.message}</span>
                </div>
              )}

              {/* Onboarding Guide Modal */}
              {showGuide && !isAdmin && (
                  <OnboardingGuide onClose={closeGuide} />
              )}

              {/* Custom Logout Modal */}
              {showLogoutConfirm && (
                 <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 animate-fadeIn p-4">
                   <div className="bg-[#111] border border-[#D4AF37]/50 shadow-2xl p-6 rounded-3xl max-w-sm w-full text-center">
                      <Icons.LogOut className="mx-auto text-[#D4AF37] mb-4" size={48} />
                      <h3 className="text-xl text-white font-bold mb-2">تسجيل الخروج</h3>
                      <p className="text-gray-400 mb-8 text-sm leading-relaxed">هل أنت متأكد أنك تريد تسجيل الخروج من البرنامج؟</p>
                      <div className="flex justify-center gap-4">
                         <button onClick={() => setShowLogoutConfirm(false)} className="flex-1 py-3 bg-[#222] hover:bg-[#333] text-white rounded-xl transition-colors font-bold">إلغاء</button>
                         <button onClick={confirmLogout} className="flex-1 py-3 bg-red-600 hover:bg-red-700 text-white rounded-xl transition-colors font-bold">تأكيد الخروج</button>
                      </div>
                   </div>
                 </div>
              )}

              {/* شريط التنبيه الخاص بالفترة التجريبية مع زر الاشتراك */}
              {trialInfo && !isAdmin && (
                  <div className="bg-blue-900/40 text-blue-400 py-3 px-4 border-b border-blue-500/30 flex flex-col md:flex-row items-center justify-center gap-4 shadow-md">

        function LoginScreen({ onLogin, isFirebaseActive, showToast, settings }) {
            const [identifier, setIdentifier] = useState('');
            const [password, setPassword] = useState('');
            const [phone, setPhone] = useState(''); 
            const [isLoading, setIsLoading] = useState(false);
            const [isRegistering, setIsRegistering] = useState(false);
            
            const handleAuth = async (e) => {
                e.preventDefault(); 
                
                if (!identifier.trim()) {
                     showToast("يرجى إدخال رقم الهاتف أو البريد الإلكتروني.", "error");
                     return;
                }

                setIsLoading(true);

                const authEmail = identifier.includes('@') ? identifier : `${identifier}@studio.system`;

                if (isFirebaseActive && window.firebase) {
                    try {
                        let userCredential;
                        if (isRegistering) {
                            userCredential = await firebase.auth().createUserWithEmailAndPassword(authEmail, password);
                            
                            const trialEndDate = new Date();
                            trialEndDate.setDate(trialEndDate.getDate() + 5); // 5 Days Trial
                            
                            const isPhone = !identifier.includes('@');

                            await firebase.firestore().collection('subscribers').doc(userCredential.user.uid).set({
                                uid: userCredential.user.uid,
                                email: isPhone ? '' : identifier,
                                phone: isPhone ? identifier : '', 
                                createdAt: new Date().toISOString(),
                                isActive: true,
                                trialEndsAt: trialEndDate.toISOString(),
                                subscriptionType: 'trial'
                            });
                            
                            await firebase.firestore().collection('users').doc(userCredential.user.uid).collection('settings').doc('config').set(DEFAULT_SETTINGS);
                            
                            showToast("🎉 شكراً لاشتراكك معنا! تم إنشاء حسابك ومنحك 5 أيام تجريبية مجاناً.");
                        } else {
                            userCredential = await firebase.auth().signInWithEmailAndPassword(authEmail, password);
                            showToast("تم تسجيل الدخول!");
                        }
                        onLogin(userCredential.user);
                    } catch (error) {
                        let msg = error.code === 'auth/email-already-in-use' ? "هذا الحساب مسجل مسبقاً!" : "بيانات الدخول غير صحيحة!";
                        showToast(msg, "error");
                    }
                } else {
                    if(identifier && password) { 
                        const usr = { uid: 'local_admin', email: authEmail }; 
                        localStorage.setItem('mrakby_local_user', JSON.stringify(usr)); 
                        onLogin(usr); 
                        showToast("تم الدخول للوضع المحلي");
                    } else {
                        showToast("أدخل البيانات", "error");
                    }
                }
                setIsLoading(false);
            };

            const handleCopyPhone = () => {
                const el = document.createElement('textarea');
                el.value = '01126810107';
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast("تم النسخ اذهب لطريقة الدفع وقوم بلصق رقم الهاتف");
            };

            return (
                <div className="min-h-screen bg-[#0a0a0a] flex items-center justify-center p-4 relative overflow-hidden" dir="rtl">
                    <div className="absolute inset-0 opacity-5 pointer-events-none flex items-center justify-center">
                         <Icons.Camera size={600} className="text-[#D4AF37]" />
                    </div>
                    <div className="bg-[#111] p-8 rounded-3xl border border-[#D4AF37]/30 w-full max-w-md shadow-2xl relative z-10 mt-8 mb-8">
                        <div className="text-center mb-6">
                            <div className="w-24 h-24 bg-white rounded-full mx-auto mb-4 border-2 border-[#D4AF37] flex items-center justify-center overflow-hidden shadow-[0_0_15px_rgba(212,175,55,0.3)]">
                                <img 
                                    src={settings?.studioLogo || LOGO_URL} 
                                    onError={(e) => { if(e.target.src !== LOGO_URL) e.target.src = LOGO_URL; }} 
                                    crossOrigin="anonymous" 
                                    className="w-full h-full object-cover" 
                                />
                            </div>
                            <h1 className="text-3xl font-bold text-[#D4AF37] tracking-wider">{settings?.studioName || 'نظام إدارة الاستوديو'}</h1>
                            <p className="text-gray-400 text-sm mt-2">
                                {isRegistering ? 'أنشئ حساباً جديداً وابدأ فترتك التجريبية' : 'مرحباً بعودتك! سجل الدخول للوصول لبياناتك'}
                            </p>
                        </div>
                        
                        {isRegistering && (
                            <div className="bg-gradient-to-br from-green-900/40 to-[#111] border border-green-500/50 p-5 rounded-2xl mb-6 text-center shadow-lg relative overflow-hidden">
                                <div className="absolute -right-4 -top-4 w-16 h-16 bg-green-500/20 rounded-full blur-xl"></div>
                                <h4 className="text-green-400 font-bold text-lg mb-3 flex items-center justify-center gap-2">
                                    <Icons.CheckCircle size={22} /> اشتراك النظام
                                </h4>
                                <p className="text-sm text-gray-300 leading-relaxed mb-3">
                                    ستحصل فوراً على <span className="font-bold text-white bg-green-600/30 px-2 py-0.5 rounded">5 أيام تجريبية مجاناً</span>.<br/>
                                    بعدها، تكلفة الاشتراك لمدة 3 أشهر هي <span className="font-bold text-white border-b border-green-500">150 جنيه</span> فقط للإصدار الحالي.<br/>
                                </p>
                                <div className="bg-black/50 p-3 rounded-xl border border-gray-700/50 text-xs text-gray-400">
                                    يرجى الدفع عبر <b>إنستاباي (InstaPay)</b> أو <b>فودافون كاش</b>
                                    <button type="button" onClick={handleCopyPhone} className="w-full flex items-center justify-center gap-2 text-base font-mono text-black font-black mt-3 bg-[#D4AF37] py-2.5 rounded-xl border border-[#D4AF37]/30 hover:bg-yellow-500 transition-colors">
                                        <Icons.Copy size={18} /> نسخ رقم الدفع
                                    </button>
                                </div>
                            </div>
                        )}

                        <form onSubmit={handleAuth} className="space-y-4">
                            <input 
                                type="text" 
                                value={identifier} 
                                onChange={e => setIdentifier(e.target.value)} 
                                required 
                                className="w-full bg-black border border-[#333] text-white rounded-xl p-3.5 outline-none focus:border-[#D4AF37] transition-all" 
                                placeholder="رقم الهاتف أو البريد الإلكتروني" 
                            />
                            
                            <input 
                                type="password" 
                                value={password} 
                                onChange={e => setPassword(e.target.value)} 
                                required 
                                className="w-full bg-black border border-[#333] text-white rounded-xl p-3.5 outline-none focus:border-[#D4AF37] transition-all" 
                                placeholder="كلمة المرور (6 أحرف على الأقل)" 
                                minLength="6" 
                            />
                            
                            <button type="submit" disabled={isLoading} className="w-full bg-gradient-to-r from-[#D4AF37] to-[#B8860B] text-black font-bold text-lg py-3.5 rounded-xl hover:opacity-90 transition-opacity shadow-lg mt-2">
                                {isLoading ? 'جاري التحميل...' : (isRegistering ? 'إنشاء حساب وبدء التجربة' : 'تسجيل الدخول')}
                            </button>
                        </form>
                        
                        {isFirebaseActive && (
                            <div className="mt-6 text-center border-t border-[#222] pt-4">
                                <button 
                                    type="button"
                                    onClick={() => {
                                        setIsRegistering(!isRegistering);
                                        setIdentifier(''); 
                                    }} 
                                    className="text-gray-400 text-sm hover:text-[#D4AF37] transition-colors font-medium"
                                >
                                    {isRegistering ? 'لديك حساب بالفعل؟ سجل الدخول من هنا' : 'ليس لديك حساب؟ أنشئ حساب جديد لاستوديوهات أخرى'}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function Dashboard({ bookings, expenses = [], settings, onDayClick, onUpdateBooking }) {
          const [selectedAlertBooking, setSelectedAlertBooking] = useState(null);
          const [paymentBooking, setPaymentBooking] = useState(null);
          const [paymentAmount, setPaymentAmount] = useState('');
          const [casualPrepText, setCasualPrepText] = useState('يرجى تحضير الآتي أثناء اليوم:\n- ملابس الكاجوال المتفق عليها\n- إكسسوارات إضافية (نظارات، قبعات...)\n- الالتزام بالموعد المحدد للحصول على أفضل إضاءة');
          
          // الخصوصية
          const [localHideFinancials, setLocalHideFinancials] = useState(settings.hideFinancials || false);
          
          useEffect(() => {
              setLocalHideFinancials(settings.hideFinancials || false);
          }, [settings.hideFinancials]);
          
          // حالة جديدة لنافذة الشكر عند إتمام السداد
          const [thankYouClient, setThankYouClient] = useState(null);

          const { stats, upcoming, tomorrowAlerts, casualAlerts } = useMemo(() => {
            let rev = 0, paid = 0, counts = { 'زفاف': 0, 'خطوبة': 0, 'كاجول': 0, 'حنة': 0, 'كتب كتاب': 0, 'فوتوغرافي': 0 };
            let deliveredRev = 0;
            let deliveredCount = 0;
            const monthly = {};
            const monthNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            
            const currentMonthIndex = today.getMonth();
            const currentMonthNumber = currentMonthIndex + 1;
            let currentMonthTotalBookings = 0;

            let upcomingList = [];
            let tmrwAlerts = [];
            let casualList = [];

            const activeBookings = bookings.filter(b => b.status !== 'تم التسليم');
            const deliveredBookings = bookings.filter(b => b.status === 'تم التسليم');

            let totalExpectedRevenue = 0;
            let totalCollected = 0;

            bookings.forEach(b => {
                totalExpectedRevenue += (Number(b.totalPrice) || 0);
                totalCollected += (Number(b.paid) || 0);
            });

            const globalOutstanding = totalExpectedRevenue - totalCollected;

            deliveredBookings.forEach(b => {
                deliveredRev += (Number(b.paid) || 0);
                deliveredCount++;
            });

            activeBookings.forEach(b => {
              const bRev = Number(b.totalPrice) || 0; const bPaid = Number(b.paid) || 0; rev += bRev; paid += bPaid;
              const type = b.sessionType === 'آخر' ? b.otherSessionType : b.sessionType;
              if (counts[type] !== undefined) counts[type]++; else counts[type] = 1;
              
              const d = new Date(b.date);
              if (!isNaN(d)) {
                  const mKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                  if (!monthly[mKey]) monthly[mKey] = { label: `${monthNames[d.getMonth()]} ${d.getFullYear()}`, rev: 0, count: 0 };
                  monthly[mKey].rev += bRev; monthly[mKey].count += 1;
                  
                  if (d.getMonth() === currentMonthIndex && d.getFullYear() === today.getFullYear()) {
                      currentMonthTotalBookings++;
                      if (d.getTime() >= today.getTime()) {
                          upcomingList.push(b);
                          const actualCasual = b.casualLocation === 'آخر' ? b.otherCasualLocation : b.casualLocation;
                          if (actualCasual && actualCasual.trim() !== '') {
                              casualList.push({ ...b, actualCasualLoc: actualCasual });
                          }
                      }
                  }
                  
                  if (d.getTime() === tomorrow.getTime()) {
                      tmrwAlerts.push(b);
                  }
              }
            });

            upcomingList.sort((a, b) => new Date(a.date) - new Date(b.date));
            casualList.sort((a, b) => new Date(a.date) - new Date(b.date));

            const sortedMonths = Object.keys(monthly).sort().reverse().map(key => monthly[key]);
            const maxMonthlyRev = Math.max(...sortedMonths.map(m => m.rev), 1);
            
            return { 
                stats: { total: activeBookings.length, rev, paid, outstanding: rev - paid, counts, sortedMonths, maxMonthlyRev, currentMonthNumber, currentMonthTotalBookings, deliveredRev, deliveredCount, totalExpectedRevenue, totalCollected, globalOutstanding },
                upcoming: upcomingList,
                tomorrowAlerts: tmrwAlerts,
                casualAlerts: casualList
            };
          }, [bookings]);

          const formatMoney = (val) => `${val.toLocaleString()} ج.م`;

          let totalExpenses = 0;
          expenses.forEach(e => { totalExpenses += (Number(e.amount) || 0); });
          const netProfit = stats.totalCollected - totalExpenses;

          const processPayment = () => {
              const amt = Number(paymentAmount);
              if (amt <= 0 || !amt) return;
              if (amt > paymentBooking.remaining) return alert('خطأ: المبلغ المضاف أكبر من المبلغ المتبقي على العميل!');

              const newPaid = (Number(paymentBooking.paid) || 0) + amt;
              const newRemaining = paymentBooking.totalPrice - newPaid;

              const updatedBooking = {
                  ...paymentBooking,
                  paid: newPaid,
                  remaining: newRemaining
              };

              onUpdateBooking(updatedBooking);

              // التحقق مما إذا كان هذا هو القسط الأخير لفتح نافذة الشكر
              if (newRemaining === 0) {
                  setThankYouClient(updatedBooking);
              }

              setPaymentBooking(null);
              setPaymentAmount('');
          };

          // حسابات العميل المحدد في الـ Modal
          const selectedAlertExpenses = selectedAlertBooking ? expenses.filter(e => e.bookingId === selectedAlertBooking.data.id) : [];
          const alertTotalCost = selectedAlertExpenses.reduce((sum, e) => sum + (Number(e.amount) || 0), 0);
          const alertNetProfit = selectedAlertBooking ? selectedAlertBooking.data.totalPrice - alertTotalCost : 0;

          return (
            <div className="space-y-8 animate-fadeIn relative">
              
              {/* Thank You Modal */}
              {thankYouClient && (
                <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[100] p-4 animate-fadeIn">
                    <div className="bg-[#111] border border-green-500/30 p-6 rounded-3xl w-full max-w-md shadow-2xl">
                        <div className="flex justify-between items-center mb-6 border-b border-[#222] pb-4">
                            <h3 className="text-xl font-bold text-green-500 flex items-center gap-2"><Icons.CheckCircle size={20}/>اكتمل السداد!</h3>
                            <button onClick={() => setThankYouClient(null)} className="text-gray-400 hover:text-white"><Icons.X size={24} /></button>
                        </div>
                        
                        <div className="text-center mb-6">
                            <p className="text-white font-bold text-lg">{thankYouClient.groomName} & {thankYouClient.brideName}</p>
                            <p className="text-gray-400 text-sm mt-1">تم تصفية الحساب بالكامل بنجاح</p>
                        </div>

                        <div className="flex flex-col w-full mb-4">
                            <label className="text-xs text-gray-400 mb-2 font-bold">رسالة الشكر (يمكنك تعديلها)</label>
                            <textarea 
                                id="thankYouMsgDash"
                                defaultValue={`أهلاً بك أستاذ/ة ${thankYouClient.groomName}،\nيسعدنا إبلاغكم بأنه تم استلام الدفعة الأخيرة بنجاح، وإجمالي حسابكم الآن خالص (0 ج.م).\nشكراً لاختياركم وثقتكم بنا، ونتمنى لكم حياة سعيدة! 🎉`}
                                rows="5"

                        <p className="text-gray-400 text-sm mb-6 border-b border-[#333] pb-4">المبلغ المتبقي: <span className="text-red-500 font-bold">{paymentBooking.remaining} ج.م</span></p>
                        
                        <div className="flex flex-col w-full">
                            <label className="text-xs text-gray-400 mb-1">المبلغ المراد سداده الآن</label>

                                type="number" 
                                min="1" 
                                max={paymentBooking.remaining}

                        <div className="flex gap-4 mt-6">

                      </div>
                      
                      {selectedAlertBooking.data.notes && (
                         <div className="bg-black/40 p-4 rounded-2xl border border-[#222]">
                            <h4 className="text-[#D4AF37] font-bold mb-2 flex items-center gap-2"><Icons.FileText size={18} /> ملاحظات مهمة</h4>

                         </div>

                      <div className="bg-[#D4AF37]/10 p-4 rounded-2xl border border-[#D4AF37]/30 flex justify-between items-center shadow-lg mt-4">

                            </div>
                      </div>
                      
                      {selectedAlertExpenses.length > 0 && (
                            <div className="bg-red-900/10 p-4 rounded-2xl border border-red-900/30 mt-4 shadow-inner">

              {/* Detail Modal for Casual Alerts */}
              {selectedAlertBooking && selectedAlertBooking.type === 'casual' && (
                <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[80] p-4 animate-fadeIn">

                            onClick={() => {
