            );
        }

        // Quick Message Modal (WhatsApp Templates)
        function QuickMessageModal({ booking, settings, onClose, showToast }) {
            const messages = settings.quickMessages || DEFAULT_SETTINGS.quickMessages;
            const [selectedTemplate, setSelectedTemplate] = useState(messages[0]?.id || '');
            const [customText, setCustomText] = useState('');

            useEffect(() => {
                const tmpl = messages.find(m => m.id === selectedTemplate);
                if (tmpl) {
                    let txt = tmpl.text
                        .replace(/\[الاسم\]/g, booking.groomName)
                        .replace(/\[العروسة\]/g, booking.brideName)
                        .replace(/\[التاريخ\]/g, booking.date)
                        .replace(/\[المتبقي\]/g, booking.remaining)
                        .replace(/\[اللوكيشن\]/g, booking.location === 'آخر' ? booking.otherLocation : booking.location);
                    setCustomText(txt);
                }
            }, [selectedTemplate, booking, messages]);

            const sendWhatsApp = () => {
                if(!customText) return;
                window.open(`https://wa.me/2${booking.phone}?text=${encodeURIComponent(customText)}`, '_blank');
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[70] p-4 animate-fadeIn">
                    <div className="bg-[#111] border border-[#D4AF37]/30 p-6 rounded-3xl w-full max-w-lg shadow-2xl">
                        <div className="flex justify-between items-center mb-6 border-b border-[#222] pb-4">
                            <h3 className="text-xl font-bold text-[#D4AF37] flex items-center gap-2"><Icons.MessageSquare size={20}/> إرسال رسالة سريعة</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-white"><Icons.X size={24} /></button>
                        </div>
                        <div className="space-y-4">
                            <div className="flex flex-col w-full mb-4">
                                <label className="text-xs text-gray-500 mb-1">اختر نوع الرسالة</label>
                                <select value={selectedTemplate} onChange={e => setSelectedTemplate(e.target.value)} className="bg-black border border-[#333] text-white rounded-xl p-3 outline-none focus:border-[#D4AF37]">
                                    {messages.map((m) => <option key={m.id} value={m.id}>{m.title}</option>)}
                                </select>
                            </div>
                            
                            <div>
                                <label className="text-xs text-gray-500 mb-1 block">نص الرسالة (يمكنك تعديله قبل الإرسال)</label>
                                <textarea value={customText} onChange={e => setCustomText(e.target.value)} rows="6" className="w-full bg-black border border-[#333] text-white rounded-xl p-3 focus:outline-none focus:border-[#D4AF37] transition-all" />
                            </div>

                            <button onClick={sendWhatsApp} className="w-full bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-500 transition-colors flex items-center justify-center gap-2">
                                <Icons.MessageCircle size={20} /> إرسال عبر واتساب
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Expenses View ---
        function ExpensesView({ expenses, bookings, settings, onAddExpense, onUpdateExpense, onDeleteExpense, showToast }) {
            const categoriesList = settings.expenseCategories?.length > 0 ? settings.expenseCategories : ['أخرى'];
            
            const [cart, setCart] = useState([]);
            const [category, setCategory] = useState(categoriesList[0]);
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [bookingId, setBookingId] = useState('');
            
            // Editing state overrides
            const [editingId, setEditingId] = useState(null);
            const [editAmount, setEditAmount] = useState('');
            const [editNotes, setEditNotes] = useState('');
            
            const [expenseToDelete, setExpenseToDelete] = useState(null); 
            const [quantities, setQuantities] = useState({});

            useEffect(() => {
                if (!editingId && categoriesList.length > 0 && !categoriesList.includes(category)) {
                    setCategory(categoriesList[0]);
                }
            }, [categoriesList, category, editingId]);

            const cartTotal = cart.reduce((sum, item) => sum + item.total, 0);

            const handleAddToCart = (item) => {
                const q = parseInt(quantities[item.id]) || 1;
                setCart(prev => {
                    const existing = prev.find(i => i.id === item.id);
                    if (existing) {
                        return prev.map(i => i.id === item.id ? { ...i, qty: i.qty + q, total: (i.qty + q) * i.price } : i);
                    }
                    return [...prev, { id: item.id, name: item.name, price: item.price, qty: q, total: item.price * q }];
                });
                setQuantities({...quantities, [item.id]: 1});
                showToast("تمت الإضافة للفاتورة", "success");
            };

            const handleRemoveFromCart = (id) => {
                setCart(cart.filter(i => i.id !== id));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                
                if (!bookingId) {
                    showToast("عفواً، يرجى اختيار العميل المرتبط أولاً لتسجيل المصروف!", "error");
                    return;
                }
                
                if (editingId) {
                    if (!editAmount || Number(editAmount) <= 0) return showToast('أدخل مبلغاً صحيحاً', 'error');

                    onUpdateExpense({
                        id: editingId,
                        amount: Number(editAmount),
                        category: category || 'عام',
                        notes: editNotes,
                        date,
                        bookingId
                    });
                    setEditingId(null);
                    setEditAmount('');
                    setEditNotes('');
                } else {
                    if (cart.length === 0) return showToast('قم بإضافة عناصر من الحاسبة أولاً', 'error');

                    const notes = cart.map(i => `${i.name} (عدد ${i.qty})`).join(' + ');

                    onAddExpense({
                        amount: cartTotal,
                        category: category || 'عام',
                        notes,
                        date,
                        bookingId,
                        createdAt: new Date().toISOString()
                    });
                    
                    setCart([]);
                }
                
                setBookingId('');
                setCategory(categoriesList[0]);
                setQuantities({});
            };
            
            const handleEdit = (exp) => {
                setEditingId(exp.id);
                setEditAmount(exp.amount);
                setCategory(exp.category);
                setEditNotes(exp.notes || '');
                setDate(exp.date);
                setBookingId(exp.bookingId || '');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const formatMoney = (val) => `${val.toLocaleString()} ج.م`;

            // --- دالة تصدير المصروفات إلى Excel حقيقي ---
            const handleExportExpenses = () => {
                if (expenses.length === 0) {
                    return showToast("لا توجد مصروفات لتصديرها!", "error");
                }

                // 1. تحديد العناوين
                const headers = ['التاريخ', 'المبلغ', 'القسم', 'العميل المرتبط', 'الملاحظات'];
                
                // 2. تجهيز مصفوفة البيانات
                const data = expenses.map(e => {
                    let clientName = 'بدون عميل (عام)';
                    if (e.bookingId) {
                        const b = bookings.find(b => b.id === e.bookingId);
                        if (b) {
                            clientName = `${b.groomName} و ${b.brideName}`;
                        }
                    }

                    return [
                        e.date || '',
                        e.amount || 0,
                        e.category || '',
                        clientName,
                        e.notes || ''
                    ];
                });

                // 3. إنشاء الكتاب والشيت
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet([headers, ...data]);
                
                XLSX.utils.book_append_sheet(wb, ws, "المصروفات");
                
                // تنزيل الملف بصيغة .xlsx
                XLSX.writeFile(wb, `MrakbyStudio_Expenses_${new Date().toISOString().split('T')[0]}.xlsx`);
                
                showToast("تم تحميل المصروفات (Excel) بنجاح! ✅");
            };

            return (
                <div className="space-y-6 animate-fadeIn pb-10 relative">
                    
                    {/* نافذة تأكيد حذف المصروف */}
                    {expenseToDelete && (
                       <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] animate-fadeIn p-4">
                         <div className="bg-[#111] border border-red-900/50 shadow-2xl p-6 rounded-3xl max-w-sm w-full text-center">
                            <Icons.AlertTriangle className="mx-auto text-red-500 mb-4" size={48} />
                            <h3 className="text-xl text-white font-bold mb-2">تأكيد الحذف</h3>
                            <p className="text-gray-400 mb-8 text-sm leading-relaxed">هل أنت متأكد من حذف هذا المصروف؟ لا يمكن التراجع عن هذا الإجراء وسيؤثر على صافي الأرباح.</p>
                            <div className="flex justify-center gap-4">
                               <button onClick={() => setExpenseToDelete(null)} className="flex-1 py-3 bg-[#222] hover:bg-[#333] text-white rounded-xl transition-colors font-bold">إلغاء</button>
                               <button onClick={() => { onDeleteExpense(expenseToDelete); setExpenseToDelete(null); }} className="flex-1 py-3 bg-red-600 hover:bg-red-700 text-white rounded-xl transition-colors font-bold">نعم، احذف</button>
                            </div>
                         </div>
                       </div>
                    )}

                    <header className="border-b border-[#222] pb-4">
                        <h2 className="text-3xl font-bold text-[#D4AF37] flex items-center gap-2"><Icons.Wallet size={30} /> إدارة المصروفات والطباعة</h2>
                        <p className="text-gray-400 mt-1">أضف القوالب من الحاسبة لتسجيل مصروف، واربطها بعميل محدد لخصمها من صافي ربحه.</p>
                    </header>

                    <div className="flex flex-col gap-6">
                        {/* حاسبة الطباعة السريعة (قوالب) */}
                        <div className="space-y-4">
                            <div className="bg-[#111] p-6 rounded-3xl border border-[#333] shadow-xl">
                                <div className="flex justify-between items-center mb-6 border-b border-[#222] pb-3">
                                    <h3 className="text-xl font-bold text-[#D4AF37] flex items-center gap-2">
                                        <Icons.Calculator size={20} /> قوالب المصروفات السريعة
                                    </h3>
                                    <span className="text-xs text-gray-500 hidden sm:inline">اختر الصنف والعدد لإضافته للفاتورة</span>
                                </div>
                                
                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                                    {(settings.printingItems || []).map(item => (
                                        <div key={item.id} className="bg-black border border-[#222] p-4 rounded-2xl hover:border-[#D4AF37]/50 transition-all flex flex-col justify-between">
                                            <div>
                                                <p className="font-bold text-white text-lg leading-tight">{item.name}</p>
                                                <p className="text-[#D4AF37] font-bold text-sm mt-1 mb-3">{item.price} ج.م</p>
                                            </div>
                                            
                                            <div className="flex items-center gap-2 mt-auto">
                                                <div className="flex items-center bg-[#111] p-1 rounded-xl border border-[#333] w-20">
                                                    <input
                                                        type="number"
                                                        min="1"
                                                        value={quantities[item.id] || 1}
                                                        onChange={e => setQuantities({...quantities, [item.id]: e.target.value})}
                                                        className="bg-transparent text-white text-center w-full focus:outline-none font-bold text-sm"
                                                    />
                                                </div>
                                                <button
                                                    onClick={() => handleAddToCart(item)}
                                                    className="flex-1 bg-[#D4AF37]/10 hover:bg-[#D4AF37] hover:text-black text-[#D4AF37] font-bold py-2 rounded-xl transition-colors text-sm border border-[#D4AF37]/30 flex items-center justify-center gap-1"
                                                >
                                                    <Icons.Plus size={16}/> إضافة
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                    {(!settings.printingItems || settings.printingItems.length === 0) && (
                                        <p className="text-gray-500 text-sm col-span-full">يمكنك إضافة قوالب مصاريف (مثل: طباعة، مواصلات، هدايا) من صفحة (الإعدادات).</p>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* الفاتورة والتسجيل */}
                        <div className="bg-[#111] p-6 rounded-3xl border border-[#333] shadow-xl h-fit">
                            <h3 className="text-xl font-bold text-[#D4AF37] mb-4 border-b border-[#222] pb-3">
                                {editingId ? '✏️ تعديل المصروف' : '🛒 الفاتورة والتسجيل'}
                            </h3>
                            <form onSubmit={handleSubmit} className="space-y-4">
                                
                                {!editingId ? (
                                    <>
                                        {/* Cart Items List */}
                                        <div className="bg-black/50 rounded-xl p-3 border border-[#222] min-h-[100px] max-h-[250px] overflow-y-auto no-scrollbar space-y-2">
                                            {cart.length === 0 ? (
                                                <p className="text-gray-500 text-center text-sm mt-6 mb-6">الفاتورة فارغة، قم بالإضافة من الحاسبة.</p>
                                            ) : (
                                                cart.map(item => (
                                                    <div key={item.id} className="flex justify-between items-center text-sm border-b border-[#333] pb-2 last:border-0 last:pb-0">
                                                        <div className="flex flex-col">
                                                            <span className="text-white font-bold">{item.name}</span>
                                                            <span className="text-gray-400 text-xs">عدد {item.qty} × {item.price} ج.م</span>
                                                        </div>
                                                        <div className="flex items-center gap-3">
                                                            <span className="text-[#D4AF37] font-bold">{item.total} ج.م</span>
                                                            <button type="button" onClick={() => handleRemoveFromCart(item.id)} className="text-red-500 hover:text-red-400"><Icons.X size={16}/></button>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                        
                                        {/* Total */}
                                        <div className="flex justify-between items-center bg-[#D4AF37]/10 p-3 rounded-xl border border-[#D4AF37]/30">
                                            <span className="text-[#D4AF37] font-bold">الإجمالي:</span>
                                            <span className="text-2xl font-black text-white">{cartTotal} ج.م</span>
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        {/* Edit Overrides */}
                                        <InputField label="المبلغ الإجمالي (ج.م)" type="number" value={editAmount} onChange={e => setEditAmount(e.target.value)} required />
                                        <div className="flex flex-col w-full">
                                            <label className="text-xs text-gray-400 mb-1">تفاصيل وملاحظات</label>
                                            <textarea value={editNotes} onChange={e => setEditNotes(e.target.value)} rows="2" className="bg-black border border-[#333] text-white rounded-xl p-3 focus:outline-none focus:border-[#D4AF37] transition-all w-full"></textarea>
                                        </div>
                                    </>
                                )}

                                <div className="bg-red-900/10 p-4 rounded-xl border border-red-500/30 mb-4 mt-2">
                                    <label className="text-sm text-white mb-2 font-bold flex items-center gap-2">
                                        <Icons.Users size={18} className="text-red-400"/> العميل المرتبط (مطلوب)
                                    </label>
                                    <select value={bookingId} onChange={e => setBookingId(e.target.value)} className="bg-black border border-red-500/50 text-white rounded-xl p-3 outline-none focus:border-red-500 w-full font-bold">
                                        <option value="">-- يرجى اختيار عميل أولاً --</option>
                                        {bookings.map(b => (
                                            <option key={b.id} value={b.id}>{b.groomName} و {b.brideName} - {b.date}</option>
                                        ))}
                                    </select>
                                </div>

                                <InputField label="تاريخ الصرف" type="date" value={date} onChange={e => setDate(e.target.value)} required />
                                
                                <div className="flex gap-3 mt-4">
                                    {editingId && (
                                        <button type="button" onClick={() => {setEditingId(null); setEditAmount(''); setEditNotes(''); setBookingId(''); setCategory(categoriesList[0]);}} className="flex-1 bg-[#222] hover:bg-[#333] text-white font-bold py-3 rounded-xl transition-colors">إلغاء التعديل</button>
                                    )}
                                    <button type="submit" disabled={!editingId && cart.length === 0} className={`flex-[2] text-black font-bold py-3 rounded-xl transition-colors shadow-lg flex items-center justify-center gap-2 ${editingId ? 'bg-blue-500 hover:bg-blue-600' : (!editingId && cart.length === 0 ? 'bg-gray-600 cursor-not-allowed' : 'bg-[#D4AF37] hover:bg-yellow-500')}`}>
                                        {editingId ? <Icons.Edit size={20} /> : <Icons.Save size={20} />}
                                        {editingId ? 'تحديث المصروف' : 'تسجيل وحفظ'}
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    {/* قائمة المصروفات السابقة */}
                    <div className="bg-[#111] p-6 rounded-3xl border border-[#333] shadow-xl mt-6">
                        <h3 className="text-xl font-bold text-white mb-6 border-b border-[#222] pb-3 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div className="flex items-center gap-3">
                                <span>سجل المصروفات</span>
                                <button onClick={handleExportExpenses} className="bg-blue-900/40 text-blue-400 border border-blue-500/30 hover:bg-blue-600 hover:text-white px-3 py-1.5 rounded-lg font-bold flex items-center gap-2 transition-colors text-sm">
                                    <Icons.Save size={16} /> Excel
                                </button>
                            </div>
                            <span className="text-sm bg-red-900/30 text-red-500 px-3 py-1 rounded-lg border border-red-900/50">
                                إجمالي: {formatMoney(expenses.reduce((sum, e) => sum + (Number(e.amount) || 0), 0))}
                            </span>
                        </h3>
                        <div className="overflow-x-auto no-scrollbar">
                            <table className="w-full text-right">
                                <thead className="bg-black/40 border-b border-[#222]">
                                    <tr>
                                        <th className="p-3 text-gray-400 font-medium whitespace-nowrap">التاريخ</th>
                                        <th className="p-3 text-gray-400 font-medium whitespace-nowrap">المبلغ</th>
                                        <th className="p-3 text-gray-400 font-medium">العميل المرتبط والملاحظات</th>
                                        <th className="p-3 text-center text-gray-400 font-medium">إجراءات</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-[#222]">
                                    {expenses.map(e => (
                                        <tr key={e.id} className="hover:bg-[#1a1a1a] transition-colors">
                                            <td className="p-3 text-sm font-mono text-gray-300 whitespace-nowrap">{e.date}</td>
                                            <td className="p-3 text-sm font-bold text-red-400 whitespace-nowrap">{e.amount} ج.م</td>
                                            <td className="p-3 text-xs text-gray-400 max-w-xs break-words">
                                                {e.bookingId && bookings.find(b => b.id === e.bookingId) ? (
                                                    <span className="text-white bg-red-900/30 px-2 py-1 rounded font-bold block mb-1 w-fit border border-red-900/50">
                                                        عريس: {bookings.find(b => b.id === e.bookingId).groomName}
                                                    </span>
                                                ) : <span className="text-red-400 font-bold block mb-1">بدون عميل (عام)</span>}
                                                {e.notes || '---'}
                                            </td>
                                            <td className="p-3 text-center flex justify-center gap-2">
                                                <button onClick={() => handleEdit(e)} className="text-blue-500 hover:text-white hover:bg-blue-600 p-2 rounded-lg transition-colors" title="تعديل">
                                                    <Icons.Edit size={16} />
                                                </button>
                                                <button onClick={() => setExpenseToDelete(e.id)} className="text-red-500 hover:text-white hover:bg-red-600 p-2 rounded-lg transition-colors" title="حذف">
                                                    <Icons.Trash2 size={16} />
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                    {expenses.length === 0 && <tr><td colSpan="5" className="text-center p-10 text-gray-500">لا توجد مصروفات مسجلة بعد.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function SettingsView({ settings, user, isFirebaseActive, onLocalSave, showToast }) {
            const [localSettings, setLocalSettings] = useState(() => ({ ...DEFAULT_SETTINGS, ...settings }));
            const [isSaving, setIsSaving] = useState(false);
            
            useEffect(() => { setLocalSettings({ ...DEFAULT_SETTINGS, ...settings }); }, [settings]);
            
            const handlePrivacyToggle = async (e) => {
                const newValue = e.target.checked;
                const newSettings = { ...localSettings, hideFinancials: newValue };
                setLocalSettings(newSettings);
                
                if (isFirebaseActive && user && window.firebase) {
                    try { 
                        await firebase.firestore().collection('users').doc(user.uid).collection('settings').doc('config').set(newSettings); 
                        showToast(newValue ? "تم إخفاء المبالغ دائماً ☁️" : "تم إلغاء الإخفاء"); 
                    } 
                    catch(err) { showToast("حدث خطأ", "error"); }
                } else { 
                    showToast(newValue ? "تم إخفاء المبالغ دائماً" : "تم إلغاء الإخفاء"); 
                }
                onLocalSave(newSettings);
            };

            const handleSave = async () => {
                setIsSaving(true);
                if (isFirebaseActive && user && window.firebase) {
                    try { await firebase.firestore().collection('users').doc(user.uid).collection('settings').doc('config').set(localSettings); showToast("تم الحفظ في السحابة بنجاح ☁️"); } 
                    catch(e) { showToast("حدث خطأ", "error"); }
                } else { onLocalSave(localSettings); setTimeout(() => showToast("تم الحفظ محلياً بنجاح"), 500); }
                setIsSaving(false);
            };

            const updateArray = (key, newArray) => { setLocalSettings(prev => ({ ...prev, [key]: newArray })); };
            const updateField = (key, value) => { setLocalSettings(prev => ({ ...prev, [key]: value })); };

            // هنا تم إضافة كود ضغط وتصغير الصورة قبل حفظها لمنع الخطأ
            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 500;
                            const MAX_HEIGHT = 500;
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                              if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                              }
                            } else {
                              if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                              }
                            }
                            
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            const dataUrl = canvas.toDataURL('image/png');
                            updateField('studioLogo', dataUrl);
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            return (
                <div className="space-y-6 pb-20 animate-fadeIn max-w-5xl mx-auto">
                    <div className="flex flex-col md:flex-row justify-between items-center border-b border-[#D4AF37]/20 pb-4 gap-4">
                        <div><h2 className="text-3xl font-bold text-[#D4AF37]">إعدادات النظام</h2><p className="text-gray-400 mt-1">تخص الواجهة، الباقات، الرسائل، والأسعار.</p></div>
                        <button onClick={handleSave} disabled={isSaving} className="w-full md:w-auto bg-[#D4AF37] text-black px-8 py-3 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-yellow-500 shadow-xl"><Icons.Save size={20} /> {isSaving ? "جاري الحفظ..." : "حفظ التعديلات"}</button>
                    </div>

                    <div className="bg-[#111] p-6 rounded-3xl border border-[#222] shadow-xl relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-32 h-32 bg-[#D4AF37]/5 rounded-full blur-3xl -ml-10 -mt-10 pointer-events-none"></div>
                        <h3 className="text-xl font-bold text-white mb-6 flex items-center gap-2"><Icons.Camera size={20} className="text-[#D4AF37]"/> تخصيص هوية الاستوديو</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-10">
                            <div className="flex flex-col">
                                <label className="text-sm text-gray-400 mb-2">اسم الاستوديو</label>
                                <input type="text" value={localSettings.studioName || ''} onChange={e => updateField('studioName', e.target.value)} className="bg-black border border-[#333] text-white rounded-xl p-3 focus:outline-none focus:border-[#D4AF37] transition-all" />
                            </div>
                            <div className="flex flex-col">
                                <label className="text-sm text-gray-400 mb-2">شعار الاستوديو (اللوجو)</label>
                                <input type="file" accept="image/*" onChange={handleLogoUpload} className="bg-black border border-[#333] text-gray-400 rounded-xl p-2 focus:outline-none transition-all file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-[#D4AF37]/20 file:text-[#D4AF37] hover:file:bg-[#D4AF37]/30 cursor-pointer" />
                            </div>
                        </div>
                    </div>

                    {/* إعدادات الخصوصية */}
                    <div className="bg-[#111] p-6 rounded-3xl border border-[#222] shadow-xl mt-6">
                        <h3 className="text-xl font-bold text-white mb-6 flex items-center gap-2"><Icons.Eye size={20} className="text-[#D4AF37]"/> إعدادات الخصوصية</h3>
                        <label className="flex items-center gap-4 cursor-pointer p-4 bg-black rounded-2xl border border-white/5 hover:border-[#D4AF37]/30 transition-colors">
                            <input type="checkbox" checked={localSettings.hideFinancials || false} onChange={handlePrivacyToggle} className="w-6 h-6 accent-[#D4AF37] cursor-pointer" />
                            <div>
                                <span className="text-white font-bold block text-lg">إخفاء المبالغ المالية في الرئيسية (افتراضياً)</span>
                                <span className="text-sm text-gray-500">يقوم بإخفاء الإيرادات والتحصيلات وصافي الربح بكلمة مرور (نجوم) عند فتح التطبيق، ويمكن إظهارها مؤقتاً من الرئيسية.</span>
                            </div>
                        </label>
                    </div>

                    <div className="bg-[#111] p-6 rounded-3xl border border-[#222] shadow-xl mt-6">
                        <h3 className="text-xl font-bold text-white mb-6 flex items-center gap-2"><Icons.FileText size={20} className="text-[#D4AF37]"/> شروط عقد الفيديو الافتراضية</h3>
                        <textarea 
                            value={localSettings.videoContractTerm !== undefined ? localSettings.videoContractTerm : "تصوير الفيديو Full HD ويُسلم على فلاشة. (لا يمكن الرجوع للاستوديو لاسترجاع البيانات بعد مرور ٣ أشهر)."} 
                            onChange={e => updateField('videoContractTerm', e.target.value)} 
                            rows="3" 
                            className="w-full bg-black border border-[#333] text-white rounded-xl p-3 focus:outline-none focus:border-[#D4AF37] transition-all" 
                            placeholder="اكتب شروط الفيديو الافتراضية هنا..." 
                        />
                    </div>

                    {/* Messages Settings */}
                    <div className="bg-[#111] p-6 rounded-3xl border border-[#222] shadow-xl mt-6">
                        <h3 className="text-xl font-bold text-white mb-6 flex items-center gap-2"><Icons.MessageSquare size={20} className="text-[#D4AF37]"/> الردود السريعة (واتساب)</h3>
                        <p className="text-sm text-gray-400 mb-6">الكلمات التي سيتم استبدالها تلقائياً: [الاسم] - [العروسة] - [التاريخ] - [المتبقي] - [اللوكيشن]</p>
                        
                        <div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                {(localSettings.quickMessages || []).map((msg, idx) => (
                                    <div key={msg.id} className="bg-black p-4 rounded-2xl border border-white/5 relative group flex flex-col">
                                        <button onClick={() => updateArray('quickMessages', localSettings.quickMessages.filter(m => m.id !== msg.id))} className="absolute top-4 left-4 text-red-500 bg-red-500/10 p-1.5 rounded opacity-0 group-hover:opacity-100 transition-opacity"><Icons.Trash2 size={16}/></button>
                                        <input type="text" value={msg.title} onChange={e => updateArray('quickMessages', localSettings.quickMessages.map(m => m.id === msg.id ? {...m, title: e.target.value} : m))} className="bg-transparent text-[#D4AF37] font-bold outline-none mb-2 w-10/12" placeholder="عنوان الرسالة..." />
                                        <textarea value={msg.text} onChange={e => updateArray('quickMessages', localSettings.quickMessages.map(m => m.id === msg.id ? {...m, text: e.target.value} : m))} rows="4" className="flex-1 w-full bg-[#111] border border-[#333] text-white rounded-xl p-3 focus:outline-none focus:border-[#D4AF37] text-sm resize-none" placeholder="نص الرسالة..." />
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => updateArray('quickMessages', [...(localSettings.quickMessages || []), { id: 'qm_' + Date.now(), title: 'رسالة جديدة', text: 'نص الرسالة...' }])} className="flex items-center justify-center w-full gap-2 bg-[#D4AF37]/10 text-[#D4AF37] py-3 rounded-2xl border border-[#D4AF37]/30 hover:bg-[#D4AF37] hover:text-black transition-colors font-bold"><Icons.Plus size={20}/> إضافة رسالة جديدة</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mt-6">
                        <SettingObjectList title="قوالب حاسبة الطباعة والمصروفات" items={localSettings.printingItems || []} hasSubtext={false} onChange={(arr) => updateArray('printingItems', arr)} />
                        
                        <SettingObjectList title="الباكيدجات الأساسية" items={localSettings.packages} hasSubtext={true} onChange={(arr) => updateArray('packages', arr)} />
                        <SettingObjectList title="إضافات الفوتوغرافيا" items={localSettings.addons} hasSubtext={true} onChange={(arr) => updateArray('addons', arr)} />
                        <SettingObjectList title="خدمات الفيديو الأساسية" items={localSettings.videoServices} hasSubtext={true} onChange={(arr) => updateArray('videoServices', arr)} />
                        <SettingObjectList title="إضافات الفيديو" items={localSettings.videoAddons} hasSubtext={true} onChange={(arr) => updateArray('videoAddons', arr)} />
                        
                        <SettingStringList title="أقسام المصروفات" items={localSettings.expenseCategories} onChange={(arr) => updateArray('expenseCategories', arr)} />
                        
                        <SettingStringList title="أماكن التصوير الأساسية" items={localSettings.locations} onChange={(arr) => updateArray('locations', arr)} />
                        <SettingStringList title="أماكن تصوير الكاجوال" items={localSettings.casualLocations} onChange={(arr) => updateArray('casualLocations', arr)} />
                        <SettingStringList title="أنواع السيشن" items={localSettings.sessionTypes} onChange={(arr) => updateArray('sessionTypes', arr)} />
                    </div>
                </div>
            );
        }

        function SettingObjectList({ title, items = [], hasSubtext, onChange }) {
          const [newItem, setNewItem] = useState({ name: '', price: '', subtext: '' });
          const handleAdd = () => {
            if(!newItem.name) return;
            onChange([...items, { id: 'id_' + Date.now(), name: newItem.name, price: Number(newItem.price) || 0, subtext: newItem.subtext || '' }]);
            setNewItem({ name: '', price: '', subtext: '' });
          };
          const handleRemove = (id) => { onChange(items.filter(i => i.id !== id)); };
          return (
            <div className="bg-[#111] p-6 rounded-3xl border border-[#222]">
              <h3 className="text-lg font-bold text-white mb-4 border-b border-[#222] pb-3">{title}</h3>
              <div className="space-y-3 mb-6 max-h-48 overflow-y-auto pr-2 no-scrollbar">
                {items.map(item => (
                  <div key={item.id} className="flex justify-between items-center bg-black p-3 rounded-2xl border border-white/5">
                    <div><p className="font-bold text-white text-sm">{item.name} <span className="text-[#D4AF37] ml-2">({item.price} ج.م)</span></p>{hasSubtext && item.subtext && <p className="text-xs text-gray-500 mt-1">{item.subtext}</p>}</div>
                    <button onClick={() => handleRemove(item.id)} className="text-red-500 hover:text-red-400 bg-red-500/10 p-2 rounded-xl"><Icons.Trash2 size={16}/></button>
                  </div>
                ))}
              </div>
              <div className="bg-black/40 p-4 rounded-2xl border border-[#222] flex flex-col gap-3">
                <input placeholder="الاسم..." value={newItem.name} onChange={e => setNewItem({...newItem, name: e.target.value})} className="bg-black border border-[#333] rounded-xl p-2.5 text-sm text-white focus:border-[#D4AF37] outline-none" />
                <input placeholder="السعر..." type="number" min="0" value={newItem.price} onChange={e => setNewItem({...newItem, price: e.target.value})} className="bg-black border border-[#333] rounded-xl p-2.5 text-sm text-white focus:border-[#D4AF37] outline-none" />
                {hasSubtext && <input placeholder="ملاحظة صغيرة..." value={newItem.subtext} onChange={e => setNewItem({...newItem, subtext: e.target.value})} className="bg-black border border-[#333] rounded-xl p-2.5 text-sm text-white focus:border-[#D4AF37] outline-none" />}
                <button onClick={handleAdd} className="mt-1 flex items-center justify-center gap-1 bg-[#D4AF37]/10 text-[#D4AF37] border border-[#D4AF37]/30 rounded-xl py-2.5 font-bold hover:bg-[#D4AF37] hover:text-black transition-colors"><Icons.Plus size={18}/> إضافة عنصر</button>
              </div>
            </div>
          );
        }

        function SettingStringList({ title, items = [], onChange }) {
          const [newVal, setNewVal] = useState('');
          const handleAdd = () => { if(!newVal.trim() || items.includes(newVal.trim())) return; onChange([...items, newVal.trim()]); setNewVal(''); };
          const handleRemove = (valToRemove) => { onChange(items.filter(i => i !== valToRemove)); };
          return (
            <div className="bg-[#111] p-6 rounded-3xl border border-[#222]">
              <h3 className="text-lg font-bold text-white mb-4 border-b border-[#222] pb-3">{title}</h3>
              <div className="flex flex-wrap gap-2 mb-6 max-h-48 overflow-y-auto no-scrollbar">
                {items.map((item, idx) => (<div key={idx} className="flex items-center gap-2 bg-black px-3 py-2 rounded-xl border border-white/5"><span className="text-sm text-gray-300">{item}</span><button onClick={() => handleRemove(item)} className="text-red-500 hover:text-red-400 bg-red-500/10 rounded p-1"><Icons.X size={12}/></button></div>))}
              </div>
              <div className="flex gap-2"><input placeholder="إضافة جديد..." value={newVal} onChange={e => setNewVal(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAdd()} className="flex-1 bg-black border border-[#333] rounded-xl p-3 text-sm text-white focus:border-[#D4AF37] outline-none" /><button onClick={handleAdd} className="bg-[#D4AF37]/10 text-[#D4AF37] border border-[#D4AF37]/30 rounded-xl px-5 font-bold hover:bg-[#D4AF37] hover:text-black transition-colors">إضافة</button></div>
            </div>
          );
        }

        function ContractPrintView({ booking, settings, onClose }) {
          const isPhotoBooking = ['تصوير فوتوغرافي', 'فوتوغرافي وفيديو'].includes(booking.bookingMainType || 'فوتوغرافي وفيديو');
          const isVideoBooking = ['تصوير فيديو', 'فوتوغرافي وفيديو'].includes(booking.bookingMainType || 'فوتوغرافي وفيديو');

          const pkg = settings.packages.find(p => p.id === booking.packageId);
          const displayPkgName = booking.snapshotPackage?.name || pkg?.name || 'غير محدد';
          const displayPkgPrice = booking.snapshotPackage?.price || pkg?.price || 0;
          const addonsList = booking.snapshotAddons && booking.snapshotAddons.length > 0 ? booking.snapshotAddons : (booking.addons || []).map(aId => settings.addons.find(a => a.id === aId)).filter(Boolean);
          
          const videoName = booking.snapshotVideoService?.name || settings.videoServices.find(v => v.id === booking.videoServiceId)?.name;
          const videoPrice = booking.snapshotVideoService?.price || booking.videoServicePrice;
          
          const handleDownloadImage = async () => {
              const element = document.getElementById('contract-content');
              if (!element) return;
              try {
                  const canvas = await window.html2canvas(element, { 
                      scale: 2, 
                      useCORS: true,
                      backgroundColor: "#ffffff"
                  });
                  const dataUrl = canvas.toDataURL('image/png');
                  const link = document.createElement('a');
                  link.download = `عقد_${booking.groomName}_${booking.date}.png`;
                  link.href = dataUrl;
                  link.click();
              } catch (err) {
                  console.error("Error saving image", err);
                  alert("حدث خطأ أثناء محاولة حفظ الصورة.");
              }
          };

          const handleShareImage = async () => {
              const element = document.getElementById('contract-content');
              if (!element) return;
              try {
                  const canvas = await window.html2canvas(element, { 
                      scale: 2, 
                      useCORS: true,
                      backgroundColor: "#ffffff"
                  });
                  
                  canvas.toBlob(async (blob) => {
                      const file = new File([blob], `عقد_${booking.groomName}.png`, { type: 'image/png' });
                      
                      if (navigator.canShare && navigator.canShare({ files: [file] })) {
                          try {
                              await navigator.share({
                                  files: [file],
                                  title: 'عقد تصوير',
                                  text: `مرحباً، مرفق لكم تفاصيل عقد التصوير الخاص بـ ${booking.groomName} و ${booking.brideName}`
                              });
                          } catch (error) {
                              console.log('Share was aborted or failed', error);
                          }
                      } else {
                          alert("عذراً، متصفحك لا يدعم المشاركة المباشرة للصور. يمكنك حفظ الصورة ومشاركتها يدوياً.");
                          handleDownloadImage();
                      }
                  }, 'image/png');
              } catch (err) {
                  console.error("Error generating image for sharing", err);
                  alert("حدث خطأ أثناء تحضير العقد للمشاركة.");
              }
          };

          // ديناميكية شروط العقد بناءً على نوع الحجز
          const conditions = [];
          
          conditions.push("يقر العميل بمعاينته لأسلوب التصوير ويوافق على التعديلات الفنية التي يراها الاستوديو مناسبة.");
          
          // شرط تسليم الصور يظهر فقط إذا كان هناك باكيدج فوتوغرافيا أو إضافات فعلية
          const actuallyHasPhoto = isPhotoBooking && (displayPkgName !== 'غير محدد' || (addonsList && addonsList.length > 0));
          if (actuallyHasPhoto) {
              conditions.push("يلتزم الاستوديو بتسليم العمل خلال الفترة المتفق عليها بعد اختيار الصور.");
          }

          conditions.push("العربون المدفوع لا يُسترد نهائياً في حالة الإلغاء من قبل العميل لأي سبب.");

          // شرط الفيديو يظهر فقط إذا كان هناك خدمة فيديو فعلية مختارة
          const actuallyHasVideo = isVideoBooking && !!videoName;
          if (actuallyHasVideo && booking.videoTerms && booking.videoTerms.trim() !== '') {
              conditions.push(booking.videoTerms);
          }

          return (
            <div className="min-h-screen bg-white text-black font-sans print-container" dir="rtl">
              <div className="print:hidden flex flex-col md:flex-row justify-between items-center gap-4 mb-4 bg-gray-100 p-4 rounded-xl shadow-sm border max-w-3xl mx-auto mt-4">
                  <p className="text-red-600 font-bold">جاهز للطباعة والمشاركة</p>
                  <div className="flex flex-wrap gap-2 md:gap-4 justify-center">
                      <button onClick={handleShareImage} className="bg-green-600 text-white px-4 md:px-6 py-2 rounded-xl font-bold flex items-center gap-2 hover:bg-green-700 transition-colors">
                          <Icons.Share size={18} /> مشاركة
                      </button>
                      <button onClick={handleDownloadImage} className="bg-blue-600 text-white px-4 md:px-6 py-2 rounded-xl font-bold flex items-center gap-2 hover:bg-blue-700 transition-colors">
                          <Icons.ImageIcon size={18} /> حفظ كصورة
                      </button>
                      <button onClick={() => window.print()} className="bg-black text-white px-4 md:px-6 py-2 rounded-xl font-bold flex items-center gap-2 hover:bg-gray-800 transition-colors">
                          <Icons.Printer size={18} /> طباعة
                      </button>
                      <button onClick={onClose} className="bg-gray-300 text-black px-4 md:px-6 py-2 rounded-xl font-bold hover:bg-gray-400 transition-colors">إلغاء</button>
                  </div>
              </div>
              
              <div id="contract-content" className="max-w-3xl mx-auto border-[2px] border-black p-6 relative bg-white contract-print-container">
                
                <header className="mb-6 border-b-[3px] border-black pb-4 text-center">
                    <h1 className="text-3xl font-black uppercase tracking-wider mb-2" style={{ color: '#000' }}>
                        {settings.studioName || 'اسم الاستوديو'}
                    </h1>
                    <p className="text-xs font-bold text-gray-500 tracking-[0.3em] uppercase mb-4">Official Contract</p>
                    
                    <div className="flex flex-col items-center gap-2 mt-4">
                        <h2 className="text-2xl font-black border-b-2 border-black inline-block px-4 pb-1">عقد اتفاق وتصوير</h2>
                        <p className="text-sm font-bold text-gray-700">
                            التاريخ: <span className="font-medium text-black">{new Date().toLocaleDateString('ar-EG')}</span>
                        </p>
                    </div>
                </header>

                <section className="mb-4">
                  <h3 className="text-lg font-black mb-2 border-r-[3px] border-black pr-2 bg-gray-100 py-1">بيانات التعاقد الأساسية</h3>
                  <div className="bg-gray-50 p-4 rounded border border-gray-200 font-medium">
                      <div className="flex flex-col sm:flex-row justify-between gap-4">
                          <p className="flex items-center gap-2">
                              <span className="font-bold text-gray-700">اسم العروسين:</span> 
                              <span className="font-black text-lg">{booking.groomName} & {booking.brideName}</span>
                          </p>
                          <p className="flex items-center gap-2">
                              <span className="font-bold text-gray-700">رقم الهاتف:</span> 
                              <span dir="ltr" className="font-bold">{booking.phone}</span>
                          </p>
                          {booking.address && (
                              <p className="flex items-center gap-2">
                                  <span className="font-bold text-gray-700">العنوان:</span> 
                                  <span className="font-bold">{booking.address}</span>
                              </p>
                          )}
                      </div>
                  </div>
                </section>

                <section className="mb-4">
                  <h3 className="text-lg font-black mb-2 border-r-[3px] border-black pr-2 bg-gray-100 py-1">تفاصيل المناسبة</h3>
                  <div className="grid grid-cols-2 gap-4 bg-gray-50 p-4 rounded border border-gray-200">
                    <p><span className="font-bold text-gray-700 block mb-1">التاريخ:</span> <span dir="ltr" className="font-bold">{booking.date}</span></p>
                    {booking.sessionType && <p><span className="font-bold text-gray-700 block mb-1">النوع:</span> {booking.sessionType === 'آخر' ? booking.otherSessionType : booking.sessionType}</p>}
                    {booking.location && <p><span className="font-bold text-gray-700 block mb-1">اللوكيشن الأساسي:</span> {booking.location === 'آخر' ? booking.otherLocation : booking.location}</p>}
                    {isPhotoBooking && (
                        <>
                           {booking.casualLocation && <p><span className="font-bold text-gray-700 block mb-1">لوكيشن الكاجوال:</span> {booking.casualLocation === 'آخر' ? booking.otherCasualLocation : booking.casualLocation}</p>}
                           {booking.makeupArtist && <p><span className="font-bold text-gray-700 block mb-1">الميك أب:</span> {booking.makeupArtist}</p>}
                           {booking.makeupLeaveTime && <p><span className="font-bold text-gray-700 block mb-1">وقت الخروج:</span> <span dir="ltr" className="font-bold text-red-600">{booking.makeupLeaveTime}</span></p>}
                        </>
                    )}
                  </div>
                </section>

                <section className="mb-4">
                  <h3 className="text-lg font-black mb-2 border-r-[3px] border-black pr-2 bg-gray-100 py-1">الخدمات والأسعار</h3>
                  <div className="bg-gray-50 p-4 rounded border border-gray-200 space-y-4">
                    
                    {isPhotoBooking && displayPkgName !== 'غير محدد' && (
                        <div>
                            <p><span className="font-bold text-gray-800">الباكيدج الأساسي (فوتوغرافيا):</span> {displayPkgName} <span className="text-gray-600 font-bold">({displayPkgPrice} ج.م)</span></p>
                            {addonsList && addonsList.length > 0 && <p className="mt-2 text-sm"><span className="font-bold text-gray-700">الإضافات:</span> {addonsList.map(a => `${a.name}`).join(' ، ')}</p>}
                        </div>
                    )}

                    {isVideoBooking && videoName && (
                        <div className={isPhotoBooking && displayPkgName !== 'غير محدد' ? "border-t border-gray-300 pt-3" : ""}>
                            <p><span className="font-bold text-gray-800">خدمة الفيديو:</span> {videoName} <span className="text-gray-600 font-bold">({videoPrice} ج.م)</span> {booking.videoStartTime && <span className="text-red-600 mr-2">| وقت البدء: {booking.videoStartTime}</span>}</p>
                            {booking.videoAddons && booking.videoAddons.length > 0 && <p className="mt-2 text-sm"><span className="font-bold text-gray-700">الإضافات:</span> {booking.videoAddons.map(a => `${a.name}`).join(' ، ')}</p>}
                        </div>
                    )}
                    
                    {booking.notes && (
                         <div className="border-t border-gray-300 pt-3">
                            <p><span className="font-bold text-gray-700">ملاحظات إضافية:</span></p>
                            <p className="text-sm mt-1 whitespace-pre-wrap">{booking.notes}</p>
                        </div>
                    )}
                    
                    <div className="border-t-[2px] border-black pt-4 mt-4 grid grid-cols-3 gap-4 text-center">
                        <div className="bg-white border border-gray-300 rounded-lg p-2"><p className="text-xs font-bold text-gray-500 mb-1">إجمالي الحساب</p><p className="text-xl font-black">{booking.totalPrice}</p></div>
                        <div className="bg-white border border-gray-300 rounded-lg p-2"><p className="text-xs font-bold text-gray-500 mb-1">المدفوع (عربون)</p><p className="text-xl font-black">{booking.paid || 0}</p></div>
                        <div className="bg-black text-white rounded-lg p-2 shadow-inner"><p className="text-xs font-bold opacity-80 mb-1">المبلغ المتبقي</p><p className="text-xl font-black">{booking.remaining}</p></div>
                    </div>
                  </div>
                </section>

                <section className="mb-8">
                  <h3 className="text-lg font-black mb-2 border-r-[3px] border-black pr-2 bg-gray-100 py-1">الشروط والأحكام</h3>
                  <div className="text-[13px] leading-relaxed text-gray-800 bg-gray-50 p-4 rounded border border-gray-200">
                    {conditions.map((condition, index) => (
                        <p key={index} className={condition.includes('لا يُسترد نهائياً') ? 'text-red-700 font-bold' : ''}>
                            {index + 1}. {condition}
                        </p>
                    ))}
                  </div>
                </section>

                <footer className="flex justify-between px-12 pt-8 border-t-[2px] border-black">
                  <div className="text-center">
                    <p className="font-bold text-lg mb-10">توقيع الاستوديو</p>
                    <p className="border-t border-gray-400 w-48 pt-2 font-bold text-gray-600 text-sm">{settings.studioName || 'اسم الاستوديو'}</p>
                  </div>
                  <div className="text-center">
                    <p className="font-bold text-lg mb-10">توقيع العميل</p>
                    <p className="border-t border-gray-400 w-48 pt-2"></p>
                  </div>
                </footer>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
